// ---------- LONGTERM GOAL MODULE ----------
const LongTermModule = {
    data: [],
    _saveTimer: null,
    _lastRenderedKey: null,
    _dataVersion: 0,
    CATEGORIES: ['', 'Spiritual', 'Health', 'Wealth', 'Relationship', 'Growth', 'Experience'],

    currentGoals() {
        if (!Array.isArray(LongTermModule.data)) LongTermModule.data = [];
        return LongTermModule.data;
    },

    _lsKey() { return 'gpal_longterm_' + MemberModule.current(); },

    init() { LongTermModule._loadFromLocal(); LongTermModule._loadFromCloud(); },

    _loadFromLocal() {
        try {
            const cached = JSON.parse(localStorage.getItem(LongTermModule._lsKey()) || 'null');
            if (Array.isArray(cached)) LongTermModule.data = cached;
        } catch {}
        LongTermModule.render();
    },

    async _loadFromCloud() {
        try {
            const json = await SB.getLongterm(MemberModule.current());
            if (Array.isArray(json.data)) {
                LongTermModule.data = json.data;
                LongTermModule._dataVersion++;
                try { localStorage.setItem(LongTermModule._lsKey(), JSON.stringify(LongTermModule.data)); } catch {}
                LongTermModule.render();
            }
        } catch {}
    },

    triggerSave() {
        LongTermModule._dataVersion++;
        try { localStorage.setItem(LongTermModule._lsKey(), JSON.stringify(LongTermModule.data)); } catch {}
        if (LongTermModule._saveTimer) clearTimeout(LongTermModule._saveTimer);
        const targetMember = MemberModule.current(); // 立刻鎖定當下成員，避免之後切換成員造成寫錯人
        const snapshot = LongTermModule.data;
        LongTermModule._saveTimer = setTimeout(async () => {
            try {
                await SB.saveLongterm(targetMember, snapshot);
            } catch(e) {
                Utils.setStatus('LONGTERM_SAVE_ERR · LOCAL_SAVED', 'error');
            }
        }, 3000);
    },

    // 立即執行還未儲存的變更（跳過 debounce），在切換成員/日期前呼叫，避免資料遺失或寫錯人
    async flushSave() {
        if (!LongTermModule._saveTimer) return;
        clearTimeout(LongTermModule._saveTimer);
        LongTermModule._saveTimer = null;
        try { await SB.saveLongterm(MemberModule.current(), LongTermModule.data); }
        catch(e) { Utils.setStatus('LONGTERM_SAVE_ERR · LOCAL_SAVED', 'error'); }
    },

    render() {
        const listEl = document.getElementById('lt-goal-list');
        if (!listEl) return;
        const goals = LongTermModule.currentGoals();
        const today = Utils.todayISO();

        const autoChanged = goals.some(g => !g.done && g.deadline && g.deadline <= today);
        if (autoChanged) {
            goals.forEach(g => { if (!g.done && g.deadline && g.deadline <= today) g.done = true; });
            LongTermModule._dataVersion++;
            try { localStorage.setItem(LongTermModule._lsKey(), JSON.stringify(LongTermModule.data)); } catch {}
            if (LongTermModule._saveTimer) clearTimeout(LongTermModule._saveTimer);
            LongTermModule._saveTimer = setTimeout(async () => {
                try { await SB.saveLongterm(MemberModule.current(), LongTermModule.data); } catch(e) { Utils.setStatus('LONGTERM_SAVE_ERR · LOCAL_SAVED', 'error'); }
            }, 3000);
        }

        const cacheKey = `${MemberModule.current()}|${LongTermModule._dataVersion}`;
        if (cacheKey === LongTermModule._lastRenderedKey) return;
        LongTermModule._lastRenderedKey = cacheKey;

        listEl.replaceChildren();
        if (!goals.length) return;
        const frag = document.createDocumentFragment();
        goals.forEach(g => {
            const row = document.createElement('div');
            row.className = 'lt-goal-row' + (g.done ? ' lt-done' : '');
            row.dataset.ltId = g.id;
            const cb = document.createElement('input');
            cb.type = 'checkbox'; cb.className = 'stark-checkbox'; cb.checked = g.done; cb.dataset.role = 'lt-check';
            const textContainer = document.createElement('div');
            textContainer.className = 'lt-text-container' + (g.done ? ' completed' : '');
            const gCat = g.category || '';
            const catSelect = document.createElement('select');
            catSelect.className = 'lt-category-select';
            catSelect.dataset.role = 'lt-category';
            const catList = LongTermModule.CATEGORIES.includes(gCat) ? LongTermModule.CATEGORIES : [...LongTermModule.CATEGORIES, gCat];
            catList.forEach(c => {
                const opt = document.createElement('option');
                opt.value = c;
                opt.textContent = c || '—';
                if (gCat === c) opt.selected = true;
                catSelect.appendChild(opt);
            });
            textContainer.appendChild(catSelect);
            const textEl = document.createElement('input');
            textEl.type = 'text'; textEl.className = 'lt-goal-input' + (g.done ? ' completed' : '');
            textEl.value = g.text; textEl.placeholder = 'Long term goal...'; textEl.dataset.role = 'lt-text';
            textContainer.appendChild(textEl);
            const deadlineWrap = document.createElement('div');
            deadlineWrap.className = 'lt-deadline-wrap';
            const dateEl = document.createElement('input');
            dateEl.type = 'date'; dateEl.className = 'lt-deadline-input';
            dateEl.value = g.deadline || ''; dateEl.dataset.role = 'lt-deadline';
            const dateIcon = document.createElement('span');
            dateIcon.className = 'lt-date-icon';
            dateIcon.textContent = 'Due';
            dateIcon.title = g.deadline ? g.deadline : 'Set deadline';
            dateIcon.style.display = g.deadline ? 'none' : '';
            const daysEl = document.createElement('span');
            daysEl.className = 'lt-days';
            if (g.done) { daysEl.textContent = '✓ DONE'; daysEl.classList.add('lt-complete'); }
            else if (g.deadline) {
                const mmdd = g.deadline.slice(5);
                const diff = Math.ceil((new Date(g.deadline + 'T12:00:00') - new Date(today + 'T12:00:00')) / 86400000);
                if (diff < 0)       { daysEl.textContent = `${mmdd} · ${Math.abs(diff)}d OVR`; daysEl.classList.add('lt-overdue'); }
                else if (diff === 0){ daysEl.textContent = `${mmdd} · TODAY`; daysEl.classList.add('lt-today'); }
                else                { daysEl.textContent = `${mmdd} · ${diff}d`; }
            }
            const delBtn = document.createElement('button');
            delBtn.className = 'del-btn'; delBtn.textContent = 'X'; delBtn.dataset.role = 'lt-del'; delBtn.type = 'button';
            const saveBtn = document.createElement('button');
            saveBtn.className = 'lt-save-btn'; saveBtn.textContent = 'S'; saveBtn.title = 'Save'; saveBtn.dataset.role = 'lt-save'; saveBtn.type = 'button';
            deadlineWrap.append(dateEl, dateIcon, daysEl);
            row.append(cb, textContainer, deadlineWrap, saveBtn, delBtn);
            frag.appendChild(row);
        });
        listEl.appendChild(frag);
    },

    add() {
        const goals = LongTermModule.currentGoals();
        goals.push({ id: 'lt_' + Date.now(), text: '', deadline: '', done: false });
        LongTermModule.triggerSave(); // 先更新版本號
        LongTermModule.render();
        const listEl = document.getElementById('lt-goal-list');
        const lastInput = listEl?.lastElementChild?.querySelector('[data-role=lt-text]');
        if (lastInput) lastInput.focus();
    },

    // 一鍵加入 6 個人生領域類別（若已存在同名項目則跳過，避免重複）
    addPreset() {
        const PRESET = ['Spiritual', 'Health', 'Wealth', 'Relationship', 'Growth', 'Experience'];
        const goals = LongTermModule.currentGoals();
        const existingCat = new Set(goals.map(g => (g.category || '').trim().toLowerCase()));
        let addedCount = 0;
        PRESET.forEach((label, i) => {
            if (existingCat.has(label.toLowerCase())) return;
            goals.push({ id: 'lt_' + Date.now() + '_' + i, category: label, text: '', deadline: '', done: false });
            addedCount++;
        });
        if (addedCount === 0) {
            Utils.setStatus('CATEGORIES_ALREADY_EXIST', 'warn');
            return;
        }
        LongTermModule.triggerSave();
        LongTermModule.render();
        Utils.setStatus(`ADDED_${addedCount}_CATEGORIES`, 'success');
    },

    // 清空當前成員所有 LongTerm Goals
    clearAll() {
        LongTermModule.data = [];
        LongTermModule.triggerSave();
        LongTermModule.render();
        Utils.setStatus('LONGTERM_CLEARED', 'success');
    },

    handleClick(e) {
        const row = e.target.closest('.lt-goal-row');
        if (!row) return;
        const id = row.dataset.ltId;
        const goals = LongTermModule.currentGoals();
        const idx = goals.findIndex(g => g.id === id);
        if (idx < 0) return;
        if (e.target.dataset.role === 'lt-check') {
            goals[idx].done = e.target.checked;
            const textContainer = row.querySelector('.lt-text-container');
            const textInput     = row.querySelector('[data-role=lt-text]');
            const daysEl        = row.querySelector('.lt-days');
            if (textContainer) textContainer.classList.toggle('completed', goals[idx].done);
            if (textInput)     textInput.classList.toggle('completed', goals[idx].done);
            if (daysEl) {
                daysEl.className = 'lt-days';
                if (goals[idx].done) { daysEl.textContent = '✓ DONE'; daysEl.classList.add('lt-complete'); }
                else if (goals[idx].deadline) {
                    const today = Utils.todayISO();
                    const mmdd = goals[idx].deadline.slice(5);
                    const diff = Math.ceil((new Date(goals[idx].deadline + 'T12:00:00') - new Date(today + 'T12:00:00')) / 86400000);
                    if (diff < 0)       { daysEl.textContent = `${mmdd} · ${Math.abs(diff)}d OVR`; daysEl.classList.add('lt-overdue'); }
                    else if (diff === 0){ daysEl.textContent = `${mmdd} · TODAY`; daysEl.classList.add('lt-today'); }
                    else                { daysEl.textContent = `${mmdd} · ${diff}d`; }
                } else { daysEl.textContent = ''; }
            }
            LongTermModule.triggerSave();
        } else if (e.target.dataset.role === 'lt-save') {
            const saveEl = e.target;
            saveEl.disabled = true;
            saveEl.textContent = '...';
            clearTimeout(LongTermModule._saveTimer);
            LongTermModule._saveTimer = null;
            SB.saveLongterm(MemberModule.current(), LongTermModule.data)
              .then(() => {
                  saveEl.textContent = '✓ 已完成';
                  saveEl.style.background = 'rgba(0,255,136,0.2)';
                  saveEl.style.borderColor = 'var(--stark-green)';
                  saveEl.style.color = 'var(--stark-green)';
              })
              .catch(() => {
                  saveEl.textContent = '✗ 失敗';
                  saveEl.style.background = 'rgba(255,62,62,0.2)';
                  saveEl.style.borderColor = 'var(--stark-red)';
                  saveEl.style.color = 'var(--stark-red)';
              })
              .finally(() => {
                  setTimeout(() => {
                      saveEl.disabled = false;
                      saveEl.textContent = 'S';
                      saveEl.style.background = '';
                      saveEl.style.borderColor = '';
                      saveEl.style.color = '';
                  }, 1500);
              });
        } else if (e.target.dataset.role === 'lt-del') {
            row.remove();                  // 即時 DOM 移除
            goals.splice(idx, 1);
            LongTermModule.triggerSave();
            LongTermModule.render();
        }
    },
    handleInput(e) {
        const row = e.target.closest('.lt-goal-row');
        if (!row) return;
        const goal = LongTermModule.currentGoals().find(g => g.id === row.dataset.ltId);
        if (!goal) return;
        if (e.target.dataset.role === 'lt-text') { goal.text = e.target.value; }
        if (e.target.dataset.role === 'lt-category') { goal.category = e.target.value || ''; }
        if (e.target.dataset.role === 'lt-deadline') {
            goal.deadline = e.target.value;
            const dateIcon = row.querySelector('.lt-date-icon');
            if (dateIcon) {
                dateIcon.style.display = goal.deadline ? 'none' : '';
                dateIcon.title = goal.deadline || 'Set deadline';
            }
            const daysEl = row.querySelector('.lt-days');
            if (daysEl) {
                daysEl.className = 'lt-days';
                if (goal.done) { daysEl.textContent = '✓ DONE'; daysEl.classList.add('lt-complete'); }
                else if (goal.deadline) {
                    const today = Utils.todayISO();
                    const mmdd = goal.deadline.slice(5);
                    const diff = Math.ceil((new Date(goal.deadline + 'T12:00:00') - new Date(today + 'T12:00:00')) / 86400000);
                    if (diff < 0)       { daysEl.textContent = `${mmdd} · ${Math.abs(diff)}d OVR`; daysEl.classList.add('lt-overdue'); }
                    else if (diff === 0){ daysEl.textContent = `${mmdd} · TODAY`; daysEl.classList.add('lt-today'); }
                    else                { daysEl.textContent = `${mmdd} · ${diff}d`; }
                } else { daysEl.textContent = ''; }
            }
        }
        LongTermModule.triggerSave();
    },
};

// ---------- GOAL TEMPLATE MODULE ----------
const GoalTemplateModule = {
    LS_KEY: 'gpal_goal_templates',
    templates: [],

    init() { this._loadFromLocal(); this._loadFromCloud(); },
    _loadFromLocal() { try { const s = JSON.parse(localStorage.getItem(this.LS_KEY) || '[]'); if (Array.isArray(s)) this.templates = s; } catch {} },
    async _loadFromCloud() {
        try {
            const data = await SB.getTemplates('goal');
            if (Array.isArray(data.templates) && data.templates.length > 0) {
                this.templates = data.templates.map(t => ({ id: 'tmpl_' + Date.now() + '_' + Math.floor(Math.random()*9999), name: t.name, goals: Array.isArray(t.data) ? t.data : [] }));
                this._saveLocal();
            }
        } catch {}
    },

    _saveLocal() { try { localStorage.setItem(this.LS_KEY, JSON.stringify(this.templates)); } catch {} },

    async _saveCloud(name, data) { try { await SB.saveTemplate('goal', name, data); } catch {} },

    async _deleteCloud(name) { try { await SB.deleteTemplate('goal', name); } catch {} },

    _extractGoals() {
        GoalModule.saveCurrent();
        const raw = GoalModule.allData[0] || '';
        return raw.split('\n').filter(l => l.trim() && /^\[[ x]\]/.test(l)).map(l => {
            const prioMatch = l.match(/\((P[1-3]|NONE)\)/);
            const text = l.replace(/^\[[ x]\]\s*\((P[1-3]|NONE)\)\s*/, '').replace(/^\[[ x]\]\s*/, '').trim();
            return { text, prio: prioMatch ? prioMatch[1] : 'NONE' };
        }).filter(g => g.text);
    },

    saveCurrentAs(name) {
        const n = name.trim();
        if (!n) return;
        const goals = this._extractGoals();
        if (!goals.length) { Utils.setStatus('NO_GOALS_TO_SAVE', 'warn'); return; }
        const existIdx = this.templates.findIndex(t => t.name === n);
        const tmpl = { id: 'tmpl_' + Date.now(), name: n, goals };
        if (existIdx >= 0) this.templates[existIdx] = tmpl; else this.templates.push(tmpl);
        this._saveLocal();
        this._saveCloud(n, goals);
        Utils.setStatus(`TEMPLATE_SAVED · ${n}`, 'success');
        this.renderPanel();
    },

    applyTemplate(id) {
        const tmpl = this.templates.find(t => t.id === id);
        if (!tmpl || !confirm(`Apply "${tmpl.name}"? Current goals will be replaced.`)) return;
        const raw = tmpl.goals.map(g => `[ ] (${g.prio}) ${g.text}`).join('\n');
        GoalModule.parseSingle(raw);
        GoalModule.saveCurrent();
        SaveQueue.trigger();
        GoalTemplateModule.closePanel();
        Utils.setStatus(`TEMPLATE_APPLIED · ${tmpl.name}`, 'success');
    },

    deleteTemplate(id) {
        const tmpl = this.templates.find(t => t.id === id);
        if (tmpl) this._deleteCloud(tmpl.name);
        this.templates = this.templates.filter(t => t.id !== id);
        this._saveLocal(); this.renderPanel();
    },

    togglePanel() {
        const panel = document.getElementById('goal-tmpl-panel');
        const btn = document.getElementById('btn-tmpl');
        if (!panel) return;
        const isOpen = panel.style.display !== 'none';
        panel.style.display = isOpen ? 'none' : 'block';
        if (btn) btn.classList.toggle('active', !isOpen);
        if (!isOpen) this.renderPanel();
    },

    closePanel() {
        const panel = document.getElementById('goal-tmpl-panel');
        const btn = document.getElementById('btn-tmpl');
        if (panel) panel.style.display = 'none';
        if (btn) btn.classList.remove('active');
    },

    renderPanel() {
        const panel = document.getElementById('goal-tmpl-panel');
        if (!panel || panel.style.display === 'none') return;
        panel.replaceChildren();
        if (!this.templates.length) {
            const empty = document.createElement('div');
            empty.className = 'tmpl-empty';
            empty.textContent = 'NO_TEMPLATES · SAVE CURRENT GOALS BELOW';
            panel.appendChild(empty);
        } else {
            const list = document.createElement('div');
            this.templates.forEach(tmpl => {
                const item = document.createElement('div'); item.className = 'tmpl-item';
                const nameEl = document.createElement('span'); nameEl.className = 'tmpl-item-name'; nameEl.textContent = tmpl.name + '  ·  ' + tmpl.goals.length + ' goals';
                const applyEl = document.createElement('span'); applyEl.className = 'tmpl-item-apply'; applyEl.textContent = '[APPLY]'; applyEl.onclick = () => GoalTemplateModule.applyTemplate(tmpl.id);
                const delEl = document.createElement('span'); delEl.className = 'tmpl-item-del'; delEl.textContent = 'X'; delEl.onclick = e => { e.stopPropagation(); GoalTemplateModule.deleteTemplate(tmpl.id); };
                item.append(nameEl, applyEl, delEl); list.appendChild(item);
            });
            panel.appendChild(list);
        }
        const saveRow = document.createElement('div'); saveRow.className = 'tmpl-save-row';
        const input = document.createElement('input'); input.type = 'text'; input.className = 'tmpl-name-input'; input.placeholder = 'Template name...'; input.maxLength = 30;
        input.addEventListener('keydown', e => { if (e.key === 'Enter') GoalTemplateModule.saveCurrentAs(input.value); });
        const saveBtn = document.createElement('button'); saveBtn.className = 'tmpl-save-btn'; saveBtn.textContent = 'SAVE CURRENT';
        saveBtn.onclick = () => GoalTemplateModule.saveCurrentAs(input.value);
        saveRow.append(input, saveBtn); panel.appendChild(saveRow);
    },
};

const JarvisModule = {
    LS_KEY: 'gpal_jarvis_lang',
    _speaking: false,
    _getLang() { return localStorage.getItem(JarvisModule.LS_KEY) || 'en-US'; },
    _selectVoice() {
        if (!('speechSynthesis' in window)) return null;
        const voices = window.speechSynthesis.getVoices();
        const lang = JarvisModule._getLang();
        if (lang === 'en-US') return voices.find(v => v.lang === 'en-US') || voices.find(v => v.lang.startsWith('en')) || voices[0] || null;
        if (lang === 'zh-HK') return voices.find(v => v.lang === 'zh-HK') || voices.find(v => v.lang === 'yue-HK') || voices.find(v => v.lang.startsWith('zh-HK')) || voices.find(v => v.lang.startsWith('zh')) || voices[0] || null;
        return voices.find(v => v.lang === 'zh-CN') || voices.find(v => v.lang === 'zh-TW') || voices.find(v => v.lang.startsWith('zh-CN')) || voices.find(v => v.lang.startsWith('zh')) || voices[0] || null;
    },
    _weatherDesc(code) {
        const isEn = JarvisModule._getLang() === 'en-US';
        const map = [[0,isEn?'clear sky':'晴天'],[2,isEn?'partly cloudy':'多雲時晴'],[3,isEn?'overcast':'陰天'],[49,isEn?'foggy':'有霧'],[67,isEn?'rainy':'下雨'],[77,isEn?'snowy':'下雪'],[82,isEn?'showers':'陣雨'],[99,isEn?'thunderstorm':'雷暴']];
        for (const [max, desc] of map) { if (code <= max) return desc; }
        return isEn ? 'unknown' : '未知';
    },
    _buildReport() {
        const isEn = JarvisModule._getLang() === 'en-US';
        const date = (DOM.datePicker && DOM.datePicker.value) || Utils.todayISO();
        const raw = GoalModule.allData[0] || '';
        const lines = raw.split('\n').filter(l => l.trim() && /^\[[ x]\]/.test(l));
        const done = lines.filter(l => l.startsWith('[x]')); const pending = lines.filter(l => l.startsWith('[ ]'));
        const pct = lines.length ? Math.round(done.length / lines.length * 100) : 0;
        const clean = l => l.replace(/^\[[ x]\]\s*\((P[1-3]|NONE)\)\s*/, '').replace(/^\[[ x]\]\s*/, '').trim();
        const doneTexts = done.map(clean).filter(Boolean); const pendingTexts = pending.map(clean).filter(Boolean);
        const d = new Date(date + 'T12:00:00'); const member = MemberModule.current() || 'A';
        const w = window._gpalWeather; let report = '';
        if (isEn) {
            const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
            report = `JARVIS status report. ${member}'s mission status. Date: ${months[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}. `;
            if (lines.length) { report += `Mission completion: ${pct} percent. `; if (doneTexts.length) report += `Completed: ${doneTexts.join(', ')}. `; if (pendingTexts.length) report += `Pending: ${pendingTexts.join(', ')}. `; } else { report += `No tasks set for today. `; }
            if (w) report += `Weather: ${JarvisModule._weatherDesc(w.code)}, ${w.temp} degrees Celsius. `;
            report += `All systems nominal. End of report.`;
        } else {
            report = `JARVIS 系統匯報。${member} 的任務狀態。日期：${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日。`;
            if (lines.length) { report += `任務完成率：${pct}%。`; if (doneTexts.length) report += `已完成：${doneTexts.join('、')}。`; if (pendingTexts.length) report += `待完成：${pendingTexts.join('、')}。`; } else { report += `今日尚未設定任何任務。`; }
            if (w) report += `天氣狀況：${JarvisModule._weatherDesc(w.code)}，氣溫 ${w.temp} 度。`;
            report += `所有系統正常。匯報完畢。`;
        }
        return report;
    },
    speak() {
        if (!('speechSynthesis' in window)) { Utils.setStatus('SPEECH_NOT_SUPPORTED', 'error'); return; }
        if (this._speaking) { this.stop(); return; }
        window.speechSynthesis.cancel();
        const utt = new SpeechSynthesisUtterance(this._buildReport());
        const doSpeak = () => { const voice = JarvisModule._selectVoice(); if (voice) utt.voice = voice; utt.rate = 0.88; utt.pitch = 0.85; utt.volume = 1; const cleanup = () => { JarvisModule._speaking = false; const btn = document.getElementById('btn-jarvis'); if (btn) btn.textContent = '◎ BRIEF'; }; utt.onend = cleanup; utt.onerror = cleanup; window.speechSynthesis.speak(utt); JarvisModule._speaking = true; const btn = document.getElementById('btn-jarvis'); if (btn) btn.textContent = '◉ STOP'; };
        if (window.speechSynthesis.getVoices().length) { doSpeak(); } else { window.speechSynthesis.addEventListener('voiceschanged', doSpeak, { once: true }); }
    },
    stop() { window.speechSynthesis.cancel(); this._speaking = false; const btn = document.getElementById('btn-jarvis'); if (btn) btn.textContent = '◎ BRIEF'; },
};

const TimezoneModule = {

        ['Mexico City','America/Mexico_City'],['São Paulo','America/Sao_Paulo'],
        ['London','Europe/London'],['Paris','Europe/Paris'],['Berlin','Europe/Berlin'],
        ['Moscow','Europe/Moscow'],['Dubai','Asia/Dubai'],['Mumbai','Asia/Kolkata'],
        ['Bangkok','Asia/Bangkok'],['Hong Kong','Asia/Hong_Kong'],['Shanghai','Asia/Shanghai'],

        ['Singapore','Asia/Singapore'],['Sydney','Australia/Sydney'],

    ],
    _zones() {

        return [...TimezoneModule.DEFAULT];
    },
    startTimer() {
        // Populate app timezone selector
        const sel = document.getElementById('tz-app-select');
        if (sel && sel.options.length === 0) {
            const cur = Utils.getTZ();
            CONFIG.TIMEZONES.forEach(([label, tz]) => {
                const opt = document.createElement('option');
                opt.value = tz; opt.textContent = label;
                if (tz === cur) opt.selected = true;

    },
    stopTimer() { if (TimezoneModule.timer) { clearInterval(TimezoneModule.timer); TimezoneModule.timer = null; } },
    render() {
        const el = document.getElementById('tz-display');
        if (!el) return;
        const zones = TimezoneModule._zones();
        const now = new Date();
        el.replaceChildren();
        const DAY = '#ffcc00', NIGHT = '#00f2ff'; // 日間金 / 夜間青
        zones.forEach((z, i) => {
            const t = new Intl.DateTimeFormat('en-GB', { timeZone: z.tz, hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false }).format(now);
            const d = new Intl.DateTimeFormat('en-US', { timeZone: z.tz, weekday: 'short', month: 'short', day: 'numeric' }).format(now);
            // 取當地小時判斷日夜：06:00-17:59 日間金，18:00-05:59 夜間青
            const hr = parseInt(new Intl.DateTimeFormat('en-GB', { timeZone: z.tz, hour: '2-digit', hour12: false }).format(now), 10);
            const c = (hr >= 6 && hr < 18) ? DAY : NIGHT;
            const row = document.createElement('div'); row.className = 'tz-row';
            const city = document.createElement('span'); city.className = 'tz-city'; city.textContent = z.city;
            city.style.color = c;

            const time = document.createElement('span'); time.className = 'tz-time'; time.textContent = t;
            time.style.color = c;
            time.style.textShadow = `0 0 8px ${c}66`;
            const date = document.createElement('span'); date.className = 'tz-date'; date.textContent = d;
            tw.append(time, date); row.append(city, tw); el.appendChild(row);
        });
    },
    openEditor() {
        const zones = TimezoneModule._zones();
        const rowsEl = document.getElementById('tz-edit-rows');
        rowsEl.replaceChildren();
        zones.forEach((z, i) => {
            const row = document.createElement('div'); row.className = 'tz-edit-row';
            const label = document.createElement('label'); label.textContent = `ZONE ${i + 1}`;
            const nameInput = document.createElement('input'); nameInput.type = 'text'; nameInput.value = z.city; nameInput.id = `tz-name-${i}`;
            const sel = document.createElement('select'); sel.id = `tz-sel-${i}`;
            TimezoneModule.ZONES.forEach(([name, tz]) => {
                const opt = document.createElement('option'); opt.value = tz; opt.textContent = name;
                if (tz === z.tz) opt.selected = true; sel.appendChild(opt);
            });
            sel.addEventListener('change', () => { const mt = TimezoneModule.ZONES.find(([n,t]) => t === sel.value); if (mt) nameInput.value = mt[0]; });
            row.append(label, nameInput, sel); rowsEl.appendChild(row);
        });
        document.getElementById('tz-edit-modal').classList.add('show');
    },
    closeEditor() { document.getElementById('tz-edit-modal').classList.remove('show'); },
    saveZones() {
        const zones = [];
        for (let i = 0; i < 3; i++) {
            const name = document.getElementById(`tz-name-${i}`).value.trim();
            const tz   = document.getElementById(`tz-sel-${i}`).value.trim();
            // 驗證時區格式
            if (!tz) continue;
            try { Intl.DateTimeFormat('en', { timeZone: tz }); } catch {
                alert(`Zone ${i+1}: Invalid timezone "${tz}"
Example: America/New_York`);
                return;
            }
            zones.push({ city: name || tz.split('/').pop().replace(/_/g,' '), tz });
        }
        if (zones.length !== 3) return;
        try { localStorage.setItem(TimezoneModule.LS_KEY, JSON.stringify(zones)); } catch {}
        TimezoneModule.closeEditor();
        TimezoneModule.render();
    },
};

const MissionClockModule = {
    DURATION: 25 * 60 * 1000,
    startTs: null, pausedMs: 0, pauseStart: null,
    taskName: '', activeRow: null, _tickTimer: null,

    get isRunning() { return this.startTs !== null && this.pauseStart === null; },
    get isPaused()  { return this.startTs !== null && this.pauseStart !== null; },
    get isIdle()    { return this.startTs === null; },

    getElapsed() {
        if (this.isIdle) return 0;
        const pausedTotal = this.pausedMs + (this.pauseStart ? Date.now() - this.pauseStart : 0);
        return (Date.now() - this.startTs) - pausedTotal;
    },
    getRemaining() { return Math.max(0, this.DURATION - this.getElapsed()); },

    start(taskName, row) {
        MissionClockModule.stop();
        MissionClockModule.taskName = taskName;
        MissionClockModule.activeRow = row;
        MissionClockModule.startTs = Date.now();
        MissionClockModule.pausedMs = 0;
        MissionClockModule.pauseStart = null;
        if (row) row.classList.add('clocking');
        const bar = document.getElementById('mission-clock-bar');
        if (bar) bar.style.display = 'flex';
        const tn = document.getElementById('mc-task-name');
        if (tn) tn.textContent = taskName;
        const pb = document.getElementById('mc-pause-btn');
        if (pb) pb.textContent = 'PAUSE';
        MissionClockModule._updateUI();
        MissionClockModule._scheduleTick();
        if ('Notification' in window && Notification.permission === 'default') Notification.requestPermission();
    },

    togglePause() {
        if (MissionClockModule.isIdle) return;
        if (MissionClockModule.isRunning) {
            MissionClockModule.pauseStart = Date.now();
            const pb = document.getElementById('mc-pause-btn');
            if (pb) pb.textContent = 'RESUME';
            if (MissionClockModule._tickTimer) { clearTimeout(MissionClockModule._tickTimer); MissionClockModule._tickTimer = null; }
        } else if (MissionClockModule.isPaused) {
            MissionClockModule.pausedMs += Date.now() - MissionClockModule.pauseStart;
            MissionClockModule.pauseStart = null;
            const pb = document.getElementById('mc-pause-btn');
            if (pb) pb.textContent = 'PAUSE';
            MissionClockModule._scheduleTick();
        }
        MissionClockModule._updateUI();
    },

    stop() {
        if (MissionClockModule._tickTimer) { clearTimeout(MissionClockModule._tickTimer); MissionClockModule._tickTimer = null; }
        if (MissionClockModule.activeRow) MissionClockModule.activeRow.classList.remove('clocking');
        MissionClockModule.startTs = null; MissionClockModule.pausedMs = 0;
        MissionClockModule.pauseStart = null; MissionClockModule.taskName = ''; MissionClockModule.activeRow = null;
        const bar = document.getElementById('mission-clock-bar');
        if (bar) bar.style.display = 'none';
        const timeEl = document.getElementById('mc-time');
        if (timeEl) { timeEl.textContent = '25:00'; timeEl.classList.remove('urgent'); }
        const progEl = document.getElementById('mc-progress-bar');
        if (progEl) progEl.style.width = '100%';
    },

    finish() {
        const taskName = MissionClockModule.taskName;
        MissionClockModule.stop();
        Utils.setStatus('MISSION COMPLETE ✓', 'success');
        const overlay = document.createElement('div');
        overlay.style.cssText = 'position:fixed;inset:0;background:rgba(255,204,0,0.08);pointer-events:none;z-index:9999;transition:opacity 0.6s;';
        document.body.appendChild(overlay);
        setTimeout(() => { overlay.style.opacity = '0'; setTimeout(() => overlay.remove(), 600); }, 200);
        if ('Notification' in window && Notification.permission === 'granted') {
            try { new Notification('✓ MISSION COMPLETE', { body: taskName, silent: false }); } catch {}
        }
    },

    _scheduleTick() {
        if (MissionClockModule._tickTimer) clearTimeout(MissionClockModule._tickTimer);
        if (!MissionClockModule.isRunning) return;
        MissionClockModule._tickTimer = setTimeout(() => {
            MissionClockModule._updateUI();
            if (MissionClockModule.getRemaining() <= 0) MissionClockModule.finish();
            else MissionClockModule._scheduleTick();
        }, 500);
    },

    _updateUI() {
        const remaining = MissionClockModule.getRemaining();
        const mins = Math.floor(remaining / 60000);
        const secs = Math.floor((remaining % 60000) / 1000);
        const timeEl = document.getElementById('mc-time');
        const progEl = document.getElementById('mc-progress-bar');
        if (timeEl) { timeEl.textContent = Utils.pad2(mins) + ':' + Utils.pad2(secs); timeEl.classList.toggle('urgent', remaining < 5 * 60 * 1000 && remaining > 0); }
        if (progEl) progEl.style.width = (remaining / MissionClockModule.DURATION * 100) + '%';
    },

    onVisibilityChange() {
        if (document.hidden || MissionClockModule.isIdle) return;
        if (MissionClockModule.getRemaining() <= 0) MissionClockModule.finish();
        else if (MissionClockModule.isRunning) { MissionClockModule._updateUI(); MissionClockModule._scheduleTick(); }
    },

    init() { /* visibilitychange handled by Events.init consolidated listener */ },
};

// ---------- STREAK MODULE ----------
const StreakModule = {
    LS_KEY: 'gpal_streak',
    data: {},

    getMember(name) {
        if (!StreakModule.data[name]) StreakModule.data[name] = { current: 0, best: 0, lastDate: '', graceUsed: false, graceMonth: '', threshold: 0.7 };
        return StreakModule.data[name];
    },

    init() {
        try {
            const cached = JSON.parse(localStorage.getItem(StreakModule.LS_KEY) || 'null');
            if (cached && typeof cached === 'object') StreakModule.data = cached;
        } catch {}
        StreakModule.render();
    },

    save() { try { localStorage.setItem(StreakModule.LS_KEY, JSON.stringify(StreakModule.data)); } catch {} },

    checkAndUpdate(date) {
        if (!date || date !== Utils.todayISO()) return;
        const name = MemberModule.current();
        const s = StreakModule.getMember(name);
        const raw = GoalModule.allData[0] || '';
        const lines = raw.split('\n').filter(l => l.trim() && /^\[[ x]\]/.test(l));
        if (!lines.length) return;
        const doneCount = lines.filter(l => l.startsWith('[x]')).length;
        if (doneCount / lines.length < (s.threshold || 0.7)) return;
        const today = date;
        if (s.lastDate === today) return;
        const d = new Date(today + 'T12:00:00');
        d.setDate(d.getDate() - 1);
        const yesterday = d.getFullYear() + '-' + Utils.pad2(d.getMonth() + 1) + '-' + Utils.pad2(d.getDate());
        const currentMonth = today.slice(0, 7);
        if (s.lastDate === yesterday) { s.current++; }
        else {
            if (!s.graceUsed || s.graceMonth !== currentMonth) { s.graceUsed = true; s.graceMonth = currentMonth; if (!s.current) s.current = 1; }
            else { s.current = 1; }
        }
        s.best = Math.max(s.best || 0, s.current);
        s.lastDate = today;
        StreakModule.data[name] = s;
        StreakModule.save();
        StreakModule.render();
    },

    render() {
        const el = document.getElementById('streak-display');
        if (!el) return;
        const name = MemberModule.current();
        const s = StreakModule.getMember(name);
        const c = s.current || 0;
        const wasMilestone = c === 7 || c === 30 || c === 100;
        if (c === 0) { el.textContent = '⚡ 0D'; el.className = 'streak-display cold'; }
        else {
            el.textContent = (c >= 7 ? '🔥' : '✦') + ' ' + c + 'D';
            el.className = 'streak-display hot';
            if (wasMilestone) { el.classList.add('streak-milestone'); setTimeout(() => el.classList.remove('streak-milestone'), 600); }
        }
        el.title = 'Best: ' + (s.best || 0) + 'D · Threshold: ' + Math.round((s.threshold || 0.7) * 100) + '%';
    },
};

// ---------- HABIT TRACKER MODULE ----------
const HabitModule = {
    LS_KEY: 'gpal_habits',
    data: {},
    _saveTimer: null,
    _dataVersion: 0,
    _lastRenderedKey: null,

    currentHabits() { return HabitModule.data; },
    _lsKey() { return 'gpal_habits_' + MemberModule.current(); },

    _recentDays(n = 7) {
        const today = Utils.todayISO();
        const days = [];
        for (let i = n - 1; i >= 0; i--) {
            const d = new Date(today + 'T12:00:00');
            d.setDate(d.getDate() - i);
            days.push(d.getFullYear() + '-' + Utils.pad2(d.getMonth() + 1) + '-' + Utils.pad2(d.getDate()));
        }
        return days;
    },

    getStreak(habit) {
        const today = Utils.todayISO();
        let streak = 0;
        const d = new Date(today + 'T12:00:00');
        while (streak < 365) {
            const ds = d.getFullYear() + '-' + Utils.pad2(d.getMonth() + 1) + '-' + Utils.pad2(d.getDate());
            if (!habit.logs[ds]) break;
            streak++;
            d.setDate(d.getDate() - 1);
        }
        return streak;
    },

    _pruneLogs(habit) {
        const cutoff = new Date();
        cutoff.setDate(cutoff.getDate() - 90);
        const cutoffStr = cutoff.getFullYear() + '-' + Utils.pad2(cutoff.getMonth() + 1) + '-' + Utils.pad2(cutoff.getDate());
        Object.keys(habit.logs).forEach(d => { if (d < cutoffStr) delete habit.logs[d]; });
    },

    init() { HabitModule._loadFromLocal(); HabitModule._loadFromCloud(); },

    _loadFromLocal() {
        HabitModule.data = [];
        try { const c = JSON.parse(localStorage.getItem(HabitModule._lsKey()) || 'null'); if (Array.isArray(c)) HabitModule.data = c; } catch {}
        HabitModule.render();
    },

    async _loadFromCloud() {
        try {
            const json = await SB.getHabit(MemberModule.current());
            if (Array.isArray(json.habits)) {
                HabitModule.data = json.habits;
                HabitModule._dataVersion++;
                try { localStorage.setItem(HabitModule._lsKey(), JSON.stringify(HabitModule.data)); } catch {}
                HabitModule.render();
            }
        } catch {}
    },

    triggerSave() {
        HabitModule._dataVersion++;
        HabitModule._lastRenderedKey = null;
        HabitModule._scheduleSave();
    },

    _scheduleSave() {
        try { localStorage.setItem(HabitModule._lsKey(), JSON.stringify(HabitModule.data)); } catch {}
        if (HabitModule._saveTimer) clearTimeout(HabitModule._saveTimer);
        const targetMember = MemberModule.current(); // 立刻鎖定當下成員，避免之後切換成員造成寫錯人
        const snapshot = HabitModule.data;
        HabitModule._saveTimer = setTimeout(async () => {
            try {
                await SB.saveHabit(targetMember, snapshot);
            } catch { Utils.setStatus('HABIT_SAVE_ERR · LOCAL_SAVED', 'error'); }
        }, 3000);
    },

    // 立即執行還未儲存的變更（跳過 debounce），在切換成員/日期前呼叫，避免資料遺失或寫錯人
    async flushSave() {
        if (!HabitModule._saveTimer) return;
        clearTimeout(HabitModule._saveTimer);
        HabitModule._saveTimer = null;
        try { await SB.saveHabit(MemberModule.current(), HabitModule.data); }
        catch(e) { Utils.setStatus('HABIT_SAVE_ERR · LOCAL_SAVED', 'error'); }
    },

    render() {
        const listEl = document.getElementById('habit-list');
        if (!listEl) return;
        const cacheKey = `${MemberModule.current()}|${HabitModule._dataVersion}`;
        if (cacheKey === HabitModule._lastRenderedKey) return;
        HabitModule._lastRenderedKey = cacheKey;

        const habits = HabitModule.currentHabits();
        const days = HabitModule._recentDays(7);
        const today = Utils.todayISO();
        listEl.replaceChildren();
        if (!habits.length) return;
        const frag = document.createDocumentFragment();
        habits.forEach(habit => {
            const row = document.createElement('div');
            row.className = 'habit-row'; row.dataset.habitId = habit.id;
            const nameEl = document.createElement('input');
            nameEl.type = 'text'; nameEl.className = 'habit-name-input';
            nameEl.value = habit.name; nameEl.placeholder = 'Habit name...'; nameEl.dataset.role = 'habit-name';
            const dotsEl = document.createElement('div');
            dotsEl.className = 'habit-dots';
            days.forEach(day => {
                const dot = document.createElement('div');
                dot.className = 'habit-dot' + (habit.logs[day] ? ' done' : '') + (day === today ? ' is-today' : '');
                dot.dataset.role = 'habit-dot'; dot.dataset.date = day; dot.title = day;
                dotsEl.appendChild(dot);
            });
            const streakEl = document.createElement('span');
            streakEl.className = 'habit-streak';
            const s = HabitModule.getStreak(habit);
            streakEl.textContent = s > 0 ? (s >= 7 ? '🔥' : '✦') + s + 'd' : '';
            const delBtn = document.createElement('div');
            delBtn.className = 'del-btn'; delBtn.textContent = 'DEL'; delBtn.dataset.role = 'habit-del';
            row.append(nameEl, dotsEl, streakEl, delBtn);
            frag.appendChild(row);
        });
        listEl.appendChild(frag);
    },

    add() {
        HabitModule.currentHabits().push({ id: 'h_' + Date.now(), name: '', logs: {} });
        HabitModule.triggerSave();
        HabitModule.render();
        document.getElementById('habit-list')?.lastElementChild?.querySelector('[data-role=habit-name]')?.focus();
    },

    handleClick(e) {
        const row = e.target.closest('.habit-row');
        if (!row) return;
        const habits = HabitModule.currentHabits();
        const idx = habits.findIndex(h => h.id === row.dataset.habitId);
        if (idx < 0) return;
        if (e.target.dataset.role === 'habit-dot') {
            const date = e.target.dataset.date;
            if (!habits[idx].logs) habits[idx].logs = {};
            if (habits[idx].logs[date]) { delete habits[idx].logs[date]; }
            else { habits[idx].logs[date] = true; HabitModule._pruneLogs(habits[idx]); }
            e.target.classList.toggle('done', !!habits[idx].logs[date]);
            const streakEl = row.querySelector('.habit-streak');
            if (streakEl) { const s = HabitModule.getStreak(habits[idx]); streakEl.textContent = s > 0 ? (s >= 7 ? '🔥' : '✦') + s + 'd' : ''; }
            HabitModule._scheduleSave(); // 靜默保存，不失效 render 快取
        } else if (e.target.dataset.role === 'habit-del') {
            if (confirm('DELETE THIS HABIT?')) { habits.splice(idx, 1); HabitModule.triggerSave(); HabitModule.render(); }
        }
    },

    handleInput(e) {
        const row = e.target.closest('.habit-row');
        if (!row || e.target.dataset.role !== 'habit-name') return;
        const habit = HabitModule.currentHabits().find(h => h.id === row.dataset.habitId);
        if (habit) { habit.name = e.target.value; HabitModule.triggerSave(); }
    },
};

// ---------- SPOTIFY MODULE ----------
const SpotifyModule = {
    SCOPES: 'user-read-playback-state user-modify-playback-state user-read-currently-playing playlist-read-private playlist-read-collaborative',
    LS_TOKEN:  'gpal_spotify_token',
    LS_CONFIG: 'gpal_spotify_config',
    LS_VERIFY: 'gpal_spotify_verifier',

    _token: null, _refreshToken: null, _expiry: 0,
    _track: null, _playing: false, _volume: 50,
    _pollTimer: null,
    _progressBase: 0, _progressTimestamp: 0, _lastTrackId: null,
    _lyrics: [], _lyricsTimer: null, _lastLyricIdx: -1,

    // ─── Init ───────────────────────────────────────────────────────────────
    init() {
        // 預設 Client ID + Redirect URI（用戶專屬）
        const DEFAULT_CONFIG = { clientId: 'f05736246eff49ab8ff41e3d51a79588', redirectUri: 'https://oldjim4466.github.io/gpal/family_gpal.html' };
        if (!localStorage.getItem(SpotifyModule.LS_CONFIG)) {
            localStorage.setItem(SpotifyModule.LS_CONFIG, JSON.stringify(DEFAULT_CONFIG));
        }

        // Scope 版本檢查：SCOPES 改變時自動清除舊 token，強制重新授權
        const savedScope = localStorage.getItem('gpal_spotify_scope');
        if (savedScope !== SpotifyModule.SCOPES) {
            localStorage.removeItem(SpotifyModule.LS_TOKEN);   // 清除舊 token
            localStorage.setItem('gpal_spotify_scope', SpotifyModule.SCOPES);
        }

        // 載入 config + token
        try {
            const tok = JSON.parse(localStorage.getItem(SpotifyModule.LS_TOKEN) || 'null');
            if (tok) { SpotifyModule._token = tok.a; SpotifyModule._refreshToken = tok.r; SpotifyModule._expiry = tok.e; }
        } catch {}

        // 檢查 OAuth callback（URL 含 ?code=）
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');
        if (code) {
            window.history.replaceState({}, '', window.location.pathname);
            SpotifyModule._handleCallback(code);
        } else {
            SpotifyModule.render();
            if (SpotifyModule._token) SpotifyModule._startPolling();
        }
    },

    // ─── OAuth PKCE ─────────────────────────────────────────────────────────
    async authorize() {
        const cfg = JSON.parse(localStorage.getItem(SpotifyModule.LS_CONFIG) || 'null');
        const clientId = document.getElementById('sp-client-id')?.value.trim() || cfg?.clientId;
        if (!clientId) { alert('Please enter your Spotify Client ID'); return; }
        const redirectUri = cfg?.redirectUri || window.location.href.split('?')[0].split('#')[0];
        localStorage.setItem(SpotifyModule.LS_CONFIG, JSON.stringify({ clientId, redirectUri }));

        const verifier = SpotifyModule._randomStr();
        const challenge = await SpotifyModule._sha256b64(verifier);
        localStorage.setItem(SpotifyModule.LS_VERIFY, verifier);

        const url = new URL('https://accounts.spotify.com/authorize');
        url.searchParams.set('client_id', clientId);
        url.searchParams.set('response_type', 'code');
        url.searchParams.set('redirect_uri', redirectUri);
        url.searchParams.set('scope', SpotifyModule.SCOPES);
        url.searchParams.set('code_challenge_method', 'S256');
        url.searchParams.set('code_challenge', challenge);
        url.searchParams.set('show_dialog', 'true'); // 強制顯示授權頁，確保新 scope 被同意
        window.location.href = url.toString();
    },

    async _handleCallback(code) {
        const cfg = JSON.parse(localStorage.getItem(SpotifyModule.LS_CONFIG) || 'null');
        const verifier = localStorage.getItem(SpotifyModule.LS_VERIFY);
        if (!cfg || !verifier) { SpotifyModule.render(); return; }
        try {
            const res = await fetch('https://accounts.spotify.com/api/token', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams({ client_id: cfg.clientId, grant_type: 'authorization_code', code, redirect_uri: cfg.redirectUri, code_verifier: verifier })
            });
            const data = await res.json();
            if (data.access_token) {
                SpotifyModule._saveToken(data);
                localStorage.removeItem(SpotifyModule.LS_VERIFY);
                SpotifyModule.render();
                SpotifyModule._startPolling();
            } else { SpotifyModule.render(); }
        } catch { SpotifyModule.render(); }
    },

    _saveToken(data) {
        SpotifyModule._token = data.access_token;
        if (data.refresh_token) SpotifyModule._refreshToken = data.refresh_token;
        SpotifyModule._expiry = Date.now() + (data.expires_in - 60) * 1000;
        localStorage.setItem(SpotifyModule.LS_TOKEN, JSON.stringify({ a: SpotifyModule._token, r: SpotifyModule._refreshToken, e: SpotifyModule._expiry }));
        localStorage.setItem('gpal_spotify_scope', SpotifyModule.SCOPES); // 記錄已授權的 scope
    },

    async _ensureToken() {
        if (Date.now() < SpotifyModule._expiry) return true;
        if (!SpotifyModule._refreshToken) return false;
        const cfg = JSON.parse(localStorage.getItem(SpotifyModule.LS_CONFIG) || 'null');
        if (!cfg) return false;
        try {
            const res = await fetch('https://accounts.spotify.com/api/token', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams({ client_id: cfg.clientId, grant_type: 'refresh_token', refresh_token: SpotifyModule._refreshToken })
            });
            const data = await res.json();
            if (data.access_token) { SpotifyModule._saveToken(data); return true; }
        } catch {}
        return false;
    },

    // ─── API ─────────────────────────────────────────────────────────────────
    async _api(path, method = 'GET', body = null) {
        if (!await SpotifyModule._ensureToken()) { SpotifyModule.disconnect(); return null; }
        const opts = { method, headers: { Authorization: `Bearer ${SpotifyModule._token}` } };
        if (body) { opts.body = JSON.stringify(body); opts.headers['Content-Type'] = 'application/json'; }
        try {
            const res = await fetch(`https://api.spotify.com/v1${path}`, opts);
            SpotifyModule._lastStatus = res.status;
            if (res.status === 401) { SpotifyModule.disconnect(); return null; }
            if (res.status === 204 || res.status === 202) return {};
            if (!res.ok) {
                try {
                    const err = await res.json();
                    SpotifyModule._lastError = err?.error?.message || `HTTP ${res.status}`;
                } catch { SpotifyModule._lastError = `HTTP ${res.status}`; }
                return null;
            }
            return res.json();
        } catch(e) { SpotifyModule._lastStatus = 0; SpotifyModule._lastError = 'Network error'; return null; }
    },

    async fetchNowPlaying() {
        const data = await SpotifyModule._api('/me/player?market=from_token');
        if (!data || !data.item) {
            SpotifyModule._track = null; SpotifyModule._playing = false;
        } else {
            const trackId = data.item.id;
            SpotifyModule._track = {
                id: trackId,
                name: data.item.name,
                artist: data.item.artists?.map(a => a.name).join(', ') || '',
                album: data.item.album?.name || '',
                art: data.item.album?.images?.[2]?.url || data.item.album?.images?.[0]?.url || '',
                duration: data.item.duration_ms || 0,
                progress: data.progress_ms || 0,
            };
            SpotifyModule._playing = data.is_playing;
            // 更新本地計時器基準（用於 EQ 精準定位）
            SpotifyModule._progressBase = data.progress_ms || 0;
            SpotifyModule._progressTimestamp = Date.now();
            // 換歌時重新獲取 audio analysis
            if (trackId !== SpotifyModule._lastTrackId) {
                SpotifyModule._lastTrackId = trackId;
                SpotifyModule._lyrics = []; SpotifyModule._lastLyricIdx = -1;
                const lb = document.getElementById('sp-lyrics-bar');
                if (lb) lb.textContent = '';
                SpotifyModule._fetchLyrics(SpotifyModule._track.name, SpotifyModule._track.artist, SpotifyModule._track.album);
            }
        }
        SpotifyModule._updateUI();
    },

    async togglePlay() {
        if (SpotifyModule._playing) {
            const res = await SpotifyModule._api('/me/player/pause', 'PUT');
            if (res !== null) { SpotifyModule._playing = false; SpotifyModule._updatePlayBtn(); }
        } else {
            await SpotifyModule._resumeOrStart();
        }
    },

    async _resumeOrStart() {
        // 先嘗試直接恢復播放
        let res = await SpotifyModule._api('/me/player/play', 'PUT');
        if (res !== null) { SpotifyModule._playing = true; SpotifyModule._updatePlayBtn(); return; }

        // 失敗（沒有活躍設備）→ 找第一個可用設備
        const devData = await SpotifyModule._api('/me/player/devices');
        const device = devData?.devices?.find(d => !d.is_restricted) || devData?.devices?.[0];
        if (device) {
            res = await SpotifyModule._api('/me/player/play?device_id=' + device.id, 'PUT');
            if (res !== null) {
                SpotifyModule._playing = true; SpotifyModule._updatePlayBtn();
                setTimeout(SpotifyModule.fetchNowPlaying, 800);
                return;
            }
        }
        // 所有設備都無法播放
        Utils.setStatus('SPOTIFY: Open Spotify on a device first', 'warn');
    },
    async next()        { await SpotifyModule._api('/me/player/next','POST'); setTimeout(SpotifyModule.fetchNowPlaying, 400); },
    async previous()    { await SpotifyModule._api('/me/player/previous','POST'); setTimeout(SpotifyModule.fetchNowPlaying, 400); },

    // ─── Playlists ────────────────────────────────────────────────────────────
    _playlists: [],
    _tracks: [],
    _tracksStatus: 'idle', // idle | loading | loaded | error
    _tracksError: '',
    _panelTab: 'playlists',
    _currentPlaylistId: null,
    _currentPlaylistName: '',
    _currentPlaylistUri: null,

    async fetchPlaylists() {
        const data = await SpotifyModule._api('/me/playlists?limit=50');
        if (!data?.items) return [];
        SpotifyModule._playlists = data.items.filter(Boolean);
        return SpotifyModule._playlists;
    },

    async selectPlaylist(id, name, uri) {
        SpotifyModule._currentPlaylistId = id;
        SpotifyModule._currentPlaylistName = name;
        SpotifyModule._currentPlaylistUri = uri;
        SpotifyModule._tracks = [];
        SpotifyModule._tracksStatus = 'loading';
        SpotifyModule._tracksError = '';
        SpotifyModule._panelTab = 'tracks';
        SpotifyModule.renderPanel();

        const data = await SpotifyModule._api(`/playlists/${encodeURIComponent(id)}/tracks?limit=100`);
        if (data?.items) {
            SpotifyModule._tracks = data.items.filter(i => i?.track?.id).map(i => i.track);
            SpotifyModule._tracksStatus = SpotifyModule._tracks.length ? 'loaded' : 'empty';
        } else {
            const st = SpotifyModule._lastStatus;
            if (st === 403) {
                // Spotify-generated playlist: just play it directly
                SpotifyModule.closePlaylistPanel();
                SpotifyModule.playPlaylist(SpotifyModule._currentPlaylistUri);
                return;
            }
            SpotifyModule._tracksError = st === 404 ? 'Playlist not found (404)' : st === 0 ? 'Network error' : `API error ${st}: ${SpotifyModule._lastError}`;
            SpotifyModule._tracksStatus = 'error';
        }
        SpotifyModule.renderPanel();
    },

    async playTrack(position) {
        const res = await SpotifyModule._api('/me/player/play', 'PUT', {
            context_uri: SpotifyModule._currentPlaylistUri,
            offset: { position }
        });
        if (res !== null) {
            SpotifyModule._playing = true;
            SpotifyModule._updatePlayBtn();
            setTimeout(SpotifyModule.fetchNowPlaying, 600);
        }
        SpotifyModule.closePlaylistPanel();
    },

    async playPlaylist(uri) {
        SpotifyModule.closePlaylistPanel();
        const res = await SpotifyModule._api('/me/player/play', 'PUT', { context_uri: uri });
        if (res !== null) {
            SpotifyModule._playing = true;
            SpotifyModule._updatePlayBtn();
            setTimeout(SpotifyModule.fetchNowPlaying, 600);
        }
    },

    switchTab(tab) {
        SpotifyModule._panelTab = tab;
        SpotifyModule.renderPanel();
    },

    async togglePlaylistPanel() {
        if (document.getElementById('sp-modal-backdrop')) { SpotifyModule.closePlaylistPanel(); return; }
        const btn = document.getElementById('sp-list-btn');
        if (btn) btn.classList.add('active');

        const backdrop = document.createElement('div');
        backdrop.className = 'sp-modal-backdrop';
        backdrop.id = 'sp-modal-backdrop';
        backdrop.addEventListener('click', e => { if (e.target === backdrop) SpotifyModule.closePlaylistPanel(); });

        const modal = document.createElement('div');
        modal.className = 'sp-modal';
        modal.id = 'sp-modal';

        // 事件委托：處理 playlist 和 track 點擊
        modal.addEventListener('click', e => {
            const plItem = e.target.closest('[data-pl-index]');
            if (plItem) {
                const p = SpotifyModule._playlists[+plItem.dataset.plIndex];
                if (p) SpotifyModule.selectPlaylist(p.id, p.name, p.uri);
                return;
            }
            const trItem = e.target.closest('[data-track-index]');
            if (trItem) SpotifyModule.playTrack(+trItem.dataset.trackIndex);
        });

        backdrop.appendChild(modal);
        document.body.appendChild(backdrop);

        if (!SpotifyModule._playlists.length) {
            modal.innerHTML = `<div class="sp-modal-header"><span class="sp-modal-title">♪ SPOTIFY</span><button class="sp-modal-close" onclick="SpotifyModule.closePlaylistPanel()">✕</button></div><div class="sp-panel-content" style="padding:14px;"><div class="sp-pl-header">LOADING...</div></div>`;
            await SpotifyModule.fetchPlaylists();
        }
        SpotifyModule.renderPanel();
    },

    closePlaylistPanel() {
        const backdrop = document.getElementById('sp-modal-backdrop');
        if (backdrop) backdrop.remove();
        const btn = document.getElementById('sp-list-btn');
        if (btn) btn.classList.remove('active');
    },

    renderPanel() {
        const modal = document.getElementById('sp-modal');
        if (!modal) return;
        const tab = SpotifyModule._panelTab;
        const plName = SpotifyModule._currentPlaylistName || 'TRACKS';

        modal.innerHTML = `
            <div class="sp-modal-header">
                <span class="sp-modal-title">♪ SPOTIFY</span>
                <button class="sp-modal-close" onclick="SpotifyModule.closePlaylistPanel()">✕</button>
            </div>
            <div class="sp-panel-tabs">
                <button class="sp-tab-btn ${tab==='playlists'?'active':''}" onclick="SpotifyModule.switchTab('playlists')">PLAYLISTS</button>
                <button class="sp-tab-btn ${tab==='tracks'?'active':''}" onclick="SpotifyModule.switchTab('tracks')" title="${plName}">${plName}</button>
            </div>
            <div class="sp-panel-content">
                ${tab === 'playlists' ? SpotifyModule._renderPlaylists() : SpotifyModule._renderTracks()}
            </div>`;
    },

    _renderPlaylists() {
        if (!SpotifyModule._playlists.length)
            return `<div class="sp-pl-header"><span>NO_PLAYLISTS · RECONNECT SPOTIFY</span></div>`;
        return SpotifyModule._playlists.map((p, i) => `
            <div class="sp-pl-item" data-pl-index="${i}">
                ${p.images?.[0]?.url
                    ? `<img class="sp-pl-img" src="${p.images[0].url}" alt="">`
                    : `<div class="sp-pl-img" style="background:rgba(29,185,84,0.08);display:flex;align-items:center;justify-content:center;font-size:11px;color:rgba(29,185,84,0.35)">♪</div>`}
                <span class="sp-pl-name">${p.name}</span>
                <span class="sp-pl-count">${p.tracks?.total??''}</span>
            </div>`).join('');
    },

    _renderTracks() {
        const st = SpotifyModule._tracksStatus;
        if (st === 'loading')
            return `<div class="sp-pl-header"><span>⟳ LOADING TRACKS...</span></div>`;
        if (st === 'forbidden')
            return `<div style="padding:16px 14px;text-align:center;">
                <div style="font-family:'Orbitron',sans-serif;font-size:10px;color:rgba(255,180,0,0.7);letter-spacing:1px;margin-bottom:6px;">
                    ⚠ SPOTIFY RESTRICTED PLAYLIST
                </div>
                <div style="font-family:'Rajdhani',sans-serif;font-size:13px;color:rgba(255,255,255,0.4);margin-bottom:14px;line-height:1.4;">
                    Daily Mix, Discover Weekly and other Spotify-generated<br>playlists cannot show tracks via API.<br>You can still play the whole playlist.
                </div>
                <button class="sp-btn" style="font-size:12px;padding:8px 24px;"
                    onclick="SpotifyModule.playPlaylist('${SpotifyModule._currentPlaylistUri}');SpotifyModule.closePlaylistPanel();">
                    ▷ PLAY ALL
                </button>
            </div>`;
        if (st === 'error')
            return `<div style="padding:14px;">
                <div class="sp-pl-header" style="color:rgba(255,80,80,0.8);border-color:rgba(255,80,80,0.2);">
                    <span>✕ ${SpotifyModule._tracksError}</span>
                </div>
                <div style="margin-top:10px;">
                    <button class="sp-btn" onclick="SpotifyModule.disconnect()" style="font-size:10px;padding:6px 14px;">DISCONNECT &amp; RECONNECT</button>
                </div>
            </div>`;
        if (st === 'empty')
            return `<div class="sp-pl-header"><span>NO TRACKS FOUND</span></div>`;
        if (!SpotifyModule._tracks.length)
            return `<div class="sp-pl-header"><span>SELECT A PLAYLIST FIRST</span></div>`;
        return SpotifyModule._tracks.map((t, i) => {
            const m = Math.floor(t.duration_ms/60000);
            const s = String(Math.floor((t.duration_ms%60000)/1000)).padStart(2,'0');
            const artist = t.artists?.map(a=>a.name).join(', ')||'';
            return `<div class="sp-pl-item" data-track-index="${i}">
                <span class="sp-track-num">${i+1}</span>
                <div class="sp-track-info">
                    <div class="sp-pl-name">${t.name}</div>
                    <div class="sp-track-artist">${artist}</div>
                </div>
                <span class="sp-pl-count">${m}:${s}</span>
            </div>`;
        }).join('');
    },

    disconnect() {
        clearInterval(SpotifyModule._pollTimer);
        clearInterval(SpotifyModule._lyricsTimer); SpotifyModule._lyricsTimer = null;
        SpotifyModule._token = null; SpotifyModule._refreshToken = null;
        SpotifyModule._track = null; SpotifyModule._playing = false;
        SpotifyModule._lastTrackId = null;
        SpotifyModule._lyrics = [];
        const lb = document.getElementById('sp-lyrics-bar');
        if (lb) { lb.style.display = 'none'; lb.textContent = ''; }
        localStorage.removeItem(SpotifyModule.LS_TOKEN);
        SpotifyModule.render();
    },

    _startPolling() {
        clearInterval(SpotifyModule._pollTimer);
        SpotifyModule.fetchNowPlaying();
        SpotifyModule._pollTimer = setInterval(SpotifyModule.fetchNowPlaying, 30000);
        clearInterval(SpotifyModule._lyricsTimer);
        SpotifyModule._lyricsTimer = setInterval(SpotifyModule._tickLyrics, 1000);
    },

    // ─── Lyrics ───────────────────────────────────────────────────────────────
    _estimateProgress() {
        if (!SpotifyModule._playing) return SpotifyModule._progressBase;
        return SpotifyModule._progressBase + (Date.now() - SpotifyModule._progressTimestamp);
    },

    async _fetchLyrics(trackName, artistName, albumName) {
        try {
            const params = new URLSearchParams({ track_name: trackName, artist_name: artistName, album_name: albumName || '' });
            const res = await fetch(`https://lrclib.net/api/get?${params}`);
            if (!res.ok) return;
            const data = await res.json();
            if (data.syncedLyrics) {
                SpotifyModule._lyrics = SpotifyModule._parseLRC(data.syncedLyrics);
                const lb = document.getElementById('sp-lyrics-bar');
                if (lb) lb.style.display = 'block';
            }
        } catch {}
    },

    _parseLRC(lrc) {
        const lines = [];
        for (const line of lrc.split('\n')) {
            const m = line.match(/^\[(\d+):(\d{2})\.(\d+)\]\s*(.*)/);
            if (m) {
                const time = parseInt(m[1]) * 60 + parseInt(m[2]) + parseInt(m[3]) / 100;
                const text = m[4].trim();
                if (text) lines.push({ time, text });
            }
        }
        return lines.sort((a, b) => a.time - b.time);
    },

    _tickLyrics() {
        const lb = document.getElementById('sp-lyrics-bar');
        if (!lb) return;
        if (!SpotifyModule._playing || !SpotifyModule._lyrics.length) return;

        const sec = SpotifyModule._estimateProgress() / 1000 + 0.5; // 提前 0.5 秒顯示
        let idx = 0;
        for (let i = 0; i < SpotifyModule._lyrics.length; i++) {
            if (SpotifyModule._lyrics[i].time <= sec) idx = i;
            else break;
        }

        if (idx !== SpotifyModule._lastLyricIdx) {
            SpotifyModule._lastLyricIdx = idx;
            const text = SpotifyModule._lyrics[idx]?.text || '';
            lb.style.opacity = '0';
            setTimeout(() => {
                lb.textContent = text;
                lb.style.opacity = '1';
            }, 150);
        }
    },


    // ─── UI ──────────────────────────────────────────────────────────────────
    render() {
        const bar = document.getElementById('spotify-bar');
        if (!bar) return;
        const cfg = JSON.parse(localStorage.getItem(SpotifyModule.LS_CONFIG) || 'null');
        if (!SpotifyModule._token) {
            bar.innerHTML = `<div class="sp-connect-row">
                <span class="sp-label">♬ SPOTIFY</span>
                <input id="sp-client-id" class="sp-input" placeholder="Spotify Client ID" type="text" value="${cfg?.clientId || ''}">
                <button class="sp-btn" onclick="SpotifyModule.authorize()">CONNECT</button>
            </div>`;
            const lb = document.getElementById('sp-lyrics-bar');
            if (lb) { lb.style.display = 'none'; lb.textContent = ''; }
        } else {
            const playing = SpotifyModule._playing;
            bar.innerHTML = `<div class="sp-player">
                <img id="sp-art" class="sp-art" src="" alt="">
                <div class="sp-info">
                    <div id="sp-track" class="sp-track">—</div>
                    <div id="sp-artist" class="sp-artist">—</div>
                </div>
                <div class="sp-mid">
                    <div class="sp-controls">
                        <button class="sp-ctrl-btn" onclick="SpotifyModule.previous()" title="Previous">◁◁</button>
                        <button class="sp-ctrl-btn sp-play-btn" id="sp-play-btn" onclick="SpotifyModule.togglePlay()">${playing ? 'II' : '▷'}</button>
                        <button class="sp-ctrl-btn" onclick="SpotifyModule.next()" title="Next">▷▷</button>
                    </div>
                    <div class="sp-progress-wrap"><div id="sp-prog" class="sp-progress-bar"></div></div>
                </div>
                <button class="sp-list-btn" id="sp-list-btn" onclick="SpotifyModule.togglePlaylistPanel()" title="My Playlists">≡</button>
                <button class="sp-disconnect-btn" onclick="SpotifyModule.disconnect()" title="Disconnect">✕</button>
            </div>`;
            SpotifyModule._updateUI();
        }
    },

    _updateUI() {
        const t = SpotifyModule._track;
        const artEl  = document.getElementById('sp-art');
        const trackEl  = document.getElementById('sp-track');
        const artistEl = document.getElementById('sp-artist');
        const progEl   = document.getElementById('sp-prog');
        if (t) {
            if (artEl)    { artEl.src = t.art; artEl.style.display = t.art ? '' : 'none'; }
            if (trackEl)  trackEl.textContent = t.name;
            if (artistEl) artistEl.textContent = t.artist;
            if (progEl && t.duration) progEl.style.width = (t.progress / t.duration * 100).toFixed(1) + '%';
        } else {
            if (trackEl)  trackEl.textContent = '—';
            if (artistEl) artistEl.textContent = '—';
            if (progEl)   progEl.style.width = '0%';
        }
        SpotifyModule._updatePlayBtn();
    },

    _updatePlayBtn() {
        const btn = document.getElementById('sp-play-btn');
        if (btn) btn.textContent = SpotifyModule._playing ? 'II' : '▷';
        if (!SpotifyModule._playing) {
            clearInterval(SpotifyModule._lyricsTimer); SpotifyModule._lyricsTimer = null;
        } else {
            if (!SpotifyModule._lyricsTimer)
                SpotifyModule._lyricsTimer = setInterval(SpotifyModule._tickLyrics, 1000);
        }
    },

    // ─── PKCE Helpers ────────────────────────────────────────────────────────
    _randomStr() {
        const arr = new Uint8Array(32);
        crypto.getRandomValues(arr);
        return btoa(String.fromCharCode(...arr)).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
    },
    async _sha256b64(str) {
        const data = new TextEncoder().encode(str);
        const digest = await crypto.subtle.digest('SHA-256', data);
        return btoa(String.fromCharCode(...new Uint8Array(digest))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
    },
};

// ── Global fetch interceptor: auto-inject member (skip shared data types) ──
(function() {
    const _origFetch = window.fetch.bind(window);
    const _SHARED_TYPES = new Set(['portfolio','expense','expense_delete','expense_edit','watchlist','weather','trade']);
    function isShared(url, body) {
        // Check URL param: ?type=expense
        if (/[?&]type=([^&]+)/.test(url)) return _SHARED_TYPES.has(RegExp.$1);
        // Check JSON body: {"type":"expense"}
        if (body) { try { return _SHARED_TYPES.has(JSON.parse(body).type || ''); } catch {} }
        return false;
    }
    window.fetch = function(url, options = {}) {
        if (typeof url === 'string' && typeof CONFIG !== 'undefined' &&
            url.includes(CONFIG.WEB_APP_URL.split('?')[0]) &&
            !isShared(url, options.body)) {
            const member = (typeof MemberModule !== 'undefined') ? MemberModule.current() : 'dad';
            const sep = url.includes('?') ? '&' : '?';
            if (!url.includes('member=')) url = url + sep + 'member=' + encodeURIComponent(member);
            if (options.method === 'POST' && options.body) {
                try {
                    const body = JSON.parse(options.body);
                    if (!body.member) { body.member = member; options = { ...options, body: JSON.stringify(body) }; }
                } catch {}
            }
        }
        return _origFetch(url, options);
    };
})();


// ---------- SYNC MODULE ----------
const Sync = {
    // 預取前後各1天（±1），並行請求
    _addDays(dateStr, n) {
        const d = new Date(dateStr + 'T12:00:00');
        d.setDate(d.getDate() + n);
        return `${d.getFullYear()}-${Utils.pad2(d.getMonth()+1)}-${Utils.pad2(d.getDate())}`;
    },

    async prefetchDays(centerDate) {
        const PREFETCH_KEY = (d) => `gpal_prefetch_${d}_${MemberModule.current()}`;
        const prevDate = Sync._addDays(centerDate, -1);
        const nextDate = Sync._addDays(centerDate, 1);

        const needsFetch = (date) => {
            try {
                const raw = localStorage.getItem(PREFETCH_KEY(date));
                if (!raw) return true;
                const { ts } = JSON.parse(raw);
                return Date.now() - ts > 86400000;
            } catch { return true; }
        };

        const fetchOne = async (date) => {
            if (!needsFetch(date)) return;
            try {
                const data = await SB.getBundle(MemberModule.current(), date);
                localStorage.setItem(PREFETCH_KEY(date), JSON.stringify({ data, ts: Date.now() }));
            } catch {}
        };

        setTimeout(() => {
            fetchOne(prevDate);
            setTimeout(() => fetchOne(nextDate), 500);
        }, 1500);
    },

    loadFromCache(date) {
        try {
            const raw = localStorage.getItem(`gpal_prefetch_${date}_${MemberModule.current()}`);
            if (!raw) return false;
            const { data, ts } = JSON.parse(raw);
            if (Date.now() - ts > 86400000) return false;
            GoalModule.parseAll(data.goal || '');
            PlanModule.parseAll(data.plan || '');
            ActionModule.parseAll(data.action || '');
            LearnModule.parseAll(data.learn || '');
            return true;
        } catch(e) { return false; }
    },

    async fetchData() {
        const token = ++State.fetchToken;
        Utils.setStatus('>> SYNCING...', 'warn');
        Utils.setConnState('syncing');
        const syncBtn = document.getElementById('btn-nav-sync');
        if (syncBtn) syncBtn.classList.add('spinning');

        const date = DOM.datePicker.value;
        Utils.updateDateLabel(date);

        // 先從緩存即時顯示，記錄快照供後續比對
        const cacheHit = Sync.loadFromCache(date);
        const cacheSnapshot = cacheHit ? localStorage.getItem(`gpal_prefetch_${date}`) : null;

        try {
            const yesterday = new Date(date + 'T12:00:00');
            yesterday.setDate(yesterday.getDate() - 1);
            const yDate = `${yesterday.getFullYear()}-${Utils.pad2(yesterday.getMonth()+1)}-${Utils.pad2(yesterday.getDate())}`;
            const isToday = date === Utils.todayISO();

            const [res, yRes] = await Promise.all([
                SB.getBundle(MemberModule.current(), date),
                isToday ? SB.getBundle(MemberModule.current(), yDate) : Promise.resolve(null),
            ]);

            const data = res;
            if (token !== State.fetchToken) return;
            State.currentData = data;

            let goalRaw = data.goal || '';
            if (isToday && yRes) {
                try {
                    const yData = yRes;
                    if (yData.goal) {
                        const parseGoalObj = (raw) => {
                            if (!raw) return null;
                            try { const p = JSON.parse(raw); if (p && p.v === 2 && p.p) return p.p; } catch {}
                            return { [MemberModule.current()]: raw };
                        };
                        const todayObj = parseGoalObj(goalRaw) || {};
                        const yObj    = parseGoalObj(yData.goal) || {};
                        [MemberModule.current()].forEach(name => {
                            const yGoal    = yObj[name] || '';
                            const incomplete = yGoal.split('\n').filter(l => l.trim() && l.startsWith('[ ]'));
                            if (!incomplete.length) return;
                            const todayGoal  = todayObj[name] || '';
                            const todayTexts = new Set(todayGoal.split('\n').map(l =>
                                l.replace(/^\[[ x]\]\s*\((P[1-3]|NONE)\)\s*/, '').replace(/^\[[ x]\]\s*/, '').trim()
                            ));
                            const toAdd = incomplete.filter(l => {
                                const txt = l.replace(/^\[ \]\s*\((P[1-3]|NONE)\)\s*/, '').replace(/^\[ \]\s*/, '').trim();
                                return txt && !todayTexts.has(txt);
                            });
                            if (toAdd.length) todayObj[name] = todayGoal ? todayGoal + '\n' + toAdd.join('\n') : toAdd.join('\n');
                        });
                        goalRaw = JSON.stringify({ v: 2, p: todayObj });
                    }
                } catch(e) {}
            }

            // 若緩存命中且資料無變化，跳過重渲染
            const cacheData = cacheSnapshot ? JSON.parse(cacheSnapshot).data : null;
            const dataChanged = !cacheData ||
                cacheData.goal  !== data.goal  ||
                cacheData.plan  !== data.plan  ||
                cacheData.learn !== data.learn ||
                cacheData.action !== data.action;

            if (dataChanged || !cacheHit) {
                GoalModule.parseAll(goalRaw);
                PlanModule.parseAll(data.plan);
                ActionModule.parseAll(data.action || '');
                LearnModule.parseAll(data.learn || '');
            }
            StreakModule.checkAndUpdate(date);

            Utils.setStatus('STARK_OS_ONLINE', 'success');
            Utils.setConnState('online');
            State.isOnline = true;

            const backup = Utils.loadLocalBackup(date);
            if (backup && backup.payload) {
                Utils.setStatus('LOCAL_BACKUP_FOUND', 'warn');
            }

            // 將當天資料存入 prefetch cache（下次切回即時顯示）
            try {
                localStorage.setItem(`gpal_prefetch_${date}`, JSON.stringify({ data, ts: Date.now() }));
            } catch(e) {}

            // 背景預取 ±3 天
            Sync.prefetchDays(date);
        } catch (e) {
            if (token !== State.fetchToken) return;
            Utils.setStatus('LINK_FAILURE — using local', 'error');
            Utils.setConnState('offline');
            State.isOnline = false;

            const backup = Utils.loadLocalBackup(date);
            if (backup && backup.payload) {
                const p = backup.payload;
                GoalModule.parseAll(p.goal || '');
                PlanModule.parseAll(p.plan || '');
                ActionModule.parseAll(p.action || '');
                LearnModule.parseAll(p.learn || '');
            } else if (!cacheHit) {
                GoalModule.parseAll('');
                PlanModule.parseAll('');
                ActionModule.parseAll('');
                LearnModule.parseAll('');
            }
        } finally {
            const syncBtn = document.getElementById('btn-nav-sync');
            if (syncBtn) syncBtn.classList.remove('spinning');
            }
    },

    async save(mode = 'MANUAL') {
        if (State.isSyncing) return;
        State.isSyncing = true;

        try {
            const payload = {
                date: DOM.datePicker.value,
                goal:   GoalModule.serializeAll(),
                plan:   PlanModule.serializeAll(),
                action: ActionModule.serializeAll(),
                learn:  LearnModule.serializeAll(),
            };

            // 先寫本地備份，再嘗試雲端
            Utils.backupToLocal(payload.date, payload);

            Utils.setStatus('>> UPLOADING...', 'warn');
            Utils.setConnState('syncing');

            await SB.saveBundle(MemberModule.current(), payload.date, {
                goal: payload.goal, plan: payload.plan,
                action: payload.action, learn: payload.learn,
            });

            if (payload.plan && payload.plan.includes('@')) {
                SB.syncTaggedPlans(MemberModule.current(), payload.date, payload.plan)
                  .catch(e => console.warn('syncTaggedPlans:', e));
            }

            Utils.setStatus(`ARCHIVE_SYNCED · ${mode}`, 'success');
            Utils.setConnState('online');
            State.isOnline = true;
            State.dirty = false;
            Utils.clearLocalBackup(payload.date);
        } catch (e) {
            Utils.setStatus('UPLOAD_ERROR · LOCAL_SAVED', 'error');
            Utils.setConnState('offline');
            State.isOnline = false;
            console.error('[Sync.save] failed:', e);
        } finally {
            State.isSyncing = false;
        }
    },

    async refreshPortfolio() {
        // Portfolio HUD removed in Family version - but still sync periodically
    },
};
