// ---------- MEMBER MANAGER ----------
const MemberMgr = {
    KEY: 'gpal_members',
    names: ['A', 'B', 'C'],
    init() {
        try {
            const saved = JSON.parse(localStorage.getItem(this.KEY));
            if (Array.isArray(saved) && saved.length === 3) this.names = saved;
        } catch {}
        if (!localStorage.getItem(this.KEY)) {
            try {
                const old = JSON.parse(localStorage.getItem('gpal_plan_members'));
                if (Array.isArray(old) && old.length === 3) { this.names = old; localStorage.setItem(this.KEY, JSON.stringify(this.names)); }
            } catch {}
        }
        this.renderSwitcher();
    },
    renderSwitcher() {
        const container = document.getElementById('member-switcher');
        if (!container) return;
        container.innerHTML = '';
        this.names.forEach((name, idx) => {
            const btn = document.createElement('button');
            const isActive = idx === State.memberIdx;
            btn.className = 'member-tab' + (isActive ? ' active' : '');
            btn.title = isActive ? 'Tap to rename' : name;

            const span = document.createElement('span');
            span.textContent = isActive ? name + ' ✎' : name;

            const startRename = (e) => {
                e.stopPropagation();
                span.textContent = name;
                const inp = document.createElement('input');
                inp.className = 'tab-name-input';
                inp.value = name;
                inp.style.cssText = 'background:transparent;border:none;color:var(--stark-cyan);font:inherit;letter-spacing:2px;outline:none;text-align:center;width:80px;';
                span.replaceWith(inp);
                inp.focus(); inp.select();
                const confirm = () => {
                    const newName = inp.value.trim() || name;
                    MemberMgr.names[idx] = newName;
                    try { localStorage.setItem(MemberMgr.KEY, JSON.stringify(MemberMgr.names)); } catch {}
                    MemberMgr.renderSwitcher();
                };
                inp.addEventListener('blur', confirm);
                inp.addEventListener('keydown', (ke) => {
                    if (ke.key === 'Enter') inp.blur();
                    if (ke.key === 'Escape') MemberMgr.renderSwitcher();
                });
            };

            btn.onclick = (e) => {
                if (e.target.classList.contains('tab-name-input')) return;
                if (isActive) startRename(e);
                else switchMember(idx);
            };

            btn.appendChild(span);
            container.appendChild(btn);
        });
    },
};

function switchMember(idx) {
    if (idx === State.memberIdx) return;
    GoalModule.saveCurrent();
    PlanModule.saveCurrent();
    ActionModule.saveCurrent();
    LearnModule.saveCurrent();
    State.memberIdx = idx;
    MemberMgr.renderSwitcher();
    GoalModule.renderCurrent();
    PlanModule.renderCurrent();
    ActionModule.renderCurrent();
    LearnModule.renderCurrent();
    LongTermModule.render();
}

// ---------- LONGTERM GOAL MODULE ----------
const LongTermModule = {
    LS_KEY: 'gpal_longterm',
    data: {},
    _saveTimer: null,
    _lastRenderedKey: null,

    currentGoals() {
        const name = MemberMgr.names[State.memberIdx];
        if (!Array.isArray(LongTermModule.data[name])) LongTermModule.data[name] = [];
        return LongTermModule.data[name];
    },

    async init() {
        try {
            const cached = JSON.parse(localStorage.getItem(LongTermModule.LS_KEY) || 'null');
            if (cached && typeof cached === 'object') LongTermModule.data = cached;
        } catch {}
        LongTermModule.render();
        try {
            const res = await Utils.safeFetch(`${CONFIG.WEB_APP_URL}?type=longterm`);
            const json = await res.json();
            if (json.goals && typeof json.goals === 'object') {
                if (json.found !== false) {
                    LongTermModule.data = json.goals;
                    LongTermModule._lastRenderedKey = null;
                    try { localStorage.setItem(LongTermModule.LS_KEY, JSON.stringify(LongTermModule.data)); } catch {}
                    LongTermModule.render();
                }
            }
        } catch {}
    },

    triggerSave() {
        try { localStorage.setItem(LongTermModule.LS_KEY, JSON.stringify(LongTermModule.data)); } catch {}
        if (LongTermModule._saveTimer) clearTimeout(LongTermModule._saveTimer);
        LongTermModule._saveTimer = setTimeout(async () => {
            try {
                const res = await Utils.safeFetch(CONFIG.WEB_APP_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ type: 'longterm', data: LongTermModule.data })
                });
                const json = await res.json();
                if (!json.success) throw new Error('save failed');
            } catch(e) {
                Utils.setStatus('LONGTERM_SAVE_ERR · LOCAL_SAVED', 'error');
            }
        }, 3000);
    },

    render() {
        const listEl = document.getElementById('lt-goal-list');
        if (!listEl) return;
        const goals = LongTermModule.currentGoals();
        const today = Utils.todayISO();

        const autoChanged = goals.some(g => !g.done && g.deadline && g.deadline <= today);
        if (autoChanged) {
            goals.forEach(g => { if (!g.done && g.deadline && g.deadline <= today) g.done = true; });
            LongTermModule.triggerSave();
        }

        const cacheKey = State.memberIdx + '|' + JSON.stringify(goals);
        if (cacheKey === LongTermModule._lastRenderedKey) return;
        LongTermModule._lastRenderedKey = cacheKey;

        listEl.replaceChildren();
        if (!goals.length) return;
        const frag = document.createDocumentFragment();
        goals.forEach(g => {
            const row = document.createElement('div');
            row.className = 'lt-goal-row' + (g.done ? ' lt-done' : '');
            row.dataset.ltId = g.id;
            const cb = document.createElement('input');
            cb.type = 'checkbox'; cb.className = 'stark-checkbox'; cb.checked = g.done; cb.dataset.role = 'lt-check';
            const textContainer = document.createElement('div');
            textContainer.className = 'lt-text-container' + (g.done ? ' completed' : '');
            const textEl = document.createElement('input');
            textEl.type = 'text'; textEl.className = 'lt-goal-input' + (g.done ? ' completed' : '');
            textEl.value = g.text; textEl.placeholder = 'Long term goal...'; textEl.dataset.role = 'lt-text';
            textContainer.appendChild(textEl);
            const deadlineWrap = document.createElement('div');
            deadlineWrap.className = 'lt-deadline-wrap';
            const dateEl = document.createElement('input');
            dateEl.type = 'date'; dateEl.className = 'lt-deadline-input';
            dateEl.value = g.deadline || ''; dateEl.dataset.role = 'lt-deadline';
            const dateIcon = document.createElement('span');
            dateIcon.className = 'lt-date-icon';
            dateIcon.textContent = 'DEADLINE';
            dateIcon.title = g.deadline ? g.deadline : 'Set deadline';
            const daysEl = document.createElement('span');
            daysEl.className = 'lt-days';
            if (g.done) { daysEl.textContent = '✓ DONE'; daysEl.classList.add('lt-complete'); }
            else if (g.deadline) {
                const mmdd = g.deadline.slice(5);
                const diff = Math.ceil((new Date(g.deadline + 'T12:00:00') - new Date(today + 'T12:00:00')) / 86400000);
                if (diff < 0)       { daysEl.textContent = `${mmdd} · ${Math.abs(diff)}d OVR`; daysEl.classList.add('lt-overdue'); }
                else if (diff === 0){ daysEl.textContent = `${mmdd} · TODAY`; daysEl.classList.add('lt-today'); }
                else                { daysEl.textContent = `${mmdd} · ${diff}d`; }
            }
            const delBtn = document.createElement('div');
            delBtn.className = 'del-btn'; delBtn.textContent = 'X'; delBtn.dataset.role = 'lt-del';
            deadlineWrap.append(dateEl, dateIcon, daysEl);
            row.append(cb, textContainer, deadlineWrap, delBtn);
            frag.appendChild(row);
        });
        listEl.appendChild(frag);
    },

    add() {
        const goals = LongTermModule.currentGoals();
        goals.push({ id: 'lt_' + Date.now(), text: '', deadline: '', done: false });
        LongTermModule.render();
        const listEl = document.getElementById('lt-goal-list');
        const lastInput = listEl?.lastElementChild?.querySelector('[data-role=lt-text]');
        if (lastInput) lastInput.focus();
        LongTermModule.triggerSave();
    },

    handleClick(e) {
        const row = e.target.closest('.lt-goal-row');
        if (!row) return;
        const id = row.dataset.ltId;
        const goals = LongTermModule.currentGoals();
        const idx = goals.findIndex(g => g.id === id);
        if (idx < 0) return;
        if (e.target.dataset.role === 'lt-check') {
            goals[idx].done = e.target.checked;
            const textContainer = row.querySelector('.lt-text-container');
            const textInput     = row.querySelector('[data-role=lt-text]');
            const daysEl        = row.querySelector('.lt-days');
            if (textContainer) textContainer.classList.toggle('completed', goals[idx].done);
            if (textInput)     textInput.classList.toggle('completed', goals[idx].done);
            if (daysEl) {
                daysEl.className = 'lt-days';
                if (goals[idx].done) { daysEl.textContent = '✓ DONE'; daysEl.classList.add('lt-complete'); }
                else if (goals[idx].deadline) {
                    const today = Utils.todayISO();
                    const mmdd = goals[idx].deadline.slice(5);
                    const diff = Math.ceil((new Date(goals[idx].deadline + 'T12:00:00') - new Date(today + 'T12:00:00')) / 86400000);
                    if (diff < 0)       { daysEl.textContent = `${mmdd} · ${Math.abs(diff)}d OVR`; daysEl.classList.add('lt-overdue'); }
                    else if (diff === 0){ daysEl.textContent = `${mmdd} · TODAY`; daysEl.classList.add('lt-today'); }
                    else                { daysEl.textContent = `${mmdd} · ${diff}d`; }
                } else { daysEl.textContent = ''; }
            }
            LongTermModule.triggerSave();
        } else if (e.target.dataset.role === 'lt-del') {
            goals.splice(idx, 1);
            LongTermModule.render(); LongTermModule.triggerSave();
        }
    },
    handleInput(e) {
        const row = e.target.closest('.lt-goal-row');
        if (!row) return;
        const goal = LongTermModule.currentGoals().find(g => g.id === row.dataset.ltId);
        if (!goal) return;
        if (e.target.dataset.role === 'lt-text') { goal.text = e.target.value; }
        if (e.target.dataset.role === 'lt-deadline') {
            goal.deadline = e.target.value;
            const daysEl = row.querySelector('.lt-days');
            if (daysEl) {
                daysEl.className = 'lt-days';
                if (goal.done) { daysEl.textContent = '✓ DONE'; daysEl.classList.add('lt-complete'); }
                else if (goal.deadline) {
                    const today = Utils.todayISO();
                    const mmdd = goal.deadline.slice(5);
                    const diff = Math.ceil((new Date(goal.deadline + 'T12:00:00') - new Date(today + 'T12:00:00')) / 86400000);
                    if (diff < 0)       { daysEl.textContent = `${mmdd} · ${Math.abs(diff)}d OVR`; daysEl.classList.add('lt-overdue'); }
                    else if (diff === 0){ daysEl.textContent = `${mmdd} · TODAY`; daysEl.classList.add('lt-today'); }
                    else                { daysEl.textContent = `${mmdd} · ${diff}d`; }
                } else { daysEl.textContent = ''; }
            }
            LongTermModule._lastRenderedKey = null;
        }
        LongTermModule.triggerSave();
    },
};

// ---------- SYNC MODULE ----------
const Sync = {
    // 預取 ±3 天資料
    async prefetchDays(centerDate) {
        const PREFETCH_KEY = (d) => `gpal_prefetch_${d}`;
        const addDays = (dateStr, n) => {
            const d = new Date(dateStr + 'T12:00:00');
            d.setDate(d.getDate() + n);
            return `${d.getFullYear()}-${Utils.pad2(d.getMonth()+1)}-${Utils.pad2(d.getDate())}`;
        };
        for (const offset of [-3,-2,-1,1,2,3]) {
            const targetDate = addDays(centerDate, offset);
            try {
                const res  = await Utils.safeFetch(`${CONFIG.WEB_APP_URL}?date=${targetDate}`, {}, 1);
                const data = await res.json();
                localStorage.setItem(PREFETCH_KEY(targetDate), JSON.stringify({ data, ts: Date.now() }));
            } catch(e) {}
            await new Promise(r => setTimeout(r, 300));
        }
    },

    loadFromCache(date) {
        try {
            const raw = localStorage.getItem(`gpal_prefetch_${date}`);
            if (!raw) return false;
            const { data, ts } = JSON.parse(raw);
            if (Date.now() - ts > 86400000) return false;
            GoalModule.parseAll(data.goal || '');
            PlanModule.parseAll(data.plan || '');
            ActionModule.parseAll(data.action || '');
            LearnModule.parseAll(data.learn || '');
            return true;
        } catch(e) { return false; }
    },

    async fetchData() {
        const token = ++State.fetchToken;
        Utils.setStatus('>> SYNCING...', 'warn');
        Utils.setConnState('syncing');
        const syncBtn = document.getElementById('btn-nav-sync');
        if (syncBtn) syncBtn.classList.add('spinning');

        const date = DOM.datePicker.value;
        Utils.updateDateLabel(date);

        // 先從緩存即時顯示，記錄快照供後續比對
        const cacheHit = Sync.loadFromCache(date);
        const cacheSnapshot = cacheHit ? localStorage.getItem(`gpal_prefetch_${date}`) : null;

        try {
            const yesterday = new Date(date + 'T12:00:00');
            yesterday.setDate(yesterday.getDate() - 1);
            const yDate = `${yesterday.getFullYear()}-${Utils.pad2(yesterday.getMonth()+1)}-${Utils.pad2(yesterday.getDate())}`;
            const isToday = date === Utils.todayISO();

            const [res, yRes] = await Promise.all([
                Utils.safeFetch(`${CONFIG.WEB_APP_URL}?date=${date}`),
                isToday ? Utils.safeFetch(`${CONFIG.WEB_APP_URL}?date=${yDate}`, {}, 1) : Promise.resolve(null),
            ]);

            const data = await res.json();
            if (token !== State.fetchToken) return;
            State.currentData = data;

            let goalRaw = data.goal || '';
            if (isToday && yRes) {
                try {
                    const yData = await yRes.json();
                    if (yData.goal) {
                        const parseGoalObj = (raw) => {
                            if (!raw) return null;
                            try { const p = JSON.parse(raw); if (p && p.v === 2 && p.p) return p.p; } catch {}
                            return { [MemberMgr.names[0]]: raw };
                        };
                        const todayObj = parseGoalObj(goalRaw) || {};
                        const yObj    = parseGoalObj(yData.goal) || {};
                        MemberMgr.names.forEach(name => {
                            const yGoal    = yObj[name] || '';
                            const incomplete = yGoal.split('\n').filter(l => l.trim() && l.startsWith('[ ]'));
                            if (!incomplete.length) return;
                            const todayGoal  = todayObj[name] || '';
                            const todayTexts = new Set(todayGoal.split('\n').map(l =>
                                l.replace(/^\[[ x]\]\s*\((P[1-3]|NONE)\)\s*/, '').replace(/^\[[ x]\]\s*/, '').trim()
                            ));
                            const toAdd = incomplete.filter(l => {
                                const txt = l.replace(/^\[ \]\s*\((P[1-3]|NONE)\)\s*/, '').replace(/^\[ \]\s*/, '').trim();
                                return txt && !todayTexts.has(txt);
                            });
                            if (toAdd.length) todayObj[name] = todayGoal ? todayGoal + '\n' + toAdd.join('\n') : toAdd.join('\n');
                        });
                        goalRaw = JSON.stringify({ v: 2, p: todayObj });
                    }
                } catch(e) {}
            }

            // 若緩存命中且資料無變化，跳過重渲染
            const cacheData = cacheSnapshot ? JSON.parse(cacheSnapshot).data : null;
            const dataChanged = !cacheData ||
                cacheData.goal  !== data.goal  ||
                cacheData.plan  !== data.plan  ||
                cacheData.learn !== data.learn ||
                cacheData.action !== data.action;

            if (dataChanged || !cacheHit) {
                GoalModule.parseAll(goalRaw);
                PlanModule.parseAll(data.plan);
                ActionModule.parseAll(data.action || '');
                LearnModule.parseAll(data.learn || '');
            }

            Utils.setStatus('STARK_OS_ONLINE', 'success');
            Utils.setConnState('online');
            State.isOnline = true;

            const backup = Utils.loadLocalBackup(date);
            if (backup && backup.payload) {
                Utils.setStatus('LOCAL_BACKUP_FOUND', 'warn');
            }

            // 將當天資料存入 prefetch cache（下次切回即時顯示）
            try {
                localStorage.setItem(`gpal_prefetch_${date}`, JSON.stringify({ data, ts: Date.now() }));
            } catch(e) {}

            // 背景預取 ±3 天
            Sync.prefetchDays(date);
        } catch (e) {
            if (token !== State.fetchToken) return;
            Utils.setStatus('LINK_FAILURE — using local', 'error');
            Utils.setConnState('offline');
            State.isOnline = false;

            // 嘗試載入本地備份
            const backup = Utils.loadLocalBackup(date);
            if (backup && backup.payload) {
                const p = backup.payload;
                GoalModule.parseAll(p.goal || '');
                PlanModule.parseAll(p.plan || '');
                ActionModule.parseAll(p.action || '');
                LearnModule.parseAll(p.learn || '');
            } else {
                GoalModule.parseAll('');
                PlanModule.parseAll('');
                ActionModule.parseAll('');
                LearnModule.parseAll('');
            }
        } finally {
            const syncBtn = document.getElementById('btn-nav-sync');
            if (syncBtn) syncBtn.classList.remove('spinning');
            }
    },

    async save(mode = 'MANUAL') {
        if (State.isSyncing) return;
        State.isSyncing = true;

        const payload = {
            date: DOM.datePicker.value,
            goal:   GoalModule.serializeAll(),
            plan:   PlanModule.serializeAll(),
            action: ActionModule.serializeAll(),
            learn:  LearnModule.serializeAll(),
        };

        // 先寫本地備份，再嘗試雲端
        Utils.backupToLocal(payload.date, payload);

        try {
            Utils.setStatus('>> UPLOADING...', 'warn');
            Utils.setConnState('syncing');

            await Utils.safeFetch(CONFIG.WEB_APP_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify(payload),
            });

            Utils.setStatus(`ARCHIVE_SYNCED · ${mode}`, 'success');
            Utils.setConnState('online');
            State.isOnline = true;
            State.dirty = false;
            Utils.clearLocalBackup(payload.date);
        } catch (e) {
            Utils.setStatus('UPLOAD_ERROR · LOCAL_SAVED', 'error');
            Utils.setConnState('offline');
            State.isOnline = false;
        } finally {
            State.isSyncing = false;
        }
    },

    async refreshPortfolio() {
        // Portfolio HUD removed in Family version
    },
};

// ---------- EVENT DELEGATION ----------
const Events = {
    init() {
        // 全域事件委派 — Goal List
        DOM.goalList.addEventListener('click', (e) => {
            const t = e.target;
            const row = t.closest('.goal-row');
            if (!row) return;
            if (t.dataset.role === 'prio') {
                GoalModule.cyclePriority(row);
                SaveQueue.trigger();
            } else if (t.dataset.role === 'check') {
                const input = row.querySelector('input[data-role=text]');
                const container = row.querySelector('.goal-text-container');
                input.classList.toggle('completed', t.checked);
                container.classList.toggle('completed', t.checked);
                GoalModule.updateProgress();
                SaveQueue.trigger();
            }
        });

        DOM.goalList.addEventListener('input', (e) => {
            if (e.target.dataset.role !== 'text') return;
            GoalModule.updateProgress();
            GoalModule.ensureTrailingEmpty();
            SaveQueue.trigger();
        });

        DOM.goalList.addEventListener('keydown', (e) => {
            if (e.target.dataset.role !== 'text') return;
            if (e.key === 'Enter') {
                e.preventDefault();
                const row = e.target.closest('.goal-row');
                const next = row.nextElementSibling;
                if (next) next.querySelector('input[data-role=text]').focus();
                else { GoalModule.create(); GoalModule.ensureTrailingEmpty(); 
                       row.nextElementSibling?.querySelector('input[data-role=text]').focus(); }
            }
        });

        // Plan List 事件委派
        DOM.planContainer.addEventListener('click', (e) => {
            const t = e.target;
            const row = t.closest('.plan-row');
            if (!row) return;
            const role = t.dataset.role;

            if (role === 'loc-add') {
                t.style.display = 'none';
                const editor = row.querySelector('[data-role=loc-edit]');
                editor.style.display = 'block';
                editor.focus();
            } else if (role === 'loc-badge') {
                row.querySelector('.loc-tag-group').style.display = 'none';
                const editor = row.querySelector('[data-role=loc-edit]');
                editor.style.display = 'block';
                editor.focus();
            } else if (role === 'loc-copy') {
                const loc = row.querySelector('[data-role=loc-edit]').value.trim();
                if (loc) {
                    navigator.clipboard.writeText(loc).then(() => {
                        t.textContent = 'OK!';
                        t.classList.add('copied');
                        setTimeout(() => { t.textContent = 'COPY'; t.classList.remove('copied'); }, 1500);
                    }).catch(() => {
                        t.textContent = 'ERR';
                        setTimeout(() => { t.textContent = 'COPY'; }, 1500);
                    });
                }
            } else if (role === 'copy-item') {
                const txt = row.querySelector('input[data-role=text]').value.trim();
                if (!txt) return;
                const text = txt;
                const doFeedback = () => {
                    t.textContent = '✓';
                    t.classList.add('copied');
                    setTimeout(() => { t.textContent = '⎘'; t.classList.remove('copied'); }, 1500);
                };
                navigator.clipboard.writeText(text)
                    .then(doFeedback)
                    .catch(() => {
                        const ta = document.createElement('textarea');
                        ta.value = text;
                        ta.style.cssText = 'position:fixed;opacity:0';
                        document.body.appendChild(ta);
                        ta.select();
                        document.execCommand('copy');
                        document.body.removeChild(ta);
                        doFeedback();
                    });
            } else if (role === 'del') {
                if (confirm('DELETE THIS TASK?')) {
                    row.style.transition = 'opacity 0.2s, transform 0.2s';
                    row.style.opacity = '0';
                    row.style.transform = 'translateX(-20px)';
                    setTimeout(() => {
                        row.remove();
                        PlanModule.ensureTrailingEmpty();
                        SaveQueue.trigger();
                    }, 200);
                }
            }
        });

        DOM.planContainer.addEventListener('blur', (e) => {
            if (e.target.dataset.role !== 'loc-edit') return;
            const row = e.target.closest('.plan-row');
            const val = e.target.value.trim();
            const badge = row.querySelector('[data-role=loc-badge]');
            const group = row.querySelector('.loc-tag-group');
            const addBtn = row.querySelector('[data-role=loc-add]');
            if (val) {
                badge.textContent = `📍 ${val}`;
                group.style.display = 'flex';
                e.target.style.display = 'none';
                addBtn.style.display = 'none';
            } else {
                addBtn.style.display = 'block';
                e.target.style.display = 'none';
                group.style.display = 'none';
            }
            SaveQueue.trigger();
        }, true);

        DOM.planContainer.addEventListener('change', (e) => {
            const t = e.target;
            const row = t.closest('.plan-row');
            if (!row) return;
            if (t.dataset.role === 'start' || t.dataset.role === 'duration') {
                const startSel = row.querySelector('[data-role=start]');
                const durSel = row.querySelector('[data-role=duration]');
                PlanModule.updateRowTime(row, startSel.value, parseInt(durSel.value));
                if (t.dataset.role === 'start') PlanModule.sort();
                PlanModule.checkTimeHighlight();
                SaveQueue.trigger();
            }
        });

        DOM.planContainer.addEventListener('input', (e) => {
            const role = e.target.dataset.role;
            if (role === 'text') {
                PlanModule.ensureTrailingEmpty();
                SaveQueue.trigger();
            }
        });

        // 文字區
        [DOM.textAction, DOM.textLearn].forEach(el => {
            el.addEventListener('input', () => {
                Utils.adjustHeight(el);
                SaveQueue.trigger();
            });
        });

        // LONGTERM GOAL 事件
        const ltList = document.getElementById('lt-goal-list');
        if (ltList) {
            ltList.addEventListener('click', LongTermModule.handleClick);
            ltList.addEventListener('input', LongTermModule.handleInput);
            ltList.addEventListener('change', LongTermModule.handleInput);
        }
        const btnLtAdd = document.getElementById('btn-lt-add');
        if (btnLtAdd) btnLtAdd.addEventListener('click', () => LongTermModule.add());

        // UPLOAD TO CLOUD 按鈕
        document.querySelector('[data-action="sync"]').addEventListener('click', async (e) => {
            const btn = e.currentTarget;
            if (btn.disabled) return;
            btn.disabled = true;
            btn.textContent = 'UPLOADING...';
            try {
                await Sync.save('MANUAL');
                btn.textContent = 'UPLOAD DONE ✓';
                btn.style.borderColor = 'var(--stark-green)';
                btn.style.color = 'var(--stark-green)';
            } catch {
                btn.textContent = 'UPLOAD FAILED';
                btn.style.borderColor = 'var(--stark-red)';
                btn.style.color = 'var(--stark-red)';
            } finally {
                setTimeout(() => {
                    btn.disabled = false;
                    btn.textContent = 'UPLOAD TO CLOUD';
                    btn.style.borderColor = '';
                    btn.style.color = '';
                }, 2500);
            }
        });

        // 導覽
        document.querySelector('[data-action="prev-day"]').addEventListener('click', () => Events.changeDate(-1));
        document.querySelector('[data-action="next-day"]').addEventListener('click', () => Events.changeDate(1));

        // 手機滑動換日：左滑→下一天，右滑→上一天
        let touchStartX = 0;
        let touchStartY = 0;
        document.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, { passive: true });
        document.addEventListener('touchend', (e) => {
            const dx = e.changedTouches[0].clientX - touchStartX;
            const dy = e.changedTouches[0].clientY - touchStartY;
            // 水平位移 > 60px 且水平幅度大於垂直（避免誤觸滾動）
            if (Math.abs(dx) < 60 || Math.abs(dx) < Math.abs(dy) * 1.5) return;
            Events.changeDate(dx < 0 ? -1 : 1);
        }, { passive: true });
        DOM.datePicker.addEventListener('change', async () => {
            Utils.updateDateLabel(DOM.datePicker.value);
                            await SaveQueue.flushImmediate();
            Sync.fetchData();
        });

        // 網路狀態
        window.addEventListener('online', () => {
            State.isOnline = true;
            Utils.setConnState('online');
            Utils.setStatus('NETWORK_RESTORED', 'success');
            // 自動推上本地暫存
            if (State.dirty) Sync.save('AUTO');
        });
        window.addEventListener('offline', () => {
            State.isOnline = false;
            Utils.setConnState('offline');
            Utils.setStatus('OFFLINE — saving locally', 'warn');
        });

        // 離頁前確保儲存
        window.addEventListener('beforeunload', (e) => {
            if (State.dirty) {
                SaveQueue.flushImmediate();
                e.preventDefault();
                e.returnValue = '';
            }
        });

        // 頁面回到前景時刷新時間 highlight
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden) PlanModule.checkTimeHighlight();
        });
    },

    async changeDate(days) {
        await SaveQueue.flushImmediate();
        const d = new Date(DOM.datePicker.value + 'T12:00:00');
        d.setDate(d.getDate() + days);
        DOM.datePicker.value = `${d.getFullYear()}-${Utils.pad2(d.getMonth() + 1)}-${Utils.pad2(d.getDate())}`;
        Utils.updateDateLabel(DOM.datePicker.value);
            Sync.fetchData();
    },
};

// ---------- FINANCIAL INTEL MODULE ----------
const IntelModule = { loadCache(){return null;}, saveCache(){}, render(){}, showError(){}, clearError(){}, analyse(){}, init(){} };

// ---------- INIT ----------
window.addEventListener('DOMContentLoaded', () => {
    DOM.datePicker.value = Utils.todayISO();
    Utils.updateDateLabel(DOM.datePicker.value);

    // 即時時鐘
    const clockEl = document.getElementById('liveClock');
    function d(ch) { return `<span class="clock-digit">${ch}</span>`; }
    function colon(cls = '') { return `<span class="clock-colon${cls}">:</span>`; }
    function tickClock() {
        const n = new Date();
        const H = Utils.pad2(n.getHours());
        const M = Utils.pad2(n.getMinutes());
        const S = Utils.pad2(n.getSeconds());
        clockEl.innerHTML =
            `${d(H[0])}${d(H[1])}${colon()}${d(M[0])}${d(M[1])}<span class="clock-sec-group">${colon()}${d(S[0])}${d(S[1])}</span>`;
    }
    tickClock();
    setInterval(tickClock, 1000);

    // 天氣（先嘗試 Apps Script 代理，失敗則直接呼叫 Open-Meteo）
    async function fetchWeather() {
        const el = document.getElementById('weather-display');
        if (!el) return;
        try {
            // 方法1：Apps Script 代理
            const res  = await fetch(`${CONFIG.WEB_APP_URL}?type=weather`);
            const data = await res.json();
            if (data.temp != null) {
                el.innerHTML = `<span class="w-icon">${weatherIcon(data.code)}</span><span class="w-temp">${data.temp}°C</span>`;
                return;
            }
        } catch(e) { /* fallback */ }

        try {
            // 方法2：直接 Open-Meteo（Oakland 座標作預設）
            const wRes  = await fetch('https://api.open-meteo.com/v1/forecast?latitude=37.8&longitude=-122.3&current=temperature_2m,weather_code&temperature_unit=celsius&timezone=auto');
            const wData = await wRes.json();
            const cur   = wData.current;
            el.innerHTML = `<span class="w-icon">${weatherIcon(cur.weather_code)}</span><span class="w-temp">${Math.round(cur.temperature_2m)}°C</span>`;
        } catch(e) {
            el.textContent = '';
        }
    }

    function weatherIcon(code) {
        if (code === 0)  return '☀️';
        if (code <= 2)   return '🌤️';
        if (code <= 3)   return '☁️';
        if (code <= 49)  return '🌫️';
        if (code <= 67)  return '🌧️';
        if (code <= 77)  return '❄️';
        if (code <= 82)  return '🌦️';
        if (code <= 99)  return '⛈️';
        return '🌡️';
    }

    fetchWeather();
    setInterval(fetchWeather, 15 * 60 * 1000);
    Utils.setConnState(navigator.onLine ? 'online' : 'offline');

    MemberMgr.init();
    LongTermModule.init();
    Events.init();
    Sync.fetchData();

    setInterval(() => PlanModule.checkTimeHighlight(), CONFIG.TIME_CHECK_INTERVAL);

    // 版本檢查：每 10 分鐘檢查一次，有新版本提示用戶
    const CURRENT_VERSION = '202605221100';
    async function checkVersion() {
        try {
            const res = await fetch(location.href + '?v=' + Date.now(), { cache: 'no-store' });
            const html = await res.text();
            const match = html.match(/name="version" content="([^"]+)"/);
            if (match && match[1] !== CURRENT_VERSION) {
                const ub = document.getElementById('btn-update-now'); if(ub) ub.style.display='inline-flex';
            }
        } catch(e) {}
    }
    setTimeout(checkVersion, 60000); // 1分鐘後首次檢查
    setInterval(checkVersion, 600000); // 之後每10分鐘

});
