<script>
'use strict';

/* ============================================================
 * GPAL MK-VII — OPTIMIZED CORE
 * 模組化結構：CONFIG → STATE → API → UTILS → MODULES → INIT
 * ============================================================ */

// ---------- CONFIG ----------
const CONFIG = Object.freeze({
    WEB_APP_URL: "https://script.google.com/macros/s/AKfycbxvUGV-N41f4c7q9M8C6-LmSl_kAH1zgXiVt4QsIADXZvm1GLnwqyXpabjZFvhNVgMVYA/exec",
    AUTO_SAVE_DELAY: 1500,
    PORTFOLIO_REFRESH: 60_000,
    TIME_CHECK_INTERVAL: 60_000,
    FETCH_TIMEOUT: 15_000,
    MAX_RETRIES: 2,
    PRIO_LEVELS: ['NONE', 'P1', 'P2', 'P3'],
    PRIO_ORDER: { P1: 1, P2: 2, P3: 3, NONE: 4 },
    DURATION_OPTIONS: [
        { l: '15m', v: 15 }, { l: '30m', v: 30 }, { l: '45m', v: 45 },
        { l: '1h', v: 60 },  { l: '1.5h', v: 90 }, { l: '2h', v: 120 },
        { l: '3h', v: 180 }, { l: '4h', v: 240 }
    ],
    LS_PREFIX: 'gpal_backup_',
});

// ---------- STATE ----------
const State = {
    autoSaveTimer: null,
    fetchToken: 0,
    isSyncing: false,
    isOnline: navigator.onLine,
    currentData: null,
    dirty: false,
    memberIdx: 0, // fixed — single member mode
};

// ---------- DOM CACHE ----------
const $ = (id) => document.getElementById(id);
const DOM = {
    datePicker: $('datePicker'),
    goalList: $('goal-list'),
    planContainer: $('plan-container'),
    get planList() { return document.getElementById('plan-list-0'); },
    textAction: $('textAction'),
    textLearn: $('textLearn'),
    progressDisplay: $('progress-display'),
    connDot: $('conn-dot'),
    connText: $('conn-text'),
    get syncBtn() { return document.querySelector('[data-action="sync"]'); },
};

// ---------- UTILS ----------
const Utils = {
    debounce(fn, wait) {
        let t;
        return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), wait); };
    },

    pad2(n) { return String(n).padStart(2, '0'); },

    timeToMins(t) {
        const [h, m] = t.split(':').map(Number);
        return h * 60 + m;
    },

    minsToTime(mins) {
        const clamped = Math.max(0, Math.min(mins, 24 * 60));
        return `${Utils.pad2(Math.floor(clamped / 60))}:${Utils.pad2(clamped % 60)}`;
    },

    getOffsetTime(timeStr, offsetMins) {
        return Utils.minsToTime(Utils.timeToMins(timeStr) + offsetMins);
    },

    getDurationMins(start, end) {
        if (!start || !end) return 30;
        return Math.max(0, Utils.timeToMins(end) - Utils.timeToMins(start));
    },

    nowTimeStr() {
        const d = new Date();
        return `${Utils.pad2(d.getHours())}:${Utils.pad2(d.getMinutes())}`;
    },

    todayISO() {
        const d = new Date();
        return `${d.getFullYear()}-${Utils.pad2(d.getMonth() + 1)}-${Utils.pad2(d.getDate())}`;
    },

    updateDateLabel(dateStr) {
        const label = document.getElementById('date-label');
        if (!label) return;
        const days = ['SUNDAY','MONDAY','TUESDAY','WEDNESDAY','THURSDAY','FRIDAY','SATURDAY'];
        // 用 T12:00:00 避免時區偏移導致日期跑掉
        const d = new Date(dateStr + 'T12:00:00');
        label.textContent = days[d.getDay()];
        label.classList.remove('hidden');
    },

    setStatus(msg, type = 'normal') {
        // status bar removed — log only
        if (type === 'error') console.warn('[GPAL]', msg);
    },

    setConnState(state) {
        // state: 'online' | 'offline' | 'syncing'
        DOM.connDot.className = `conn-dot ${state === 'online' ? '' : state}`;
        DOM.connText.textContent = state.toUpperCase();
    },

    // 安全 fetch：超時 + 重試 + AbortController + 自動加 member 參數
    async safeFetch(url, options = {}, retries = CONFIG.MAX_RETRIES) {
        // 自動在 WEB_APP_URL 請求裡加 member 參數
        if (url.includes(CONFIG.WEB_APP_URL.split('?')[0])) {
            const member = MemberModule.current();
            const sep = url.includes('?') ? '&' : '?';
            url = url + sep + 'member=' + encodeURIComponent(member);
            // POST 請求：在 body 裡也加 member
            if (options.method === 'POST' && options.body) {
                try {
                    const body = JSON.parse(options.body);
                    body.member = member;
                    options = { ...options, body: JSON.stringify(body) };
                } catch {}
            }
        }
        for (let attempt = 0; attempt <= retries; attempt++) {
            const ctrl = new AbortController();
            const timer = setTimeout(() => ctrl.abort(), CONFIG.FETCH_TIMEOUT);
            try {
                const res = await fetch(url, { ...options, signal: ctrl.signal });
                clearTimeout(timer);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                return res;
            } catch (e) {
                clearTimeout(timer);
                if (attempt === retries) throw e;
                // 指數退避
                await new Promise(r => setTimeout(r, 500 * Math.pow(2, attempt)));
            }
        }
    },

    // 本地備份（網路失敗保險）
    backupToLocal(date, payload) {
        try {
            localStorage.setItem(CONFIG.LS_PREFIX + date, JSON.stringify({
                ts: Date.now(), payload
            }));
        } catch (e) { /* 配額已滿等錯誤可忽略 */ }
    },

    loadLocalBackup(date) {
        try {
            const raw = localStorage.getItem(CONFIG.LS_PREFIX + date);
            return raw ? JSON.parse(raw) : null;
        } catch (e) { return null; }
    },

    clearLocalBackup(date) {
        try { localStorage.removeItem(CONFIG.LS_PREFIX + date); } catch (e) {}
    },

    // 安全 HTML 處理（防 XSS）
    escapeHTML(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    },

    adjustHeight(el) {
        el.style.height = 'auto';
        el.style.height = el.scrollHeight + 'px';
    },
};

// ---------- SAVE QUEUE（防抖 + 狀態提示） ----------
const SaveQueue = {
    trigger() {
        State.dirty = true;
        clearTimeout(State.autoSaveTimer);
        Utils.setStatus('>> RECORDING...', 'warn');
        State.autoSaveTimer = setTimeout(() => Sync.save('AUTO'), CONFIG.AUTO_SAVE_DELAY);
    },
    flushImmediate() {
        clearTimeout(State.autoSaveTimer);
        if (State.dirty) return Sync.save('AUTO');
    }
};

// ---------- GOAL MODULE ----------
const GoalModule = {
    allData: ['', '', ''],

    saveCurrent() {
        GoalModule.allData[0] = GoalModule.serializeCurrent();
        GoalModule._lastRendered = null;
    },

    _lastRendered: null,
    renderCurrent() {
        const raw = GoalModule.allData[0] || '';
        if (raw === GoalModule._lastRendered) return;
        GoalModule._lastRendered = raw;
        GoalModule.parseSingle(raw);
    },

    serializeCurrent() {
        return Array.from(DOM.goalList.querySelectorAll('.goal-row'))
            .map(row => {
                const txt = row.querySelector('input[type=text]').value.trim();
                if (!txt) return null;
                const checked = row.querySelector('[data-role=check]').checked ? '[x]' : '[ ]';
                return `${checked} (${row.dataset.priority}) ${txt}`;
            }).filter(Boolean).join('\n');
    },

    parseSingle(raw) {
        DOM.goalList.replaceChildren();
        if (!raw) { GoalModule.create(); GoalModule.updateProgress(); return; }
        const frag = document.createDocumentFragment();
        raw.split('\n').forEach(line => {
            if (!line.trim()) return;
            const isDone = line.startsWith('[x]');
            const prioMatch = line.match(/\((P[1-3]|NONE)\)/);
            const text = line
                .replace(/^\[[ x]\]\s*\((P[1-3]|NONE)\)\s*/, '')
                .replace(/^\[[ x]\]\s*/, '');
            GoalModule.create(text, isDone, prioMatch ? prioMatch[1] : 'NONE', frag);
        });
        GoalModule.create('', false, 'NONE', frag);
        DOM.goalList.appendChild(frag);
        GoalModule.sort();
        GoalModule.updateProgress();
    },

    parseAll(raw) {
        let text = raw || '';
        try { const p = JSON.parse(text); if (p?.v === 2 && p?.p) text = p.p[MemberModule.current()] || ''; } catch {}
        GoalModule.allData = [text];
        GoalModule.renderCurrent();
    },

    serializeAll() {
        GoalModule.saveCurrent();
        return GoalModule.allData[0] || '';
    },

    serialize() { return GoalModule.serializeAll(); },
    parse(raw)  { GoalModule.parseAll(raw); },

    create(text = '', checked = false, priority = 'NONE', parent = DOM.goalList) {
        const row = document.createElement('div');
        row.className = 'goal-row';
        row.dataset.priority = priority;

        const prioBtn = document.createElement('div');
        prioBtn.className = `prio-tag prio-${priority.toLowerCase()}`;
        prioBtn.textContent = priority === 'NONE' ? '-' : priority;
        prioBtn.dataset.role = 'prio';

        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.className = 'stark-checkbox';
        cb.checked = checked;
        cb.dataset.role = 'check';

        const textContainer = document.createElement('div');
        textContainer.className = 'goal-text-container' + (checked ? ' completed' : '');

        const input = document.createElement('input');
        input.type = 'text';
        input.className = 'goal-input' + (checked ? ' completed' : '');
        input.value = text;
        input.placeholder = 'Mission...';
        input.dataset.role = 'text';

        textContainer.appendChild(input);
        row.append(prioBtn, cb, textContainer);
        parent.appendChild(row);
        return row;
    },

    ensureTrailingEmpty() {
        const rows = DOM.goalList.querySelectorAll('.goal-row');
        const last = rows[rows.length - 1];
        if (!last || last.querySelector('input[type=text]').value.trim() !== '') {
            GoalModule.create();
        }
    },

    cyclePriority(row) {
        const cur = row.dataset.priority;
        const next = CONFIG.PRIO_LEVELS[(CONFIG.PRIO_LEVELS.indexOf(cur) + 1) % CONFIG.PRIO_LEVELS.length];
        row.dataset.priority = next;
        const btn = row.querySelector('[data-role=prio]');
        btn.textContent = next === 'NONE' ? '-' : next;
        btn.className = `prio-tag prio-${next.toLowerCase()}`;
    },

    sort() {
        const rows = Array.from(DOM.goalList.querySelectorAll('.goal-row'));
        // 保留最後一個空白行不動，避免使用者輸入時跳行
        const last = rows.length > 1 && rows[rows.length - 1].querySelector('input[type=text]').value === ''
            ? rows.pop() : null;

        rows.sort((a, b) => {
            const aDone = a.querySelector('[data-role=check]').checked;
            const bDone = b.querySelector('[data-role=check]').checked;
            if (aDone !== bDone) return aDone ? 1 : -1;
            return CONFIG.PRIO_ORDER[a.dataset.priority] - CONFIG.PRIO_ORDER[b.dataset.priority];
        });

        // DocumentFragment 一次性 reflow
        const frag = document.createDocumentFragment();
        rows.forEach(r => frag.appendChild(r));
        if (last) frag.appendChild(last);
        DOM.goalList.appendChild(frag);
    },

    updateProgress() {
        const rows = Array.from(DOM.goalList.querySelectorAll('.goal-row'))
            .filter(r => r.querySelector('input[type=text]').value.trim() !== '');
        const done = rows.filter(r => r.querySelector('[data-role=check]').checked).length;
        const pct = rows.length === 0 ? 0 : Math.round((done / rows.length) * 100);
        DOM.progressDisplay.textContent = `[ ${pct}% ]`;
        // 進度顏色聯動
        DOM.progressDisplay.style.color = pct === 100 ? 'var(--stark-green)'
            : pct >= 50 ? 'var(--stark-gold)' : 'var(--stark-cyan)';
    },
};

// ---------- PLAN MODULE ----------
const PlanModule = {
    _rawData: null,
    _rendered: [false],

    saveCurrent() {
        const listEl = document.getElementById('plan-list-0');
        if (listEl && PlanModule._rawData) {
            PlanModule._rawData[0] = PlanModule.serializeSingle(listEl);
        }
    },

    _renderOne(idx) {
        if (PlanModule._rendered && PlanModule._rendered[0]) return;
        const listEl = document.getElementById('plan-list-0');
        if (!listEl || !PlanModule._rawData) return;
        PlanModule.parseSingle(PlanModule._rawData[idx] || '', listEl);
        if (PlanModule._rendered) PlanModule._rendered[0] = true;
    },

    renderCurrent() {
        PlanModule._renderOne(0);
        PlanModule.checkTimeHighlight();
    },

    parseSingle(raw, listEl) {
        listEl.replaceChildren();
        const frag = document.createDocumentFragment();
        if (raw) {
            raw.split('\n').forEach(line => {
                if (!line.trim()) return;
                const parts = line.split('|');
                if (parts.length < 2) return;
                const times = parts[0].split('-');
                if (times.length !== 2) return;
                PlanModule.create(times[0], times[1], parts[1], parts[2] || '', frag);
            });
        }
        PlanModule.create('08:00', '08:30', '', '', frag);
        listEl.appendChild(frag);
        const rows = Array.from(listEl.querySelectorAll('.plan-row'));
        rows.sort((a, b) => a.dataset.start.localeCompare(b.dataset.start));
        const sf = document.createDocumentFragment();
        rows.forEach(r => sf.appendChild(r));
        listEl.appendChild(sf);
    },

    serializeSingle(listEl) {
        return Array.from(listEl.querySelectorAll('.plan-row'))
            .map(row => {
                const txtEl = row.querySelector('input[data-role=text]');
                if (!txtEl) return null;
                const txt = txtEl.value.trim();
                if (!txt) return null;
                const locEl = row.querySelector('[data-role=loc-edit]');
                const loc = locEl ? locEl.value.trim() : '';
                return `${row.dataset.start}-${row.dataset.end}|${txt}|${loc}`;
            }).filter(Boolean).join('\n');
    },

    parseAll(raw) {
        let text = raw || '';
        try { const p = JSON.parse(text); if (p?.v === 2 && p?.p) text = p.p[MemberModule.current()] || ''; } catch {}
        PlanModule._rawData = [text];
        PlanModule._rendered = [false];
        PlanModule.renderCurrent();
    },

    serializeAll() {
        PlanModule.saveCurrent();
        const listEl = document.getElementById('plan-list-0');
        return listEl ? PlanModule.serializeSingle(listEl) : (PlanModule._rawData[0] || '');
    },

    createTimeSelect(val) {
        const sel = document.createElement('select');
        sel.className = 'time-sel';
        sel.dataset.role = 'start';
        const frag = document.createDocumentFragment();
        for (let h = 5; h <= 24; h++) {
            for (const m of ['00', '30']) {
                const t = `${Utils.pad2(h)}:${m}`;
                const opt = new Option(t, t);
                if (t === val) opt.selected = true;
                frag.appendChild(opt);
            }
        }
        sel.appendChild(frag);
        return sel;
    },

    createDurationSelect(mins) {
        const sel = document.createElement('select');
        sel.className = 'time-sel';
        sel.dataset.role = 'duration';
        const frag = document.createDocumentFragment();
        CONFIG.DURATION_OPTIONS.forEach(o => {
            const opt = new Option(o.l, o.v);
            if (o.v === mins) opt.selected = true;
            frag.appendChild(opt);
        });
        sel.appendChild(frag);
        return sel;
    },

    create(start = '08:00', end = '08:30', text = '', location = '', parent = DOM.planList) {
        const row = document.createElement('div');
        row.className = 'plan-row';
        row.dataset.start = start;

        const dash = document.createElement('span');
        dash.className = 'time-dash';
        dash.textContent = '+';
        timeRow.append(startSel, dash, durationSel);

        // 內容輸入
        const input = document.createElement('input');
        input.type = 'text';
        input.className = 'plan-input';
        input.value = text;
        input.placeholder = 'Task...';
        input.dataset.role = 'text';

        // 動作區
        const actions = document.createElement('div');
        actions.className = 'plan-actions';

        const addBtn = document.createElement('div');
        addBtn.className = 'loc-add-btn';
        addBtn.textContent = '[+]';
        addBtn.dataset.role = 'loc-add';

        const locEdit = document.createElement('input');
        locEdit.className = 'loc-edit';
        locEdit.value = location;
        locEdit.placeholder = 'Location';
        locEdit.dataset.role = 'loc-edit';

        const locTagGroup = document.createElement('div');
        locTagGroup.className = 'loc-tag-group';
        const locBadge = document.createElement('div');
        locBadge.className = 'loc-badge';
        locBadge.dataset.role = 'loc-badge';

        const navBtn = document.createElement('div');
        navBtn.className = 'loc-copy-btn';
        navBtn.textContent = 'COPY';
        navBtn.dataset.role = 'loc-copy';

        locTagGroup.append(locBadge, navBtn);

        const delBtn = document.createElement('div');
        delBtn.className = 'del-btn';
        delBtn.textContent = 'X';
        delBtn.dataset.role = 'del';

        if (location) {
            locBadge.textContent = `📍 ${location}`;
            locTagGroup.style.display = 'flex';
            addBtn.style.display = 'none';
        }

        const copyBtn = document.createElement('div');
        copyBtn.className = 'copy-item-btn';
        copyBtn.textContent = '⎘';
        copyBtn.dataset.role = 'copy-item';
        copyBtn.title = 'Copy this item';

        const clockBtn = document.createElement('div');
        clockBtn.className = 'clock-start-btn' + (text ? '' : ' empty');
        clockBtn.textContent = '▷';
        clockBtn.dataset.role = 'clock-start';

        actions.append(addBtn, locEdit, locTagGroup, copyBtn, clockBtn, delBtn);

    ensureTrailingEmpty() {
        const rows = DOM.planList.querySelectorAll('.plan-row');
        const last = rows[rows.length - 1];
        if (!last || last.querySelector('input[data-role=text]').value.trim() !== '') {
            const endTime = last ? last.dataset.end : '08:00';
            PlanModule.create(endTime, Utils.getOffsetTime(endTime, 30));
        }
    },

    updateRowTime(row, newStart, newDurationMins) {
        row.dataset.start = newStart;
        row.dataset.end = Utils.getOffsetTime(newStart, newDurationMins);
    },

    sort() {
        const rows = Array.from(DOM.planList.querySelectorAll('.plan-row'));
        rows.sort((a, b) => a.dataset.start.localeCompare(b.dataset.start));
        const frag = document.createDocumentFragment();
        rows.forEach(r => frag.appendChild(r));
        DOM.planList.appendChild(frag);
    },

    checkTimeHighlight() {
        const cur = Utils.nowTimeStr();
        const today = Utils.todayISO();
        const isToday = DOM.datePicker.value === today;
        const listEl = document.getElementById('plan-list-0');
        if (listEl) {
            listEl.querySelectorAll('.plan-row').forEach(row => {
                row.classList.remove('active-now', 'past');
                if (!isToday) return;
                if (cur >= row.dataset.start && cur < row.dataset.end) {
                    row.classList.add('active-now');
                } else if (cur >= row.dataset.end) {
                    row.classList.add('past');
                }
            });
        }
    },

    parse(raw) { PlanModule.parseAll(raw); },
    serialize() { return PlanModule.serializeAll(); },
};

// ---------- TRADE LOG MODULE ----------
const TradeModule = {
    trades: [],
    currentType: 'BUY',

    // 解析 action 文字：取出交易記錄與一般筆記
    parse(text) {
        if (!text) return { trades: [], notes: '' };
        const re = /^\[(BUY|SELL)\]\s+(\d{1,2}:\d{2})\s+(\S+)\s+([\d.]+)\s+@\s+\$?([\d.]+)/i;
        const lines = text.split('\n');
        const trades = [];
        const notesLines = [];
        let inNotes = false;
        for (const line of lines) {
            if (line.trim() === '---') { inNotes = true; continue; }
            const m = line.match(re);
            if (m && !inNotes) {
                trades.push({
                    type: m[1].toUpperCase(),
                    time: m[2],
                    ticker: m[3].toUpperCase(),
                    shares: parseFloat(m[4]),
                    price: parseFloat(m[5]),
                });
            } else {
                notesLines.push(line);
            }
        }
        return { trades, notes: notesLines.join('\n').replace(/^\n+|\n+$/g, '') };
    },

    // 把目前 trades + textarea 內的筆記組合回 action 字串
    serialize() {
        const tradeText = TradeModule.trades.map(t =>
            `[${t.type}] ${t.time} ${t.ticker} ${t.shares} @ $${t.price.toFixed(2)}`
        ).join('\n');
        const notes = DOM.textAction.value.trim();
        if (tradeText && notes) return `${tradeText}\n---\n${notes}`;
        if (tradeText) return tradeText;
        return notes;
    },

    // 從 fetchData 回來時呼叫
    loadFromAction(text) {
        const { trades, notes } = TradeModule.parse(text);
        TradeModule.trades = trades;
        DOM.textAction.value = notes;
        Utils.adjustHeight(DOM.textAction);
        TradeModule.render();
    },

    add(type, ticker, shares, price) {
        const now = new Date();
        const trade = {
            type: type,
            time: `${Utils.pad2(now.getHours())}:${Utils.pad2(now.getMinutes())}`,
            ticker: ticker.toUpperCase(),
            shares: parseFloat(shares),
            price: parseFloat(price),
        };
        TradeModule.trades.push(trade);
        TradeModule.render();
        SaveQueue.trigger();
        TradeModule.syncToPortfolio(trade); // 同步到 Portfolio 分頁
    },

    // 推送交易到 Portfolio 分頁
    async syncToPortfolio(trade) {
        try {
            const res = await fetch(CONFIG.WEB_APP_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify({
                    type: 'trade',
                    action: trade.type,
                    ticker: trade.ticker,
                    shares: trade.shares,
                    price: trade.price,
                }),
            });
            const data = await res.json();
            if (data.success) {
                // 同步成功後刷新 Portfolio HUD
                Sync.refreshPortfolio();
                TradeModule._flashLastRow('ok');
            } else {
                TradeModule._flashLastRow('err', data.error);
            }
        } catch (e) {
            TradeModule._flashLastRow('err', 'NETWORK');
        }
    },

    _flashLastRow(state, msg) {
        const list = document.getElementById('trade-list'); if (!list) return;
        const last = list.lastElementChild;
        if (!last) return;
        if (state === 'ok') {
            last.style.boxShadow = '0 0 12px rgba(0,255,136,0.5)';
            setTimeout(() => { last.style.boxShadow = ''; }, 800);
        } else {
            last.style.boxShadow = '0 0 12px rgba(255,62,62,0.7)';
            last.title = `同步失敗: ${msg || ''}`;
        }
    },

    async remove(idx) {
        const trade = TradeModule.trades[idx];
        if (!trade) return;
        if (!confirm(`確定刪除 ${trade.type} ${trade.ticker} ${trade.shares} @ $${trade.price.toFixed(2)} ？\n（會反向更新到 Portfolio 雲端）`)) return;

        // 視覺：先把該行標為處理中
        const list = document.getElementById('trade-list'); if (!list) return;
        const row  = list.children[idx];
        if (row) row.style.opacity = '0.4';

        try {
            const res = await fetch(CONFIG.WEB_APP_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify({
                    type: 'trade',
                    action: trade.type === 'BUY' ? 'UNDO_BUY' : 'UNDO_SELL',
                    ticker: trade.ticker,
                    shares: trade.shares,
                    price: trade.price,
                }),
            });
            const data = await res.json();
            if (data.success) {
                TradeModule.trades.splice(idx, 1);
                TradeModule.render();
                SaveQueue.trigger();
                Sync.refreshPortfolio();
            } else {
                if (row) row.style.opacity = '1';
                alert(`刪除失敗：${data.error || '未知錯誤'}`);
            }
        } catch (e) {
            if (row) row.style.opacity = '1';
            alert(`網路錯誤，未能同步刪除：${e.message}`);
        }
    },

    render() {
        const list = document.getElementById('trade-list');
        if (!list) return;
        list.replaceChildren();
        TradeModule.trades.forEach((t, i) => {
            const total = (t.shares * t.price).toFixed(2);
            const row = document.createElement('div');
            row.className = `trade-row trade-${t.type.toLowerCase()}`;
            row.innerHTML = `
                <span class="trade-time">${t.time}</span>
                <span class="trade-type-badge">${t.type}</span>
                <span class="trade-ticker">${t.ticker}</span>
                <span class="trade-detail">${t.shares} × $${t.price.toFixed(2)} = <strong>$${Number(total).toLocaleString()}</strong></span>
                <button class="trade-del" data-idx="${i}" aria-label="刪除">×</button>
            `;
            list.appendChild(row);
        });
        TradeModule.renderSummary();
    },

    renderSummary() {
        const summary = document.getElementById('trade-summary');
        if (!summary) return;
        if (!summary) return;
        if (TradeModule.trades.length === 0) {
            summary.replaceChildren();
            return;
        }
        const buyTotal  = TradeModule.trades.filter(t => t.type === 'BUY').reduce((a, t) => a + t.shares * t.price, 0);
        const sellTotal = TradeModule.trades.filter(t => t.type === 'SELL').reduce((a, t) => a + t.shares * t.price, 0);
        const net = sellTotal - buyTotal; // 賣出 - 買入 = 當日現金流
        const fmt = n => n.toLocaleString(undefined, { maximumFractionDigits: 2 });
        summary.innerHTML = `
            <span class="sum-label">${TradeModule.trades.length} 筆交易</span>
            <span class="sum-buy">BUY: $${fmt(buyTotal)}</span>
            <span class="sum-sell">SELL: $${fmt(sellTotal)}</span>
            <span class="sum-net">NET: ${net >= 0 ? '+' : '-'}$${fmt(Math.abs(net))}</span>
        `;
    },

    init() {
        // Family version: no trade UI, skip DOM binding
    },
};

// ---------- LONGTERM GOAL MODULE ----------
const LongTermModule = {
    data: [],
    _saveTimer: null,
    _lastRenderedKey: null,
    _dataVersion: 0,

    currentGoals() {
        const name = MemberModule.current();
        if (!Array.isArray(LongTermModule.data[name])) LongTermModule.data[name] = [];
        return LongTermModule.data[name];
    },

    async init() {
        try {
            const cached = JSON.parse(localStorage.getItem(LongTermModule.LS_KEY) || 'null');
            if (cached && typeof cached === 'object') LongTermModule.data = cached;
        } catch {}
        LongTermModule.render();
        try {
            const res = await Utils.safeFetch(`${CONFIG.WEB_APP_URL}?type=longterm`);
            const json = await res.json();
            if (json.goals && typeof json.goals === 'object') {
                if (json.found !== false) {
                    LongTermModule.data = json.goals;
                    LongTermModule._dataVersion++;
                    try { localStorage.setItem(LongTermModule._lsKey(), JSON.stringify(LongTermModule.data)); } catch {}
                    LongTermModule.render();
                }
            }
        } catch {}
    },

    triggerSave() {
        LongTermModule._dataVersion++;
        try { localStorage.setItem(LongTermModule.LS_KEY, JSON.stringify(LongTermModule.data)); } catch {}
        if (LongTermModule._saveTimer) clearTimeout(LongTermModule._saveTimer);
        LongTermModule._saveTimer = setTimeout(async () => {
            try {
                const res = await Utils.safeFetch(CONFIG.WEB_APP_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ type: 'longterm', data: LongTermModule.data })
                });
                const json = await res.json();
                if (!json.success) throw new Error('save failed');
            } catch(e) {
                Utils.setStatus('LONGTERM_SAVE_ERR · LOCAL_SAVED', 'error');
            }
        }, 3000);
    },

    render() {
        const listEl = document.getElementById('lt-goal-list');
        if (!listEl) return;
        const goals = LongTermModule.currentGoals();
        const today = Utils.todayISO();

        const autoChanged = goals.some(g => !g.done && g.deadline && g.deadline <= today);
        if (autoChanged) {
            goals.forEach(g => { if (!g.done && g.deadline && g.deadline <= today) g.done = true; });
            LongTermModule._dataVersion++;
            try { localStorage.setItem(LongTermModule._lsKey(), JSON.stringify(LongTermModule.data)); } catch {}
            if (LongTermModule._saveTimer) clearTimeout(LongTermModule._saveTimer);
            LongTermModule._saveTimer = setTimeout(async () => {
                try { const res = await Utils.safeFetch(CONFIG.WEB_APP_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify({ type: 'longterm', data: LongTermModule.data }) }); const json = await res.json(); if (!json.success) throw new Error('save failed'); } catch(e) { Utils.setStatus('LONGTERM_SAVE_ERR · LOCAL_SAVED', 'error'); }
            }, 3000);
        }

        const cacheKey = `${MemberModule.current()}|${LongTermModule._dataVersion}`;
        if (cacheKey === LongTermModule._lastRenderedKey) return;
        LongTermModule._lastRenderedKey = cacheKey;

        listEl.replaceChildren();
        if (!goals.length) return;
        const frag = document.createDocumentFragment();
        goals.forEach(g => {
            const row = document.createElement('div');
            row.className = 'lt-goal-row' + (g.done ? ' lt-done' : '');
            row.dataset.ltId = g.id;
            const cb = document.createElement('input');
            cb.type = 'checkbox'; cb.className = 'stark-checkbox'; cb.checked = g.done; cb.dataset.role = 'lt-check';
            const textContainer = document.createElement('div');
            textContainer.className = 'lt-text-container' + (g.done ? ' completed' : '');
            const textEl = document.createElement('input');
            textEl.type = 'text'; textEl.className = 'lt-goal-input' + (g.done ? ' completed' : '');
            textEl.value = g.text; textEl.placeholder = 'Long term goal...'; textEl.dataset.role = 'lt-text';
            textContainer.appendChild(textEl);
            const deadlineWrap = document.createElement('div');
            deadlineWrap.className = 'lt-deadline-wrap';
            const dateEl = document.createElement('input');
            dateEl.type = 'date'; dateEl.className = 'lt-deadline-input';
            dateEl.value = g.deadline || ''; dateEl.dataset.role = 'lt-deadline';
            const dateIcon = document.createElement('span');
            dateIcon.className = 'lt-date-icon';
            dateIcon.textContent = 'DEADLINE';
            dateIcon.title = g.deadline ? g.deadline : 'Set deadline';
            const daysEl = document.createElement('span');
            daysEl.className = 'lt-days';
            if (g.done) { daysEl.textContent = '✓ DONE'; daysEl.classList.add('lt-complete'); }
            else if (g.deadline) {
                const mmdd = g.deadline.slice(5);
                const diff = Math.ceil((new Date(g.deadline + 'T12:00:00') - new Date(today + 'T12:00:00')) / 86400000);
                if (diff < 0)       { daysEl.textContent = `${mmdd} · ${Math.abs(diff)}d OVR`; daysEl.classList.add('lt-overdue'); }
                else if (diff === 0){ daysEl.textContent = `${mmdd} · TODAY`; daysEl.classList.add('lt-today'); }
                else                { daysEl.textContent = `${mmdd} · ${diff}d`; }
            }
            const delBtn = document.createElement('button');
            delBtn.className = 'del-btn'; delBtn.textContent = 'X'; delBtn.dataset.role = 'lt-del'; delBtn.type = 'button';
            deadlineWrap.append(dateEl, dateIcon, daysEl);
            row.append(cb, textContainer, deadlineWrap, delBtn);
            frag.appendChild(row);
        });
        listEl.appendChild(frag);
    },

    add() {
        const goals = LongTermModule.currentGoals();
        goals.push({ id: 'lt_' + Date.now(), text: '', deadline: '', done: false });
        LongTermModule.triggerSave(); // 先更新版本號
        LongTermModule.render();
        const listEl = document.getElementById('lt-goal-list');
        const lastInput = listEl?.lastElementChild?.querySelector('[data-role=lt-text]');
        if (lastInput) lastInput.focus();
    },

    handleClick(e) {
        const row = e.target.closest('.lt-goal-row');
        if (!row) return;
        const id = row.dataset.ltId;
        const goals = LongTermModule.currentGoals();
        const idx = goals.findIndex(g => g.id === id);
        if (idx < 0) return;
        if (e.target.dataset.role === 'lt-check') {
            goals[idx].done = e.target.checked;
            const textContainer = row.querySelector('.lt-text-container');
            const textInput     = row.querySelector('[data-role=lt-text]');
            const daysEl        = row.querySelector('.lt-days');
            if (textContainer) textContainer.classList.toggle('completed', goals[idx].done);
            if (textInput)     textInput.classList.toggle('completed', goals[idx].done);
            if (daysEl) {
                daysEl.className = 'lt-days';
                if (goals[idx].done) { daysEl.textContent = '✓ DONE'; daysEl.classList.add('lt-complete'); }
                else if (goals[idx].deadline) {
                    const today = Utils.todayISO();
                    const mmdd = goals[idx].deadline.slice(5);
                    const diff = Math.ceil((new Date(goals[idx].deadline + 'T12:00:00') - new Date(today + 'T12:00:00')) / 86400000);
                    if (diff < 0)       { daysEl.textContent = `${mmdd} · ${Math.abs(diff)}d OVR`; daysEl.classList.add('lt-overdue'); }
                    else if (diff === 0){ daysEl.textContent = `${mmdd} · TODAY`; daysEl.classList.add('lt-today'); }
                    else                { daysEl.textContent = `${mmdd} · ${diff}d`; }
                } else { daysEl.textContent = ''; }
            }
            LongTermModule.triggerSave();
        } else if (e.target.dataset.role === 'lt-del') {
            row.remove();                  // 即時 DOM 移除
            goals.splice(idx, 1);
            LongTermModule.triggerSave();
            LongTermModule.render();
        }
    },
    handleInput(e) {
        const row = e.target.closest('.lt-goal-row');
        if (!row) return;
        const goal = LongTermModule.currentGoals().find(g => g.id === row.dataset.ltId);
        if (!goal) return;
        if (e.target.dataset.role === 'lt-text') { goal.text = e.target.value; }
        if (e.target.dataset.role === 'lt-deadline') {
            goal.deadline = e.target.value;
            const daysEl = row.querySelector('.lt-days');
            if (daysEl) {
                daysEl.className = 'lt-days';
                if (goal.done) { daysEl.textContent = '✓ DONE'; daysEl.classList.add('lt-complete'); }
                else if (goal.deadline) {
                    const today = Utils.todayISO();
                    const mmdd = goal.deadline.slice(5);
                    const diff = Math.ceil((new Date(goal.deadline + 'T12:00:00') - new Date(today + 'T12:00:00')) / 86400000);
                    if (diff < 0)       { daysEl.textContent = `${mmdd} · ${Math.abs(diff)}d OVR`; daysEl.classList.add('lt-overdue'); }
                    else if (diff === 0){ daysEl.textContent = `${mmdd} · TODAY`; daysEl.classList.add('lt-today'); }
                    else                { daysEl.textContent = `${mmdd} · ${diff}d`; }
                } else { daysEl.textContent = ''; }
            }
        }
        LongTermModule.triggerSave();
    },
};

// ---------- GOAL TEMPLATE MODULE ----------
const GoalTemplateModule = {
    LS_KEY: 'gpal_goal_templates',
    templates: [],

    init() {
        try { const s = JSON.parse(localStorage.getItem(this.LS_KEY) || '[]'); if (Array.isArray(s)) this.templates = s; } catch {}
    },

    _save() {
        if (this.templates.length > 10) this.templates = this.templates.slice(-10);
        try { localStorage.setItem(this.LS_KEY, JSON.stringify(this.templates)); } catch {}
    },

    _extractGoals() {
        GoalModule.saveCurrent();
        const raw = GoalModule.allData[0] || '';
        return raw.split('\n').filter(l => l.trim() && /^\[[ x]\]/.test(l)).map(l => {
            const prioMatch = l.match(/\((P[1-3]|NONE)\)/);
            const text = l.replace(/^\[[ x]\]\s*\((P[1-3]|NONE)\)\s*/, '').replace(/^\[[ x]\]\s*/, '').trim();
            return { text, prio: prioMatch ? prioMatch[1] : 'NONE' };
        }).filter(g => g.text);
    },

    saveCurrentAs(name) {
        const n = name.trim();
        if (!n) return;
        const goals = this._extractGoals();
        if (!goals.length) { Utils.setStatus('NO_GOALS_TO_SAVE', 'warn'); return; }
        const existIdx = this.templates.findIndex(t => t.name === n);
        const tmpl = { id: 'tmpl_' + Date.now(), name: n, goals };
        if (existIdx >= 0) this.templates[existIdx] = tmpl; else this.templates.push(tmpl);
        this._save();
        Utils.setStatus(`TEMPLATE_SAVED · ${n}`, 'success');
        this.renderPanel();
    },

    applyTemplate(id) {
        const tmpl = this.templates.find(t => t.id === id);
        if (!tmpl || !confirm(`Apply "${tmpl.name}"? Current goals will be replaced.`)) return;
        const raw = tmpl.goals.map(g => `[ ] (${g.prio}) ${g.text}`).join('\n');
        GoalModule.parseSingle(raw);
        GoalModule.saveCurrent();
        SaveQueue.trigger();
        GoalTemplateModule.closePanel();
        Utils.setStatus(`TEMPLATE_APPLIED · ${tmpl.name}`, 'success');
    },

    deleteTemplate(id) {
        this.templates = this.templates.filter(t => t.id !== id);
        this._save(); this.renderPanel();
    },

    togglePanel() {
        const panel = document.getElementById('goal-tmpl-panel');
        const btn = document.getElementById('btn-tmpl');
        if (!panel) return;
        const isOpen = panel.style.display !== 'none';
        panel.style.display = isOpen ? 'none' : 'block';
        if (btn) btn.classList.toggle('active', !isOpen);
        if (!isOpen) this.renderPanel();
    },

    closePanel() {
        const panel = document.getElementById('goal-tmpl-panel');
        const btn = document.getElementById('btn-tmpl');
        if (panel) panel.style.display = 'none';
        if (btn) btn.classList.remove('active');
    },

    renderPanel() {
        const panel = document.getElementById('goal-tmpl-panel');
        if (!panel || panel.style.display === 'none') return;
        panel.replaceChildren();
        if (!this.templates.length) {
            const empty = document.createElement('div');
            empty.className = 'tmpl-empty';
            empty.textContent = 'NO_TEMPLATES · SAVE CURRENT GOALS BELOW';
            panel.appendChild(empty);
        } else {
            const list = document.createElement('div');
            this.templates.forEach(tmpl => {
                const item = document.createElement('div'); item.className = 'tmpl-item';
                const nameEl = document.createElement('span'); nameEl.className = 'tmpl-item-name'; nameEl.textContent = tmpl.name + '  ·  ' + tmpl.goals.length + ' goals';
                const applyEl = document.createElement('span'); applyEl.className = 'tmpl-item-apply'; applyEl.textContent = '[APPLY]'; applyEl.onclick = () => GoalTemplateModule.applyTemplate(tmpl.id);
                const delEl = document.createElement('span'); delEl.className = 'tmpl-item-del'; delEl.textContent = 'X'; delEl.onclick = e => { e.stopPropagation(); GoalTemplateModule.deleteTemplate(tmpl.id); };
                item.append(nameEl, applyEl, delEl); list.appendChild(item);
            });
            panel.appendChild(list);
        }
        const saveRow = document.createElement('div'); saveRow.className = 'tmpl-save-row';
        const input = document.createElement('input'); input.type = 'text'; input.className = 'tmpl-name-input'; input.placeholder = 'Template name...'; input.maxLength = 30;
        input.addEventListener('keydown', e => { if (e.key === 'Enter') GoalTemplateModule.saveCurrentAs(input.value); });
        const saveBtn = document.createElement('button'); saveBtn.className = 'tmpl-save-btn'; saveBtn.textContent = 'SAVE CURRENT';
        saveBtn.onclick = () => GoalTemplateModule.saveCurrentAs(input.value);
        saveRow.append(input, saveBtn); panel.appendChild(saveRow);
    },
};

// ---------- JARVIS BRIEF MODULE ----------
const JarvisModule = {
    LS_KEY: 'gpal_jarvis_lang',
    _speaking: false,
    _getLang() { return localStorage.getItem(JarvisModule.LS_KEY) || 'auto'; },
    _selectVoice() {
        if (!('speechSynthesis' in window)) return null;
        const voices = window.speechSynthesis.getVoices();
        const lang = JarvisModule._getLang();
        if (lang === 'auto') return voices.find(v => v.lang === 'zh-TW') || voices.find(v => v.lang === 'zh-HK') || voices.find(v => v.lang.startsWith('zh')) || voices.find(v => v.lang === 'en-US') || voices[0] || null;
        return voices.find(v => v.lang === lang) || voices.find(v => v.lang.startsWith(lang.slice(0, 2))) || voices[0] || null;
    },
    _weatherDesc(code) {
        const lang = JarvisModule._getLang(); const isEn = lang === 'en-US'; const isJa = lang === 'ja-JP';
        const map = [[0,isEn?'clear sky':isJa?'快晴':'晴天'],[2,isEn?'partly cloudy':isJa?'晴れ時々曇り':'多雲時晴'],[3,isEn?'overcast':isJa?'曇り':'陰天'],[49,isEn?'foggy':isJa?'霧':'有霧'],[67,isEn?'rainy':isJa?'雨':'下雨'],[77,isEn?'snowy':isJa?'雪':'下雪'],[82,isEn?'showers':isJa?'にわか雨':'陣雨'],[99,isEn?'thunderstorm':isJa?'雷雨':'雷暴']];
        for (const [max, desc] of map) { if (code <= max) return desc; }
        return isEn ? 'unknown' : '未知';
    },
    _buildReport() {
        const lang = JarvisModule._getLang(); const isEn = lang === 'en-US'; const isJa = lang === 'ja-JP';
        const date = (DOM.datePicker && DOM.datePicker.value) || Utils.todayISO();
        const raw = GoalModule.allData[0] || '';
        const lines = raw.split('\n').filter(l => l.trim() && /^\[[ x]\]/.test(l));
        const done = lines.filter(l => l.startsWith('[x]')); const pending = lines.filter(l => l.startsWith('[ ]'));
        const pct = lines.length ? Math.round(done.length / lines.length * 100) : 0;
        const clean = l => l.replace(/^\[[ x]\]\s*\((P[1-3]|NONE)\)\s*/, '').replace(/^\[[ x]\]\s*/, '').trim();
        const doneTexts = done.map(clean).filter(Boolean); const pendingTexts = pending.map(clean).filter(Boolean);
        const d = new Date(date + 'T12:00:00'); const member = MemberModule.current() || 'A';
        const w = window._gpalWeather; let report = '';
        if (isEn) {
            const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
            report = `JARVIS status report. ${member}'s mission status. Date: ${months[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}. `;
            if (lines.length) { report += `Mission completion: ${pct} percent. `; if (doneTexts.length) report += `Completed: ${doneTexts.join(', ')}. `; if (pendingTexts.length) report += `Pending: ${pendingTexts.join(', ')}. `; } else { report += `No tasks set for today. `; }
            if (w) report += `Weather: ${JarvisModule._weatherDesc(w.code)}, ${w.temp} degrees Celsius. `;
            report += `All systems nominal. End of report.`;
        } else if (isJa) {
            report = `JARVISシステムレポート。${member}のミッション状況。日付：${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日。`;
            if (lines.length) { report += `タスク完了率：${pct}%。`; if (doneTexts.length) report += `完了：${doneTexts.join('、')}。`; if (pendingTexts.length) report += `未完了：${pendingTexts.join('、')}。`; } else { report += `本日のタスクはまだ設定されていません。`; }
            if (w) report += `天気：${JarvisModule._weatherDesc(w.code)}、気温${w.temp}度。`;
            report += `全システム正常。レポート終了。`;
        } else {
            report = `JARVIS 系統匯報。${member} 的任務狀態。日期：${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日。`;
            if (lines.length) { report += `任務完成率：${pct}%。`; if (doneTexts.length) report += `已完成：${doneTexts.join('、')}。`; if (pendingTexts.length) report += `待完成：${pendingTexts.join('、')}。`; } else { report += `今日尚未設定任何任務。`; }
            if (w) report += `天氣狀況：${JarvisModule._weatherDesc(w.code)}，氣溫 ${w.temp} 度。`;
            report += `所有系統正常。匯報完畢。`;
        }
        return report;
    },
    speak() {
        if (!('speechSynthesis' in window)) { Utils.setStatus('SPEECH_NOT_SUPPORTED', 'error'); return; }
        if (this._speaking) { this.stop(); return; }
        window.speechSynthesis.cancel();
        const utt = new SpeechSynthesisUtterance(this._buildReport());
        const doSpeak = () => { const voice = JarvisModule._selectVoice(); if (voice) utt.voice = voice; utt.rate = 0.88; utt.pitch = 0.85; utt.volume = 1; const cleanup = () => { JarvisModule._speaking = false; const btn = document.getElementById('btn-jarvis'); if (btn) btn.textContent = '◎ BRIEF'; }; utt.onend = cleanup; utt.onerror = cleanup; window.speechSynthesis.speak(utt); JarvisModule._speaking = true; const btn = document.getElementById('btn-jarvis'); if (btn) btn.textContent = '◉ STOP'; };
        if (window.speechSynthesis.getVoices().length) { doSpeak(); } else { window.speechSynthesis.addEventListener('voiceschanged', doSpeak, { once: true }); }
    },
    stop() { window.speechSynthesis.cancel(); this._speaking = false; const btn = document.getElementById('btn-jarvis'); if (btn) btn.textContent = '◎ BRIEF'; },
};

// ---------- MISSION CLOCK MODULE ----------
const MissionClockModule = {
    DURATION: 25 * 60 * 1000,
    startTs: null, pausedMs: 0, pauseStart: null,
    taskName: '', activeRow: null, _tickTimer: null,

    get isRunning() { return this.startTs !== null && this.pauseStart === null; },
    get isPaused()  { return this.startTs !== null && this.pauseStart !== null; },
    get isIdle()    { return this.startTs === null; },

    getElapsed() {
        if (this.isIdle) return 0;
        const pausedTotal = this.pausedMs + (this.pauseStart ? Date.now() - this.pauseStart : 0);
        return (Date.now() - this.startTs) - pausedTotal;
    },
    getRemaining() { return Math.max(0, this.DURATION - this.getElapsed()); },

    start(taskName, row) {
        MissionClockModule.stop();
        MissionClockModule.taskName = taskName;
        MissionClockModule.activeRow = row;
        MissionClockModule.startTs = Date.now();
        MissionClockModule.pausedMs = 0;
        MissionClockModule.pauseStart = null;
        if (row) row.classList.add('clocking');
        const bar = document.getElementById('mission-clock-bar');
        if (bar) bar.style.display = 'flex';
        const tn = document.getElementById('mc-task-name');
        if (tn) tn.textContent = taskName;
        const pb = document.getElementById('mc-pause-btn');
        if (pb) pb.textContent = 'PAUSE';
        MissionClockModule._updateUI();
        MissionClockModule._scheduleTick();
        if ('Notification' in window && Notification.permission === 'default') Notification.requestPermission();
    },

    togglePause() {
        if (MissionClockModule.isIdle) return;
        if (MissionClockModule.isRunning) {
            MissionClockModule.pauseStart = Date.now();
            const pb = document.getElementById('mc-pause-btn');
            if (pb) pb.textContent = 'RESUME';
            if (MissionClockModule._tickTimer) { clearTimeout(MissionClockModule._tickTimer); MissionClockModule._tickTimer = null; }
        } else if (MissionClockModule.isPaused) {
            MissionClockModule.pausedMs += Date.now() - MissionClockModule.pauseStart;
            MissionClockModule.pauseStart = null;
            const pb = document.getElementById('mc-pause-btn');
            if (pb) pb.textContent = 'PAUSE';
            MissionClockModule._scheduleTick();
        }
        MissionClockModule._updateUI();
    },

    stop() {
        if (MissionClockModule._tickTimer) { clearTimeout(MissionClockModule._tickTimer); MissionClockModule._tickTimer = null; }
        if (MissionClockModule.activeRow) MissionClockModule.activeRow.classList.remove('clocking');
        MissionClockModule.startTs = null; MissionClockModule.pausedMs = 0;
        MissionClockModule.pauseStart = null; MissionClockModule.taskName = ''; MissionClockModule.activeRow = null;
        const bar = document.getElementById('mission-clock-bar');
        if (bar) bar.style.display = 'none';
        const timeEl = document.getElementById('mc-time');
        if (timeEl) { timeEl.textContent = '25:00'; timeEl.classList.remove('urgent'); }
        const progEl = document.getElementById('mc-progress-bar');
        if (progEl) progEl.style.width = '100%';
    },

    finish() {
        const taskName = MissionClockModule.taskName;
        MissionClockModule.stop();
        Utils.setStatus('MISSION COMPLETE ✓', 'success');
        const overlay = document.createElement('div');
        overlay.style.cssText = 'position:fixed;inset:0;background:rgba(255,204,0,0.08);pointer-events:none;z-index:9999;transition:opacity 0.6s;';
        document.body.appendChild(overlay);
        setTimeout(() => { overlay.style.opacity = '0'; setTimeout(() => overlay.remove(), 600); }, 200);
        if ('Notification' in window && Notification.permission === 'granted') {
            try { new Notification('✓ MISSION COMPLETE', { body: taskName, silent: false }); } catch {}
        }
    },

    _scheduleTick() {
        if (MissionClockModule._tickTimer) clearTimeout(MissionClockModule._tickTimer);
        if (!MissionClockModule.isRunning) return;
        MissionClockModule._tickTimer = setTimeout(() => {
            MissionClockModule._updateUI();
            if (MissionClockModule.getRemaining() <= 0) MissionClockModule.finish();
            else MissionClockModule._scheduleTick();
        }, 500);
    },

    _updateUI() {
        const remaining = MissionClockModule.getRemaining();
        const mins = Math.floor(remaining / 60000);
        const secs = Math.floor((remaining % 60000) / 1000);
        const timeEl = document.getElementById('mc-time');
        const progEl = document.getElementById('mc-progress-bar');
        if (timeEl) { timeEl.textContent = Utils.pad2(mins) + ':' + Utils.pad2(secs); timeEl.classList.toggle('urgent', remaining < 5 * 60 * 1000 && remaining > 0); }
        if (progEl) progEl.style.width = (remaining / MissionClockModule.DURATION * 100) + '%';
    },

    onVisibilityChange() {
        if (document.hidden || MissionClockModule.isIdle) return;
        if (MissionClockModule.getRemaining() <= 0) MissionClockModule.finish();
        else if (MissionClockModule.isRunning) { MissionClockModule._updateUI(); MissionClockModule._scheduleTick(); }
    },

    init() { /* visibilitychange handled by Events.init consolidated listener */ },
};

// ---------- STREAK MODULE ----------
const StreakModule = {
    LS_KEY: 'gpal_streak',
    data: {},

    getMember(name) {
        if (!StreakModule.data[name]) StreakModule.data[name] = { current: 0, best: 0, lastDate: '', graceUsed: false, graceMonth: '', threshold: 0.7 };
        return StreakModule.data[name];
    },

    init() {
        try {
            const cached = JSON.parse(localStorage.getItem(StreakModule.LS_KEY) || 'null');
            if (cached && typeof cached === 'object') StreakModule.data = cached;
        } catch {}
        StreakModule.render();
    },

    save() { try { localStorage.setItem(StreakModule.LS_KEY, JSON.stringify(StreakModule.data)); } catch {} },

    checkAndUpdate(date) {
        if (!date || date !== Utils.todayISO()) return;
        const name = MemberModule.current();
        const s = StreakModule.getMember(name);
        const raw = GoalModule.allData[0] || '';
        const lines = raw.split('\n').filter(l => l.trim() && /^\[[ x]\]/.test(l));
        if (!lines.length) return;
        const doneCount = lines.filter(l => l.startsWith('[x]')).length;
        if (doneCount / lines.length < (s.threshold || 0.7)) return;
        const today = date;
        if (s.lastDate === today) return;
        const d = new Date(today + 'T12:00:00');
        d.setDate(d.getDate() - 1);
        const yesterday = d.getFullYear() + '-' + Utils.pad2(d.getMonth() + 1) + '-' + Utils.pad2(d.getDate());
        const currentMonth = today.slice(0, 7);
        if (s.lastDate === yesterday) { s.current++; }
        else {
            if (!s.graceUsed || s.graceMonth !== currentMonth) { s.graceUsed = true; s.graceMonth = currentMonth; if (!s.current) s.current = 1; }
            else { s.current = 1; }
        }
        s.best = Math.max(s.best || 0, s.current);
        s.lastDate = today;
        StreakModule.data[name] = s;
        StreakModule.save();
        StreakModule.render();
    },

    render() {
        const el = document.getElementById('streak-display');
        if (!el) return;
        const name = MemberModule.current();
        const s = StreakModule.getMember(name);
        const c = s.current || 0;
        const wasMilestone = c === 7 || c === 30 || c === 100;
        if (c === 0) { el.textContent = '⚡ 0D'; el.className = 'streak-display cold'; }
        else {
            el.textContent = (c >= 7 ? '🔥' : '✦') + ' ' + c + 'D';
            el.className = 'streak-display hot';
            if (wasMilestone) { el.classList.add('streak-milestone'); setTimeout(() => el.classList.remove('streak-milestone'), 600); }
        }
        el.title = 'Best: ' + (s.best || 0) + 'D · Threshold: ' + Math.round((s.threshold || 0.7) * 100) + '%';
    },
};

// ---------- HABIT TRACKER MODULE ----------
const HabitModule = {
    LS_KEY: 'gpal_habits',
    data: {},
    _saveTimer: null,
    _dataVersion: 0,
    _lastRenderedKey: null,

    currentHabits() { return HabitModule.data; },
    _lsKey() { return 'gpal_habits_' + MemberModule.current(); },

    _recentDays(n = 7) {
        const today = Utils.todayISO();
        const days = [];
        for (let i = n - 1; i >= 0; i--) {
            const d = new Date(today + 'T12:00:00');
            d.setDate(d.getDate() - i);
            days.push(d.getFullYear() + '-' + Utils.pad2(d.getMonth() + 1) + '-' + Utils.pad2(d.getDate()));
        }
        return days;
    },

    getStreak(habit) {
        const today = Utils.todayISO();
        let streak = 0;
        const d = new Date(today + 'T12:00:00');
        while (streak < 365) {
            const ds = d.getFullYear() + '-' + Utils.pad2(d.getMonth() + 1) + '-' + Utils.pad2(d.getDate());
            if (!habit.logs[ds]) break;
            streak++;
            d.setDate(d.getDate() - 1);
        }
        return streak;
    },

    _pruneLogs(habit) {
        const cutoff = new Date();
        cutoff.setDate(cutoff.getDate() - 90);
        const cutoffStr = cutoff.getFullYear() + '-' + Utils.pad2(cutoff.getMonth() + 1) + '-' + Utils.pad2(cutoff.getDate());
        Object.keys(habit.logs).forEach(d => { if (d < cutoffStr) delete habit.logs[d]; });
    },

    async init() {
        HabitModule.data = [];
        try { const c = JSON.parse(localStorage.getItem(HabitModule._lsKey()) || 'null'); if (Array.isArray(c)) HabitModule.data = c; } catch {}
        HabitModule.render();
        try {
            const res = await Utils.safeFetch(`${CONFIG.WEB_APP_URL}?type=habit`);
            const json = await res.json();
            let incoming = json.habits;
            // migrate old format {member:[...]} → extract current member's array
            if (!Array.isArray(incoming) && incoming && typeof incoming === 'object') incoming = incoming[MemberModule.current()] || [];
            if (Array.isArray(incoming) && json.found !== false) {
                HabitModule.data = incoming;
                HabitModule._dataVersion++;
                try { localStorage.setItem(HabitModule._lsKey(), JSON.stringify(incoming)); } catch {}
                HabitModule.render();
            }
        } catch {}
    },

    triggerSave() {
        HabitModule._dataVersion++;
        HabitModule._lastRenderedKey = null;
        HabitModule._scheduleSave();
    },

    _scheduleSave() {
        try { localStorage.setItem(HabitModule._lsKey(), JSON.stringify(HabitModule.data)); } catch {}
        if (HabitModule._saveTimer) clearTimeout(HabitModule._saveTimer);
        HabitModule._saveTimer = setTimeout(async () => {
            try {
                const res = await Utils.safeFetch(CONFIG.WEB_APP_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ type: 'habit', data: HabitModule.data })
                });
                const json = await res.json();
                if (!json.success) throw new Error('save failed');
            } catch { Utils.setStatus('HABIT_SAVE_ERR · LOCAL_SAVED', 'error'); }
        }, 3000);
    },

    render() {
        const listEl = document.getElementById('habit-list');
        if (!listEl) return;
        const cacheKey = `${MemberModule.current()}|${HabitModule._dataVersion}`;
        if (cacheKey === HabitModule._lastRenderedKey) return;
        HabitModule._lastRenderedKey = cacheKey;

        const habits = HabitModule.currentHabits();
        const days = HabitModule._recentDays(7);
        const today = Utils.todayISO();
        listEl.replaceChildren();
        if (!habits.length) return;
        const frag = document.createDocumentFragment();
        habits.forEach(habit => {
            const row = document.createElement('div');
            row.className = 'habit-row'; row.dataset.habitId = habit.id;
            const nameEl = document.createElement('input');
            nameEl.type = 'text'; nameEl.className = 'habit-name-input';
            nameEl.value = habit.name; nameEl.placeholder = 'Habit name...'; nameEl.dataset.role = 'habit-name';
            const dotsEl = document.createElement('div');
            dotsEl.className = 'habit-dots';
            days.forEach(day => {
                const dot = document.createElement('div');
                dot.className = 'habit-dot' + (habit.logs[day] ? ' done' : '') + (day === today ? ' is-today' : '');
                dot.dataset.role = 'habit-dot'; dot.dataset.date = day; dot.title = day;
                dotsEl.appendChild(dot);
            });
            const streakEl = document.createElement('span');
            streakEl.className = 'habit-streak';
            const s = HabitModule.getStreak(habit);
            streakEl.textContent = s > 0 ? (s >= 7 ? '🔥' : '✦') + s + 'd' : '';
            const delBtn = document.createElement('div');
            delBtn.className = 'del-btn'; delBtn.textContent = 'X'; delBtn.dataset.role = 'habit-del';
            row.append(nameEl, dotsEl, streakEl, delBtn);
            frag.appendChild(row);
        });
        listEl.appendChild(frag);
    },

    add() {
        HabitModule.currentHabits().push({ id: 'h_' + Date.now(), name: '', logs: {} });
        HabitModule.triggerSave();
        HabitModule.render();
        document.getElementById('habit-list')?.lastElementChild?.querySelector('[data-role=habit-name]')?.focus();
    },

    handleClick(e) {
        const row = e.target.closest('.habit-row');
        if (!row) return;
        const habits = HabitModule.currentHabits();
        const idx = habits.findIndex(h => h.id === row.dataset.habitId);
        if (idx < 0) return;
        if (e.target.dataset.role === 'habit-dot') {
            const date = e.target.dataset.date;
            if (!habits[idx].logs) habits[idx].logs = {};
            if (habits[idx].logs[date]) { delete habits[idx].logs[date]; }
            else { habits[idx].logs[date] = true; HabitModule._pruneLogs(habits[idx]); }
            e.target.classList.toggle('done', !!habits[idx].logs[date]);
            const streakEl = row.querySelector('.habit-streak');
            if (streakEl) { const s = HabitModule.getStreak(habits[idx]); streakEl.textContent = s > 0 ? (s >= 7 ? '🔥' : '✦') + s + 'd' : ''; }
            HabitModule._scheduleSave(); // 靜默保存，不失效 render 快取
        } else if (e.target.dataset.role === 'habit-del') {
            if (confirm('DELETE THIS HABIT?')) { habits.splice(idx, 1); HabitModule.triggerSave(); HabitModule.render(); }
        }
    },

    handleInput(e) {
        const row = e.target.closest('.habit-row');
        if (!row || e.target.dataset.role !== 'habit-name') return;
        const habit = HabitModule.currentHabits().find(h => h.id === row.dataset.habitId);
        if (habit) { habit.name = e.target.value; HabitModule.triggerSave(); }
    },
};
