        if (btnPlanReset) {
            btnPlanReset.addEventListener('click', () => {
                if (!btnPlanReset.dataset.confirming) {
                    btnPlanReset.dataset.confirming = '1';
                    btnPlanReset.textContent = 'OK?';
                    btnPlanReset.style.background = 'rgba(255,62,62,0.2)';
                    btnPlanReset.style.borderColor = 'var(--stark-red)';
                    btnPlanReset.style.color = 'var(--stark-red)';
                    setTimeout(() => {
                        if (btnPlanReset.dataset.confirming) {
                            delete btnPlanReset.dataset.confirming;
                            btnPlanReset.textContent = 'RESET';
                            btnPlanReset.style.background = '';
                            btnPlanReset.style.borderColor = '';
                            btnPlanReset.style.color = '';
                        }
                    }, 2000);
                    return;
                }
                delete btnPlanReset.dataset.confirming;
                btnPlanReset.textContent = 'RESET';
                btnPlanReset.style.background = '';
                btnPlanReset.style.borderColor = '';
                btnPlanReset.style.color = '';
                PlanModule.clearAll();
            });
        }


        // Spotify：頁面隱藏時停止 timer，恢復時重啟
        document.addEventListener('visibilitychange', () => {
            if (!SpotifyModule._token) return;
            if (document.hidden) {
                clearInterval(SpotifyModule._lyricsTimer); SpotifyModule._lyricsTimer = null;
            } else if (SpotifyModule._playing) {
                if (!SpotifyModule._lyricsTimer)
                    SpotifyModule._lyricsTimer = setInterval(SpotifyModule._tickLyrics, 1000);
                SpotifyModule.fetchNowPlaying();
            }
        });

        // JARVIS BRIEF 事件
        const btnJarvis = document.getElementById('btn-jarvis');
        if (btnJarvis) btnJarvis.addEventListener('click', () => JarvisModule.speak());

        const jarvisLang = document.getElementById('jarvis-lang');
        if (jarvisLang) {
            const saved = localStorage.getItem(JarvisModule.LS_KEY);
            if (saved) jarvisLang.value = saved;
            jarvisLang.addEventListener('change', () => {
                localStorage.setItem(JarvisModule.LS_KEY, jarvisLang.value);
            });
        }

        // HABIT TRACKER 事件
        const habitList = document.getElementById('habit-list');
        if (habitList) {
            habitList.addEventListener('click', HabitModule.handleClick);
            habitList.addEventListener('input', HabitModule.handleInput);
        }
        const btnHabitAdd = document.getElementById('btn-habit-add');
        if (btnHabitAdd) btnHabitAdd.addEventListener('click', () => HabitModule.add());

        // LONGTERM GOAL 事件
        const ltList = document.getElementById('lt-goal-list');
        if (ltList) {
            ltList.addEventListener('click', LongTermModule.handleClick);
            ltList.addEventListener('input', LongTermModule.handleInput);
            ltList.addEventListener('change', LongTermModule.handleInput);
        }
        const btnLtAdd = document.getElementById('btn-lt-add');
        if (btnLtAdd) btnLtAdd.addEventListener('click', () => LongTermModule.add());

        const btnLtSeed = document.getElementById('btn-lt-seed');
        if (btnLtSeed) btnLtSeed.addEventListener('click', () => LongTermModule.addPreset());

        // LONGTERM RESET 事件（雙擊確認）
        const btnLtReset = document.getElementById('btn-lt-reset');
        if (btnLtReset) {
            btnLtReset.addEventListener('click', () => {
                if (!btnLtReset.dataset.confirming) {
                    btnLtReset.dataset.confirming = '1';
                    btnLtReset.textContent = 'OK?';
                    btnLtReset.style.background = 'rgba(255,62,62,0.2)';
                    btnLtReset.style.borderColor = 'var(--stark-red)';
                    btnLtReset.style.color = 'var(--stark-red)';
                    setTimeout(() => {
                        if (btnLtReset.dataset.confirming) {
                            delete btnLtReset.dataset.confirming;
                            btnLtReset.textContent = 'RESET';
                            btnLtReset.style.background = '';
                            btnLtReset.style.borderColor = '';
                            btnLtReset.style.color = '';
                        }
                    }, 2000);
                    return;
                }
                delete btnLtReset.dataset.confirming;
                btnLtReset.textContent = 'RESET';
                btnLtReset.style.background = '';
                btnLtReset.style.borderColor = '';
                btnLtReset.style.color = '';
                LongTermModule.clearAll();
            });
        }

        // SAVE NOW 按鈕（保證儲存：每個部分獨立進行，其中一項失敗不影響其他項）
        const btnSaveNow = document.getElementById('btn-save-now');
        if (btnSaveNow) {
            btnSaveNow.addEventListener('click', async () => {
                if (btnSaveNow.disabled) return;
                btnSaveNow.disabled = true;
                btnSaveNow.textContent = 'SAVING...';

                // 保險：萬一之前卡住了，強制解除鎖定，確保這次一定能存
                State.isSyncing = false;

                const tasks = [
                    { name: 'Daily',    fn: () => Sync.save('MANUAL') },
                    { name: 'LongTerm', fn: () => LongTermModule.flushSave() },
                    { name: 'Habit',    fn: () => HabitModule.flushSave() },
                ];
                const results = await Promise.allSettled(tasks.map(t => t.fn()));
                const failed = results
                    .map((r, i) => ({ r, name: tasks[i].name }))
                    .filter(x => x.r.status === 'rejected');

                if (failed.length === 0) {
                    btnSaveNow.textContent = 'SAVED ✓';
                    btnSaveNow.style.borderColor = 'var(--stark-green)';
                    btnSaveNow.style.color = 'var(--stark-green)';
                } else {
                    btnSaveNow.textContent = `FAILED: ${failed.map(f => f.name).join(', ')}`;
                    btnSaveNow.style.borderColor = 'var(--stark-red)';
                    btnSaveNow.style.color = 'var(--stark-red)';
                    console.error('[SAVE NOW] failures:', failed.map(f => ({ name: f.name, reason: f.r.reason })));
                }
                setTimeout(() => {
                    btnSaveNow.disabled = false;
                    btnSaveNow.textContent = 'SAVE NOW';
                    btnSaveNow.style.borderColor = '';
                    btnSaveNow.style.color = '';
                }, 3000);
            });
        }

        // 導覽
        document.querySelector('[data-action="prev-day"]').addEventListener('click', () => Events.changeDate(-1));
        document.querySelector('[data-action="next-day"]').addEventListener('click', () => Events.changeDate(1));

        // 手機滑動換日：左滑→下一天，右滑→上一天
        let touchStartX = 0;
        let touchStartY = 0;
        document.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, { passive: true });
        document.addEventListener('touchend', (e) => {
            const dx = e.changedTouches[0].clientX - touchStartX;
            const dy = e.changedTouches[0].clientY - touchStartY;
            // 水平位移 > 60px 且水平幅度大於垂直（避免誤觸滾動）
            if (Math.abs(dx) < 60 || Math.abs(dx) < Math.abs(dy) * 1.5) return;
            // 左滑 = 下一天（前進），右滑 = 上一天（後退）
            Events.changeDate(dx < 0 ? -1 : 1);
        }, { passive: true });
        DOM.datePicker.addEventListener('change', async () => {
            Utils.updateDateLabel(DOM.datePicker.value);
            applyDayTheme(DOM.datePicker.value, true);
                            await SaveQueue.flushImmediate();
            await LongTermModule.flushSave();
            await HabitModule.flushSave();
            Sync.fetchData();
        });

        // 網路狀態
        window.addEventListener('online', () => {
            State.isOnline = true;
            Utils.setConnState('online');
            Utils.setStatus('NETWORK_RESTORED', 'success');
            // 自動推上本地暫存
            if (State.dirty) Sync.save('AUTO');
        });
        window.addEventListener('offline', () => {
            State.isOnline = false;
            Utils.setConnState('offline');
            Utils.setStatus('OFFLINE — saving locally', 'warn');
        });

        // 離頁前確保儲存（桌面版 beforeunload 較可靠的情境）
        window.addEventListener('beforeunload', (e) => {
            if (State.dirty) {
                SaveQueue.flushImmediate();
                e.preventDefault();
                e.returnValue = '';
            }
        });

        // 頁面切到背景/前景時的處理
        // 手機瀏覽器（尤其 iOS Safari）切 App、鎖螢幕、滑掉分頁時，beforeunload 幾乎不會觸發，
        // 這是手機上「編輯完沒存到雲端」的主因。visibilitychange 在這些情境下才是可靠的訊號。
        document.addEventListener('visibilitychange', async () => {
            if (document.hidden) {
                // 切到背景：立刻強制儲存所有還沒存的內容，不等原本的 debounce
                try {
                    await SaveQueue.flushImmediate();
                    await LongTermModule.flushSave();
                    await HabitModule.flushSave();
                } catch (e) {
                    console.error('[visibilitychange] flush failed:', e);
                }
                return;
            }
            // 回到前景
            PlanModule.checkTimeHighlight();
            MissionClockModule.onVisibilityChange();
        });
    },

    async changeDate(days) {
        await SaveQueue.flushImmediate();
        await LongTermModule.flushSave();
        await HabitModule.flushSave();
        const d = new Date(DOM.datePicker.value + 'T12:00:00');
        d.setDate(d.getDate() + days);
        DOM.datePicker.value = `${d.getFullYear()}-${Utils.pad2(d.getMonth() + 1)}-${Utils.pad2(d.getDate())}`;
        Utils.updateDateLabel(DOM.datePicker.value);
        applyDayTheme(DOM.datePicker.value, true);
            Sync.fetchData();
    },
};

// ---------- FINANCIAL INTEL MODULE ----------
const IntelModule = { loadCache(){return null;}, saveCache(){}, render(){}, showError(){}, clearError(){}, analyse(){}, init(){} };

// ---------- DAY THEME ----------
// 金屬黑主題（固定，不隨日期變化）
const METAL_THEME = {
    ov:   'rgba(0,0,0,0)',
    bg:   'radial-gradient(circle at 20% 20%, rgba(255,255,255,0.05), transparent 45%), ' +
          'radial-gradient(circle at 80% 75%, rgba(255,255,255,0.03), transparent 50%), ' +
          'linear-gradient(135deg, #0b0b0d 0%, #1a1a1d 25%, #0d0d0f 50%, #17171a 75%, #08080a 100%)',
    grid: 'rgba(255,255,255,0.05)',
};

function applyDayTheme(dateStr, animate = false) {
    const t = METAL_THEME;
    const overlay = document.getElementById('day-overlay');
    if (overlay) {
        overlay.style.backgroundColor = t.ov;
        if (animate) {
            overlay.classList.remove('shift');
            void overlay.offsetWidth;
            overlay.classList.add('shift');
            setTimeout(() => overlay.classList.remove('shift'), 700);
        }
    }
    document.body.style.backgroundImage = t.bg;
    document.documentElement.style.setProperty('--day-grid', t.grid);
}

// ---------- INIT ----------
window.addEventListener('DOMContentLoaded', () => {
    DOM.datePicker.value = Utils.todayISO();
    Utils.updateDateLabel(DOM.datePicker.value);
    applyDayTheme(DOM.datePicker.value);
    Utils.setConnState(navigator.onLine ? 'online' : 'offline');

    console.log('[GPAL] Family v4.17 loaded - past dimming active');
    MemberModule.init();

    // Step 1: 立即從 localStorage 載入
    LongTermModule._loadFromLocal();
    HabitModule._loadFromLocal();
    GoalTemplateModule._loadFromLocal();
    PlanTemplateModule._loadFromLocal();
    StreakModule.init();
    MissionClockModule.init();
    Events.init();
    // 計算固定 nav 高度，設定 CSS var
    const navH = document.querySelector('nav')?.offsetHeight || 50;
    document.documentElement.style.setProperty('--nav-h', navH + 'px');
    // 計算固定 footer 高度，補償 main-container padding-bottom
    const setFooterH = () => {
        const fh = document.querySelector('footer')?.offsetHeight || 180;
        document.documentElement.style.setProperty('--footer-h', fh + 'px');
    };
    setFooterH();
    // Spotify 連接/斷開後 footer 高度改變，重新計算
    const _origSpRender = SpotifyModule.render.bind(SpotifyModule);
    SpotifyModule.render = function() { _origSpRender(); setTimeout(setFooterH, 100); };
    // Step 2: 主資料請求
    Sync.fetchData();

    // Step 3: 次要雲端請求延後
    setTimeout(() => {
        LongTermModule._loadFromCloud();
        HabitModule._loadFromCloud();
    }, 1000);
    setTimeout(() => {
        GoalTemplateModule._loadFromCloud();
        PlanTemplateModule._loadFromCloud();
    }, 2000);

    setInterval(() => PlanModule.checkTimeHighlight(), CONFIG.TIME_CHECK_INTERVAL);

    // 版本檢查
    const CURRENT_VERSION = 'v4.17';
    async function checkVersion() {
        try {
            const res = await fetch(location.pathname + '?v=' + Date.now(), {
                cache: 'no-store',
                headers: { 'Range': 'bytes=0-500' }
            });
            const html = await res.text();
            const match = html.match(/name="version" content="([^"]+)"/);
            if (match && match[1] !== CURRENT_VERSION) {
                const ub = document.getElementById('btn-update-now'); if(ub) ub.style.display='inline-flex';
            }
        } catch(e) {}
    }
    setTimeout(checkVersion, 5000);    // 5 秒後首次檢查
    setInterval(checkVersion, 600000); // 每 10 分鐘

});
</script>
