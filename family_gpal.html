<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="version" content="v2.05">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GPAL FAMILY v2.05</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --stark-cyan: #00f2ff;
            --stark-glow: rgba(0, 242, 255, 0.8);
            --stark-glow-soft: rgba(0, 242, 255, 0.3);
            --stark-dark: #061623;
            --stark-darker: #03101a;
            --stark-panel: rgba(10, 31, 50, 0.85);
            --stark-border: rgba(0, 242, 255, 0.3);
            --stark-gold: #ffcc00;
            --stark-red: #ff3e3e;
            --stark-green: #00ff88;
            --easing-cyber: cubic-bezier(0.175, 0.885, 0.32, 1.275);
            --easing-smooth: cubic-bezier(0.25, 0.46, 0.45, 0.94);
            --day-grid: rgba(0, 242, 255, 0.025);
        }

        /* 桌面版放大基礎字體，所有 rem 單位自動等比放大 */
        @media (min-width: 768px) {
            html { font-size: 20px; }
        }
        @media (min-width: 1200px) {
            html { font-size: 22px; }
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        html { overflow-x: hidden; max-width: 100%; }
        
        body {
            font-family: 'Rajdhani', sans-serif;
            margin: 0;
            max-width: 100%;
            background: var(--stark-dark);
            color: var(--stark-cyan);
            background-image:
                radial-gradient(circle at 20% 30%, rgba(0, 242, 255, 0.08), transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(255, 204, 0, 0.04), transparent 50%),
                linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%);
            background-size: 100% 100%, 100% 100%, 100% 3px;
            background-attachment: fixed;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* 全域 HUD 網格 */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(var(--day-grid) 1px, transparent 1px),
                linear-gradient(90deg, var(--day-grid) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
            animation: grid-drift 30s linear infinite;
        }
        @keyframes grid-drift {
            from { background-position: 0 0, 0 0; }
            to   { background-position: 40px 40px, 40px 40px; }
        }
        nav, .header-section, main, footer { position: relative; z-index: 1; }

        /* ── Day theme overlay ── */
        #day-overlay {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            background-color: transparent;
            transition: background-color 1s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        @keyframes day-shift {
            0%   { opacity: 0; transform: scale(1.04); }
            100% { opacity: 1; transform: scale(1); }
        }
        #day-overlay.shift {
            animation: day-shift 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94) both;
        }

        /* === 全域動畫 === */
        @keyframes scan-line {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100vh); }
        }
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 5px var(--stark-glow-soft); }
            50% { box-shadow: 0 0 15px var(--stark-glow); }
        }
        @keyframes cyber-jump {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-4px); text-shadow: 0 0 12px var(--stark-cyan); }
            60% { transform: translateY(-2px); text-shadow: 0 0 6px var(--stark-cyan); }
        }
        @keyframes slide-in {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes boot-flash {
            0% { opacity: 0; }
            10% { opacity: 1; }
            100% { opacity: 1; }
        }

        /* 掃描線特效 */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--stark-glow), transparent);
            opacity: 0.4;
            animation: scan-line 8s linear infinite;
            pointer-events: none;
            z-index: 9999;
        }

        nav {
            padding: 0.6rem;
            border-bottom: 2px solid var(--stark-cyan);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(6, 22, 35, 0.95);
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            overflow: hidden;
        }
        @media (min-width: 768px) {
            nav { padding: 0.8rem 1.5rem; }
        }
        nav::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: -50%;
            width: 50%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--stark-cyan), transparent);
            box-shadow: 0 0 10px var(--stark-cyan);
            animation: nav-scan 5s linear infinite;
        }
        @keyframes nav-scan {
            to { left: 150%; }
        }
        .brand-bold {
            font-family: 'Orbitron';
            font-weight: 900;
            font-size: 0.9rem;
            letter-spacing: 2px;
            text-shadow: 0 0 10px var(--stark-glow);
            position: relative;
            z-index: 1;
        }


        /* member selector */
        .member-selector { display: flex; gap: 4px; align-items: center; }
        .mbr-btn {
            font-family: 'Orbitron', sans-serif; font-size: 0.38rem; font-weight: 700;
            padding: 3px 8px; border: 1px solid rgba(0,242,255,0.25);
            background: transparent; color: rgba(0,242,255,0.4);
            cursor: pointer; transition: all 0.2s; outline: none; letter-spacing: 1px;
            -webkit-tap-highlight-color: transparent;
        }
        .mbr-btn:hover { color: var(--stark-cyan); border-color: rgba(0,242,255,0.6); }
        .mbr-btn.active {
            color: var(--stark-dark); background: var(--stark-cyan);
            border-color: var(--stark-cyan); box-shadow: 0 0 8px rgba(0,242,255,0.4);
        }
        .btn-update-now {
            background: rgba(255,204,0,0.15);
            border: 1px solid var(--stark-gold);
            color: var(--stark-gold);
            font-family: 'Orbitron';
            font-size: 0.48rem;
            font-weight: 900;
            letter-spacing: 1px;
            padding: 3px 8px;
            cursor: pointer;
            transition: 0.2s;
            animation: pulse-glow 1.5s ease-in-out infinite;
            touch-action: manipulation;
        }
        .btn-update-now:hover { background: rgba(255,204,0,0.3); }

        .btn-nav-sync {
            background: transparent;
            border: 1px solid rgba(0,242,255,0.3);
            color: rgba(0,242,255,0.6);
            font-size: 0.8rem;
            width: 22px; height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s var(--easing-cyber);
            padding: 0;
            line-height: 1;
            border-radius: 2px;
        }
        .btn-nav-sync:hover {
            color: var(--stark-cyan);
            border-color: var(--stark-cyan);
            box-shadow: 0 0 8px var(--stark-glow-soft);
        }
        .btn-nav-sync:active { transform: rotate(180deg); }
        .btn-nav-sync.spinning {
            animation: spin 0.6s linear infinite;
            color: var(--stark-gold);
            border-color: var(--stark-gold);
        }
        .conn-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: 'Orbitron';
            font-size: 0.55rem;
            letter-spacing: 1px;
        }
        .conn-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--stark-green);
            box-shadow: 0 0 8px var(--stark-green);
            position: relative;
        }
        .conn-dot::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50%;
            border: 1px solid currentColor;
            color: var(--stark-green);
            animation: radar-ping 2s ease-out infinite;
        }
        @keyframes radar-ping {
            0%   { transform: scale(1); opacity: 1; }
            100% { transform: scale(3); opacity: 0; }
        }
        .conn-dot.offline { background: var(--stark-red); box-shadow: 0 0 8px var(--stark-red); }
        .conn-dot.offline::before { color: var(--stark-red); }
        .conn-dot.syncing { background: var(--stark-gold); box-shadow: 0 0 8px var(--stark-gold); }
        .conn-dot.syncing::before { color: var(--stark-gold); animation-duration: 1s; }

        .date-nav-row {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .nav-btn {
            background: transparent;
            border: 1px solid rgba(0, 242, 255, 0.4);
            color: var(--stark-cyan);
            width: 32px; height: 32px;
            cursor: pointer;
            transition: 0.2s var(--easing-cyber);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            font-weight: bold;
            position: relative;
            overflow: hidden;
        }
        .nav-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--stark-glow-soft);
            opacity: 0;
            transition: opacity 0.2s;
        }
        .nav-btn:hover::before { opacity: 1; }
        .nav-btn:hover { border-color: var(--stark-cyan); box-shadow: 0 0 14px var(--stark-glow); }
        .nav-btn:active { transform: scale(0.88); }

        .date-display {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            cursor: pointer;
            position: relative;
        }
        input[type="date"] {
            background: transparent;
            border: none;
            color: var(--stark-cyan);
            font-family: 'Orbitron';
            font-size: 1rem;
            outline: none;
            color-scheme: dark;
            letter-spacing: 2px;
            text-align: center;
            cursor: pointer;
        }
        .weather-display {
            font-family: 'Orbitron';
            font-size: 0.52rem;
            color: rgba(0,242,255,0.6);
            letter-spacing: 1px;
            white-space: nowrap;
            min-height: 0.75rem;
            text-align: right;
        }
        @media (max-width: 480px) {
            .weather-display { font-size: 0.6rem; }
        }
        .date-label {
            font-family: 'Orbitron';
            font-size: 0.6rem;
            letter-spacing: 3px;
            color: var(--stark-gold);
            height: 14px;
            transition: opacity 0.3s, transform 0.3s;
            text-transform: uppercase;
        }
        .date-label.hidden { opacity: 0; transform: translateY(-4px); }
        .date-underline {
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--stark-cyan), transparent);
            opacity: 0.5;
        }

        .main-container {
            flex: 1;
            max-width: 750px;
            margin: 0 auto;
            padding: 0.5rem;
            padding-top: calc(var(--nav-h, 50px) + 0.6rem);
            width: 100%;
            padding-bottom: calc(var(--footer-h, 180px) + 16px);
        }
        @media (min-width: 768px) {
            .main-container {
                max-width: 860px;
                padding: 0.8rem 1.2rem;
                padding-top: calc(var(--nav-h, 50px) + 0.8rem);
                padding-bottom: calc(var(--footer-h, 180px) + 24px);
            }
        }
        .gpal-card {
            background: var(--stark-panel);
            border: 1px solid var(--stark-border);
            padding: 0.8rem;
            margin-bottom: 0.6rem;
            position: relative;
            clip-path: polygon(0 0, 97% 0, 100% 3%, 100% 100%, 3% 100%, 0 97%);
            animation: fade-in 0.4s var(--easing-smooth) both;
            transition: border-color 0.3s, transform 0.3s var(--easing-smooth), box-shadow 0.3s;
        }
        .gpal-card:hover {
            border-color: rgba(0,242,255,0.5);
            transform: translateY(-1px);
            box-shadow: 0 4px 18px rgba(0,242,255,0.08);
        }
        .gpal-card:nth-child(1) { animation-delay: 0.05s; }
        .gpal-card:nth-child(2) { animation-delay: 0.1s; }
        .gpal-card:nth-child(3) { animation-delay: 0.15s; }
        .gpal-card:nth-child(4) { animation-delay: 0.2s; }

        /* 卡片角邊裝飾 */
        .gpal-card::before,
        .gpal-card::after,
        .intel-card::before,
        .intel-card::after {
            content: '';
            position: absolute;
            width: 12px;
            height: 12px;
            border: 1px solid var(--stark-cyan);
            opacity: 0.6;
            transition: opacity 0.3s, width 0.3s, height 0.3s;
            pointer-events: none;
        }
        .gpal-card::before {
            top: -1px; left: -1px;
            border-right: none;
            border-bottom: none;
        }
        .gpal-card::after {
            bottom: -1px; right: -1px;
            border-left: none;
            border-top: none;
        }
        .gpal-card:hover::before,
        .gpal-card:hover::after {
            width: 16px;
            height: 16px;
            opacity: 1;
        }
        .intel-card::before {
            top: -1px; left: -1px;
            border-right: none;
            border-bottom: none;
            border-color: var(--stark-gold);
        }
        .intel-card::after {
            bottom: -1px; right: -1px;
            border-left: none;
            border-top: none;
            border-color: var(--stark-gold);
        }

        .card-header {
            border-left: 3px solid var(--stark-cyan);
            padding-left: 8px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            flex-wrap: nowrap;
            gap: 8px;
            position: relative;
        }
        .card-header::before {
            content: '';
            position: absolute;
            left: -3px;
            top: 0;
            bottom: 0;
            width: 3px;
            background: var(--stark-cyan);
            box-shadow: 0 0 10px var(--stark-glow);
            animation: header-pulse 3s ease-in-out infinite;
        }
        @keyframes header-pulse {
            0%, 100% { opacity: 0.7; box-shadow: 0 0 6px var(--stark-glow-soft); }
            50%      { opacity: 1;   box-shadow: 0 0 14px var(--stark-glow); }
        }
        .card-header h2 {
            font-size: 0.7rem;
            letter-spacing: 2px;
            font-family: 'Orbitron';
            margin: 0;
            text-shadow: 0 0 12px rgba(0,242,255,0.3);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
            min-width: 0;
        }
        .btn-copy-plan {
            margin-left: auto;
            background: transparent;
            border: 1px solid rgba(0,242,255,0.25);
            color: rgba(0,242,255,0.5);
            font-family: 'Orbitron', sans-serif;
            font-size: 0.42rem;
            font-weight: 700;
            letter-spacing: 1px;
            padding: 2px 8px;
            cursor: pointer;
            transition: all 0.2s;
            outline: none;
            white-space: nowrap;
        }
        .btn-copy-plan:hover { border-color: var(--stark-cyan); color: var(--stark-cyan); }
        .btn-copy-plan.copied { border-color: var(--stark-green); color: var(--stark-green); }
        .copy-item-btn {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.38rem;
            font-weight: 700;
            color: rgba(0,242,255,0.35);
            cursor: pointer;
            padding: 1px 5px;
            border: 1px solid rgba(0,242,255,0.15);
            background: transparent;
            transition: all 0.2s;
            white-space: nowrap;
            user-select: none;
        }
        .copy-item-btn:hover { color: var(--stark-cyan); border-color: var(--stark-cyan); }
        .copy-item-btn.copied { color: var(--stark-green); border-color: var(--stark-green); }
        .progress-stats {
            font-family: 'Orbitron';
            font-size: 0.7rem;
            color: var(--stark-gold);
            font-weight: 900;
            transition: 0.3s;
            white-space: nowrap;
            flex-shrink: 0;
        }

        textarea.auto-height {
            width: 100%;
            min-height: 25px;
            border: none;
            background: transparent;
            font-family: 'Rajdhani';
            font-size: 1.1rem;
            color: #fff;
            resize: none;
            outline: none;
            line-height: 1.3;
            overflow: hidden;
            word-break: break-word;
        }
        @media (min-width: 768px) {
            textarea.auto-height { font-size: 1.25rem; line-height: 1.5; min-height: 35px; }
        }

        /* === MISSION GOAL === */
        .goal-list { display: flex; flex-direction: column; gap: 8px; }

        /* === MISSION CLOCK === */
        .mission-clock-bar {
            background: rgba(255,204,0,0.05); border: 1px solid rgba(255,204,0,0.3);
            border-left: 3px solid var(--stark-gold); padding: 8px 10px; margin-bottom: 8px;
            display: flex; align-items: center; gap: 8px; border-radius: 2px;
        }
        .mc-info { flex: 1; min-width: 0; }
        .mc-label { font-family: 'Orbitron', sans-serif; font-size: 0.38rem; color: var(--stark-gold); letter-spacing: 2px; opacity: 0.7; }
        .mc-task-name { font-size: 0.85rem; font-family: 'Rajdhani', sans-serif; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .mc-progress-wrap { width: 80px; height: 3px; background: rgba(255,204,0,0.15); border-radius: 2px; overflow: hidden; flex-shrink: 0; }
        .mc-progress-bar { height: 100%; background: var(--stark-gold); box-shadow: 0 0 6px rgba(255,204,0,0.5); transition: width 1s linear; }
        .mc-time { font-family: 'Orbitron', sans-serif; font-size: 0.85rem; font-weight: 900; color: var(--stark-gold); letter-spacing: 2px; flex-shrink: 0; min-width: 48px; text-align: right; font-variant-numeric: tabular-nums; }
        .mc-time.urgent { color: var(--stark-red); animation: lt-pulse 1s ease-in-out infinite; }
        .mc-btn { font-family: 'Orbitron', sans-serif; font-size: 0.38rem; font-weight: 700; background: transparent; border: 1px solid rgba(255,204,0,0.3); color: rgba(255,204,0,0.6); padding: 2px 6px; cursor: pointer; transition: all 0.2s; flex-shrink: 0; outline: none; }
        .mc-btn:hover { border-color: var(--stark-gold); color: var(--stark-gold); }
        .clock-start-btn {
            font-family: 'Orbitron', sans-serif; font-size: 0.38rem; font-weight: 900;
            color: rgba(255,204,0,0.45); border: 1px solid rgba(255,204,0,0.25);
            background: rgba(255,204,0,0.03); padding: 2px 7px;
            cursor: pointer; user-select: none; letter-spacing: 1px;
            clip-path: polygon(8% 0, 100% 0, 92% 100%, 0 100%);
            position: relative; overflow: hidden;
            transition: all 0.2s var(--easing-cyber);
        }
        .clock-start-btn::before {
            content: ''; position: absolute; top: 0; left: -100%;
            width: 60%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,204,0,0.3), transparent);
            transition: left 0.4s;
        }
        .clock-start-btn:hover::before { left: 200%; }
        .clock-start-btn:hover { color: var(--stark-gold); border-color: var(--stark-gold); background: rgba(255,204,0,0.08); box-shadow: 0 0 8px rgba(255,204,0,0.25); }
        .clock-start-btn:active { transform: scale(0.95); }
        .clock-start-btn.empty { opacity: 0.12; cursor: default; pointer-events: none; }
        .plan-row.clocking { border-left-color: var(--stark-gold) !important; animation: clock-pulse 2s ease-in-out infinite; }
        @keyframes clock-pulse { 0%,100%{box-shadow:none} 50%{box-shadow:0 0 0 3px rgba(255,204,0,0.12)} }

        /* === STREAK === */
        .streak-display { font-family: 'Orbitron', sans-serif; font-size: 0.42rem; font-weight: 700; letter-spacing: 1px; margin-left: 6px; flex-shrink: 0; transition: all 0.3s; }
        .streak-display.hot { color: var(--stark-gold); }
        .streak-display.cold { color: rgba(255,255,255,0.25); }

        /* === SPOTIFY BAR === */
        #spotify-bar {
            background: rgba(0,0,0,0.5);
            border-top: 1px solid rgba(29,185,84,0.2);
            border-bottom: 1px solid rgba(29,185,84,0.15);
            padding: 10px 14px;
            min-height: 64px;
            display: flex; align-items: center;
            position: relative;
        }
        .sp-list-btn {
            font-family: 'Orbitron', sans-serif; font-size: 13px; font-weight: 700;
            color: rgba(29,185,84,0.55); border: 1px solid rgba(29,185,84,0.25);
            background: transparent; padding: 6px 10px; cursor: pointer;
            transition: all 0.2s; outline: none; user-select: none;
            -webkit-tap-highlight-color: transparent; flex-shrink: 0;
        }
        .sp-list-btn:hover, .sp-list-btn.active { color: #1DB954; border-color: rgba(29,185,84,0.7); box-shadow: 0 0 8px rgba(29,185,84,0.25); }
        .sp-playlist-panel {
            position: absolute; bottom: 100%; left: 0; right: 0;
            background: rgba(3,12,20,0.98);
            border: 1px solid rgba(29,185,84,0.3);
            border-bottom: 2px solid rgba(29,185,84,0.5);
            max-height: 300px; overflow-y: auto;
            z-index: 200;
        }
        .sp-playlist-panel::-webkit-scrollbar { width: 3px; }
        .sp-playlist-panel::-webkit-scrollbar-thumb { background: rgba(29,185,84,0.3); }
        .sp-pl-header {
            font-family: 'Orbitron', sans-serif; font-size: 10px; font-weight: 700;
            color: rgba(29,185,84,0.6); padding: 8px 14px;
            border-bottom: 1px solid rgba(29,185,84,0.15); letter-spacing: 2px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .sp-pl-item {
            padding: 9px 14px; cursor: pointer;
            display: flex; align-items: center; gap: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            transition: background 0.12s;
        }
        .sp-pl-item:hover { background: rgba(29,185,84,0.08); }
        .sp-pl-name { font-family: 'Rajdhani', sans-serif; font-size: 14px; color: rgba(255,255,255,0.8); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .sp-pl-item:hover .sp-pl-name { color: #fff; }
        .sp-pl-active .sp-pl-name { color: #1DB954; }
        .sp-pl-count { font-family: 'Orbitron', sans-serif; font-size: 9px; color: rgba(255,255,255,0.2); flex-shrink: 0; }
        .sp-pl-img { width: 28px; height: 28px; object-fit: cover; border: 1px solid rgba(29,185,84,0.15); flex-shrink: 0; }
        /* playlist modal */
        .sp-modal-backdrop {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.72);
            z-index: 800;
            display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(3px);
            animation: sp-fade-in 0.15s ease;
        }
        @keyframes sp-fade-in { from { opacity: 0; } to { opacity: 1; } }
        .sp-modal {
            background: rgba(4,14,22,0.98);
            border: 1px solid rgba(29,185,84,0.35);
            border-top: 2px solid #1DB954;
            width: min(440px, 92vw);
            max-height: 72vh;
            display: flex; flex-direction: column;
            box-shadow: 0 0 60px rgba(29,185,84,0.12), 0 0 20px rgba(0,0,0,0.8);

        }
        @keyframes sp-slide-up { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .sp-modal-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 14px 0;
        }
        .sp-modal-title {
            font-family: 'Orbitron', sans-serif; font-size: 11px; font-weight: 700;
            color: rgba(29,185,84,0.7); letter-spacing: 2px;
        }
        .sp-modal-close {
            font-family: 'Orbitron', sans-serif; font-size: 11px; font-weight: 700;
            color: rgba(255,255,255,0.2); background: transparent;
            border: 1px solid rgba(255,255,255,0.1); cursor: pointer;
            padding: 3px 8px; transition: all 0.2s; outline: none;
        }
        .sp-modal-close:hover { color: rgba(255,80,80,0.8); border-color: rgba(255,80,80,0.4); }
        /* tabs */
        .sp-panel-tabs { display: flex; border-bottom: 1px solid rgba(29,185,84,0.15); margin-top: 8px; }
        .sp-tab-btn { font-family: 'Orbitron', sans-serif; font-size: 10px; font-weight: 700; color: rgba(29,185,84,0.35); background: transparent; border: none; border-bottom: 2px solid transparent; padding: 8px 16px; cursor: pointer; letter-spacing: 1px; transition: all 0.2s; outline: none; max-width: 200px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .sp-tab-btn.active { color: #1DB954; border-bottom-color: #1DB954; }
        .sp-tab-btn:hover:not(.active) { color: rgba(29,185,84,0.65); }
        .sp-panel-content { flex: 1; overflow-y: auto; }
        .sp-panel-content::-webkit-scrollbar { width: 3px; }
        .sp-panel-content::-webkit-scrollbar-thumb { background: rgba(29,185,84,0.3); }
        /* track items */
        .sp-track-num { font-family: 'Orbitron'; font-size: 9px; color: rgba(255,255,255,0.2); flex-shrink: 0; width: 22px; text-align: right; }
        .sp-track-info { flex: 1; min-width: 0; }
        .sp-track-artist { font-family: 'Orbitron'; font-size: 9px; color: rgba(29,185,84,0.4); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }
        .sp-pl-item:hover .sp-track-artist { color: rgba(29,185,84,0.7); }
        .sp-connect-row { display: flex; align-items: center; gap: 10px; width: 100%; }
        .sp-label { font-family: 'Orbitron', sans-serif; font-size: 12px; font-weight: 700; color: rgba(29,185,84,0.7); letter-spacing: 2px; white-space: nowrap; flex-shrink: 0; }
        .sp-input { flex: 1; min-width: 0; background: transparent; border: none; border-bottom: 1px solid rgba(29,185,84,0.35); color: rgba(29,185,84,0.9); font-family: 'Orbitron', sans-serif; font-size: 11px; padding: 6px 4px; outline: none; transition: border-color 0.2s; }
        .sp-input:focus { border-bottom-color: #1DB954; }
        .sp-input::placeholder { color: rgba(29,185,84,0.25); }
        .sp-btn { font-family: 'Orbitron', sans-serif; font-size: 12px; font-weight: 700; color: rgba(29,185,84,0.7); border: 1px solid rgba(29,185,84,0.4); background: transparent; padding: 8px 20px; cursor: pointer; outline: none; transition: all 0.2s; white-space: nowrap; flex-shrink: 0; clip-path: polygon(8% 0, 100% 0, 92% 100%, 0 100%); position: relative; overflow: hidden; }
        .sp-btn::before { content: ''; position: absolute; top: 0; left: -100%; width: 60%; height: 100%; background: linear-gradient(90deg,transparent,rgba(29,185,84,0.25),transparent); transition: left 0.4s; }
        .sp-btn:hover::before { left: 200%; }
        .sp-btn:hover { color: #1DB954; border-color: #1DB954; box-shadow: 0 0 10px rgba(29,185,84,0.3); }

        /* player layout */
        .sp-player { display: flex; align-items: center; gap: 10px; width: 100%; min-width: 0; }
        .sp-art { width: 44px; height: 44px; border-radius: 2px; object-fit: cover; border: 1px solid rgba(29,185,84,0.25); flex-shrink: 0; }
        .sp-art[src=""] { display: none; }

        /* track info */
        .sp-info { flex: 1; min-width: 0; }
        .sp-track { font-family: 'Rajdhani', sans-serif; font-size: 16px; font-weight: 600; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .sp-artist { font-family: 'Orbitron', sans-serif; font-size: 9px; color: rgba(29,185,84,0.55); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; letter-spacing: 1px; }

        /* controls */
        .sp-mid { display: flex; flex-direction: column; align-items: center; gap: 5px; flex-shrink: 0; }
        .sp-controls { display: flex; align-items: center; gap: 5px; }
        .sp-ctrl-btn {
            font-family: 'Orbitron', sans-serif;
            font-size: 9px; font-weight: 700;
            color: rgba(29,185,84,0.55);
            border: 1px solid rgba(29,185,84,0.25);
            background: transparent;
            padding: 4px 8px;
            cursor: pointer; transition: all 0.2s; outline: none; letter-spacing: 1px;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }
        .sp-ctrl-btn:hover, .sp-ctrl-btn:active { color: #1DB954; border-color: rgba(29,185,84,0.7); box-shadow: 0 0 6px rgba(29,185,84,0.25); }
        .sp-play-btn {
            font-size: 11px; padding: 5px 14px;
            color: rgba(29,185,84,0.9);
            border: 1px solid rgba(29,185,84,0.5);
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
            position: relative; overflow: hidden;
        }
        .sp-play-btn::before { content: ''; position: absolute; top: 0; left: -100%; width: 60%; height: 100%; background: linear-gradient(90deg,transparent,rgba(29,185,84,0.3),transparent); transition: left 0.4s; }
        .sp-play-btn:hover::before { left: 200%; }
        .sp-play-btn:hover { box-shadow: 0 0 12px rgba(29,185,84,0.4) !important; }
        /* lyrics bar */
        #sp-lyrics-bar {
            background: rgba(0,0,0,0.35);
            border-bottom: 1px solid rgba(29,185,84,0.08);
            padding: 5px 14px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 18px; font-style: italic;
            color: rgba(255,255,255,0.5);
            text-align: center; min-height: 26px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            transition: opacity 0.25s ease;
            display: none;
        }

        /* progress + disconnect */
        .sp-progress-wrap { width: 90px; height: 2px; background: rgba(29,185,84,0.12); }
        .sp-progress-bar { height: 100%; background: #1DB954; transition: width 1s linear; width: 0%; }
        .sp-disconnect-btn { font-family: 'Orbitron', sans-serif; font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.18); background: transparent; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; padding: 5px 8px; transition: all 0.2s; flex-shrink: 0; outline: none; }
        .streak-milestone { animation: streak-burst 0.5s ease-out; }
        @keyframes streak-burst { 0%{transform:scale(1.6)} 100%{transform:scale(1)} }

        /* === GOAL TEMPLATE === */
        .btn-tmpl { font-family: 'Orbitron', sans-serif; font-size: 0.38rem; font-weight: 700; color: rgba(0,242,255,0.45); border: 1px solid rgba(0,242,255,0.2); background: transparent; padding: 1px 6px; cursor: pointer; transition: all 0.2s; margin-left: 4px; outline: none; }
        .btn-tmpl:hover { color: var(--stark-cyan); border-color: var(--stark-cyan); }
        .btn-tmpl.active { color: var(--stark-cyan); border-color: var(--stark-cyan); background: rgba(0,242,255,0.08); }
        .goal-tmpl-panel { border: 1px solid rgba(0,242,255,0.15); border-left: 3px solid var(--stark-cyan); background: rgba(0,242,255,0.03); padding: 8px 10px; margin-bottom: 6px; }
        .tmpl-empty { font-family: 'Orbitron'; font-size: 0.4rem; color: rgba(0,242,255,0.3); letter-spacing: 1px; }
        .tmpl-item { display: flex; align-items: center; gap: 6px; padding: 4px; border: 1px solid transparent; transition: all 0.15s; }
        .tmpl-item:hover { background: rgba(0,242,255,0.05); border-color: rgba(0,242,255,0.15); }
        .tmpl-item-name { flex: 1; font-family: 'Rajdhani'; font-size: 0.9rem; color: var(--stark-text); }
        .tmpl-item-apply { font-family: 'Orbitron'; font-size: 0.35rem; color: rgba(0,242,255,0.5); cursor: pointer; padding: 1px 5px; border: 1px solid rgba(0,242,255,0.2); transition: all 0.15s; }
        .tmpl-item-apply:hover { color: var(--stark-cyan); border-color: var(--stark-cyan); }
        .tmpl-item-del { font-family: 'Orbitron'; font-size: 0.35rem; color: rgba(255,77,77,0.45); cursor: pointer; padding: 1px 4px; transition: color 0.15s; }
        .tmpl-item-del:hover { color: var(--stark-red); }
        .tmpl-save-row { display: flex; gap: 6px; margin-top: 8px; border-top: 1px solid rgba(0,242,255,0.1); padding-top: 8px; align-items: center; }
        .tmpl-name-input { flex: 1; background: transparent; border: none; border-bottom: 1px solid rgba(0,242,255,0.2); color: #fff; font-family: 'Rajdhani'; font-size: 0.85rem; padding: 2px 0; outline: none; }
        .tmpl-name-input:focus { border-bottom-color: var(--stark-cyan); }
        .tmpl-name-input::placeholder { color: rgba(255,255,255,0.25); }
        .tmpl-save-btn { font-family: 'Orbitron'; font-size: 0.38rem; font-weight: 700; color: rgba(0,242,255,0.5); border: 1px solid rgba(0,242,255,0.2); background: transparent; padding: 2px 8px; cursor: pointer; white-space: nowrap; transition: all 0.2s; outline: none; }
        .tmpl-save-btn:hover { color: var(--stark-cyan); border-color: var(--stark-cyan); }

        /* === LONGTERM GOAL === */
        .lt-card { border-left-color: var(--stark-gold) !important; }
        .lt-card .card-header::before { background: var(--stark-gold); box-shadow: 0 0 10px rgba(255,204,0,0.5); }
        .lt-card .card-header h2 { color: var(--stark-gold); text-shadow: 0 0 12px rgba(255,204,0,0.3); }
        .lt-goal-list { display: flex; flex-direction: column; gap: 6px; }
        .lt-goal-row {
            display: flex; align-items: center; gap: 8px;
            padding: 4px 4px; border-left: 2px solid transparent;
            transition: border-color 0.2s;
            animation: slide-in 0.3s var(--easing-smooth) both;
        }
        .lt-goal-row:hover { border-left-color: rgba(255,204,0,0.4); }
        .lt-text-container {
            flex: 1; position: relative; display: flex; align-items: center;
            transition: all 0.4s var(--easing-smooth); min-width: 0; border-radius: 3px;
        }
        .lt-text-container.completed {
            padding-left: 54px;
            background: linear-gradient(90deg, rgba(255,204,0,0.15) 0%, transparent 80%);
        }
        .lt-text-container::before {
            content: '100%'; position: absolute; left: 2px; top: 50%;
            transform: translateY(-50%) scale(0.3);
            font-family: 'Orbitron'; font-weight: 900; font-size: 0.55rem;
            color: var(--stark-dark); background: var(--stark-gold);
            padding: 1px 6px; opacity: 0;
            transition: 0.4s var(--easing-cyber); pointer-events: none; z-index: 2;
            box-shadow: 0 0 10px rgba(255,204,0,0.6); white-space: nowrap;
        }
        .lt-text-container.completed::before { opacity: 1; transform: translateY(-50%) scale(1); }
        .lt-goal-input {
            width: 100%; background: transparent; border: none;
            color: #fff; font-size: 1.2rem; font-family: 'Rajdhani'; outline: none;
            padding: 2px 0; text-overflow: ellipsis; transition: 0.3s;
        }
        .lt-goal-input.completed { color: #fff; text-shadow: 0 0 8px rgba(255,204,0,0.8); opacity: 0.9; }
        .lt-goal-input::placeholder { color: rgba(255,255,255,0.25); }
        .lt-deadline-wrap { display: flex; align-items: center; gap: 4px; flex-shrink: 0; position: relative; }
        .lt-deadline-input {
            position: absolute; left: 0; top: 0;
            width: 100%; height: 100%;
            opacity: 0; cursor: pointer; z-index: 2;
            color-scheme: dark;
        }
        .lt-date-icon {
            cursor: pointer; font-family: 'Orbitron', sans-serif;
            font-size: 0.42rem; font-weight: 700; letter-spacing: 0.5px;
            color: rgba(255,204,0,0.55); border: 1px solid rgba(255,204,0,0.25);
            padding: 1px 5px; transition: all 0.2s; flex-shrink: 0; user-select: none;
        }
        .lt-date-icon:hover { color: var(--stark-gold); border-color: var(--stark-gold); box-shadow: 0 0 6px rgba(255,204,0,0.3); }
        .lt-days {
            font-family: 'Orbitron', sans-serif; font-size: 0.45rem; font-weight: 700;
            letter-spacing: 1px; color: rgba(255,204,0,0.6); white-space: nowrap;
        }
        .lt-days.lt-overdue { color: var(--stark-red); animation: lt-pulse 1.5s ease-in-out infinite; }
        .lt-days.lt-today { color: var(--stark-gold); }
        .lt-days.lt-complete { color: var(--stark-green); }
        @keyframes lt-pulse { 0%,100%{opacity:0.7} 50%{opacity:1} }
        .btn-lt-add {
            margin-left: auto; background: transparent; border: 1px solid rgba(255,204,0,0.25);
            color: rgba(255,204,0,0.5); font-family: 'Orbitron', sans-serif; font-size: 0.42rem;
            font-weight: 700; letter-spacing: 1px; padding: 2px 8px; cursor: pointer; transition: all 0.2s; outline: none;
        }
        .btn-lt-add:hover { border-color: var(--stark-gold); color: var(--stark-gold); }

        /* === HABIT TRACKER === */
        .habit-card { border-left-color: var(--stark-green) !important; }
        .habit-card .card-header::before { background: var(--stark-green); box-shadow: 0 0 10px rgba(0,255,136,0.5); }
        .habit-card .card-header h2 { color: var(--stark-green); text-shadow: 0 0 12px rgba(0,255,136,0.3); }
        .habit-list { display: flex; flex-direction: column; gap: 8px; }
        .habit-row { display: flex; align-items: center; gap: 8px; padding: 3px 0; border-left: 2px solid transparent; transition: border-color 0.2s; animation: slide-in 0.3s var(--easing-smooth) both; }
        .habit-row:hover { border-left-color: rgba(0,255,136,0.35); }
        .habit-name-input { flex: 1; background: transparent; border: none; outline: none; color: #fff; font-size: 1.05rem; font-family: 'Rajdhani'; border-bottom: 1px solid rgba(0,255,136,0.15); padding: 2px 0; transition: border-color 0.2s; text-overflow: ellipsis; }
        .habit-name-input:focus { border-bottom-color: var(--stark-green); }
        .habit-name-input::placeholder { color: rgba(255,255,255,0.25); }
        .habit-dots { display: flex; gap: 4px; flex-shrink: 0; }
        .habit-dot { width: 12px; height: 12px; border-radius: 50%; border: 1px solid rgba(0,255,136,0.25); cursor: pointer; transition: all 0.2s; flex-shrink: 0; }
        .habit-dot.done { background: var(--stark-green); border-color: var(--stark-green); box-shadow: 0 0 5px rgba(0,255,136,0.45); }
        .habit-dot.is-today { border-color: rgba(0,255,136,0.7); border-width: 2px; }
        .habit-dot.done.is-today { box-shadow: 0 0 8px rgba(0,255,136,0.7); }
        .habit-dot:hover:not(.done) { background: rgba(0,255,136,0.15); border-color: var(--stark-green); }
        .habit-streak { font-family: 'Orbitron', sans-serif; font-size: 0.38rem; font-weight: 700; color: rgba(0,255,136,0.6); white-space: nowrap; min-width: 28px; }
        .btn-habit-add { margin-left: auto; background: transparent; border: 1px solid rgba(0,255,136,0.25); color: rgba(0,255,136,0.5); font-family: 'Orbitron', sans-serif; font-size: 0.42rem; font-weight: 700; letter-spacing: 1px; padding: 2px 8px; cursor: pointer; transition: all 0.2s; outline: none; }
        .btn-habit-add:hover { border-color: var(--stark-green); color: var(--stark-green); }
        .goal-row {
            display: flex;
            align-items: center;
            gap: 8px;
            transition: transform 0.4s var(--easing-smooth);
            animation: slide-in 0.3s var(--easing-smooth) both;
        }

        .prio-tag {
            width: 28px; height: 18px;
            font-family: 'Orbitron';
            font-size: 0.6rem;
            font-weight: 900;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            border: 1px solid transparent;
            cursor: pointer;
            clip-path: polygon(0 0, 100% 0, 80% 100%, 0 100%);
            transition: 0.25s var(--easing-cyber);
        }
        .prio-tag:active { transform: scale(0.9); }
        .prio-none { color: #555; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); }
        .prio-p1 { color: #fff; background: var(--stark-red); box-shadow: 0 0 8px var(--stark-red); }
        .prio-p2 { color: var(--stark-dark); background: var(--stark-gold); box-shadow: 0 0 8px var(--stark-gold); }
        .prio-p3 { color: var(--stark-dark); background: var(--stark-cyan); box-shadow: 0 0 8px var(--stark-cyan); }

        .stark-checkbox {
            appearance: none;
            width: 20px; height: 20px;
            border: 1.5px solid var(--stark-cyan);
            background: transparent;
            cursor: pointer;
            flex-shrink: 0;
            position: relative;
            transition: 0.3s var(--easing-cyber);
        }
        .stark-checkbox:hover {
            box-shadow: 0 0 8px var(--stark-glow);
            transform: scale(1.05);
        }
        .stark-checkbox:checked {
            background: var(--stark-cyan);
            box-shadow: 0 0 12px var(--stark-glow);
            border-color: transparent;
            animation: check-burst 0.4s var(--easing-cyber);
        }
        @keyframes check-burst {
            0%   { transform: scale(1); }
            50%  { transform: scale(1.25); box-shadow: 0 0 24px var(--stark-cyan), 0 0 40px var(--stark-cyan); }
            100% { transform: scale(1); box-shadow: 0 0 12px var(--stark-glow); }
        }
        .stark-checkbox:checked::after {
            content: '✓';
            color: var(--stark-dark);
            position: absolute;
            font-size: 14px;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-weight: 900;
            animation: check-pop 0.3s var(--easing-cyber);
        }
        @keyframes check-pop {
            0%   { transform: translate(-50%, -50%) scale(0) rotate(-45deg); opacity: 0; }
            60%  { transform: translate(-50%, -50%) scale(1.3) rotate(10deg); }
            100% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 1; }
        }

        .goal-text-container {
            flex-grow: 1;
            position: relative;
            display: flex;
            align-items: center;
            transition: all 0.4s var(--easing-smooth);
            min-width: 0;
            border-radius: 3px;
        }
        .goal-text-container.completed {
            padding-left: 54px;
            background: linear-gradient(90deg, rgba(0, 242, 255, 0.15) 0%, transparent 80%);
        }
        .goal-text-container::before {
            content: '100%';
            position: absolute;
            left: 2px; top: 50%;
            transform: translateY(-50%) scale(0.3);
            font-family: 'Orbitron';
            font-weight: 900;
            font-size: 0.55rem;
            color: var(--stark-dark);
            background: var(--stark-cyan);
            padding: 1px 6px;
            opacity: 0;
            transition: 0.4s var(--easing-cyber);
            pointer-events: none;
            z-index: 2;
            box-shadow: 0 0 10px var(--stark-glow);
            white-space: nowrap;
        }
        .goal-text-container.completed::before { opacity: 1; transform: translateY(-50%) scale(1); }

        .goal-input {
            width: 100%;
            background: transparent;
            border: none;
            color: #fff;
            font-family: 'Rajdhani';
            font-size: 1.05rem;
            outline: none;
            padding: 2px 0;
            text-overflow: ellipsis;
            transition: 0.3s;
        }
        .goal-input.completed { color: #fff; text-shadow: 0 0 8px var(--stark-glow); opacity: 0.9; }
        .goal-input::placeholder { color: rgba(255,255,255,0.25); }

        /* === MEMBER SWITCHER === */

        /* === STRATEGIC PLAN === */
        .plan-list { display: flex; flex-direction: column; gap: 3px; }
        .plan-row {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 2px 4px;
            border-left: 2px solid transparent;
            transition: 0.3s var(--easing-smooth);
            animation: slide-in 0.3s var(--easing-smooth) both;
        }
        .plan-row.active-now {
            background: rgba(255, 204, 0, 0.08);
            border-left: 3px solid var(--stark-gold);
            box-shadow: 0 0 15px rgba(255, 204, 0, 0.4);
            position: relative;
            overflow: hidden;
        }
        .plan-row.active-now::before {

        .time-select-row {
            display: flex;
            align-items: center;
            gap: 2px;
            flex-shrink: 0;
        }
        .time-sel {

            color: var(--stark-cyan);

            font-size: 0.55rem;
            outline: none;
            padding: 1px;
            cursor: pointer;

        .time-dash { font-size: 0.6rem; opacity: 0.5; color: var(--stark-cyan); }

        .plan-input {
            flex-grow: 1;
            background: transparent;
            border: none;
            border-bottom: 1px solid rgba(255,255,255,0.05);

            font-size: 1.05rem;
            outline: none;
            padding: 1px 0;
            min-width: 0;
            text-overflow: ellipsis;
            transition: border-color 0.2s;
        }
        .plan-input:focus { border-bottom-color: var(--stark-cyan); }

        .plan-actions {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }
        .loc-add-btn {
            font-family: 'Orbitron';
            font-size: 0.5rem;
            color: var(--stark-gold);
            cursor: pointer;
            opacity: 0.5;
            border: 1px dashed var(--stark-gold);
            padding: 1px 4px;
            transition: 0.2s;
        }
        .loc-add-btn:hover { opacity: 1; }
        .loc-edit {
            display: none;
            background: rgba(0, 242, 255, 0.1);
            border: 1px solid var(--stark-cyan);
            color: white;
            font-family: 'Rajdhani';
            font-size: 0.8rem;
            padding: 1px 5px;
            outline: none;
            width: 80px;
        }

        .loc-tag-group {
            display: none;
            align-items: stretch;
            gap: 3px;
        }
        .loc-badge,
        .loc-copy-btn {
            font-family: 'Orbitron';
            font-size: 0.55rem;
            font-weight: 900;
            padding: 3px 7px;
            cursor: pointer;
            white-space: nowrap;
            line-height: 1.4;
            display: flex;
            align-items: center;
        }
        .loc-badge {
            background: rgba(0, 242, 255, 0.15);
            color: var(--stark-cyan);
            border: 1px solid var(--stark-cyan);
            max-width: 90px;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .loc-copy-btn {
            background: rgba(255, 204, 0, 0.15);
            color: var(--stark-gold);
            border: 1px solid var(--stark-gold);
            transition: background 0.2s, color 0.2s;
        }
        .loc-copy-btn:hover { background: var(--stark-gold); color: var(--stark-dark); }
        .loc-copy-btn.copied { background: var(--stark-green); border-color: var(--stark-green); color: var(--stark-dark); }
        .del-btn {
            color: var(--stark-red); border: 1px solid var(--stark-red);
            font-family: 'Orbitron'; font-size: 0.38rem; font-weight: 700;
            padding: 1px 4px; cursor: pointer; opacity: 0.4; transition: 0.2s;
            flex-shrink: 0; position: relative; z-index: 5;
            background: transparent; outline: none;
            -webkit-tap-highlight-color: rgba(255,62,62,0.2);
        }
        .del-btn:hover { opacity: 1; background: var(--stark-red); color: white; }

        footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: rgba(8, 26, 41, 0.95);
            border-top: 2px solid var(--stark-cyan);
            backdrop-filter: blur(15px);
            z-index: 1000;
        }
        .member-input {
            font-family: 'Orbitron', sans-serif; font-size: 0.4rem; font-weight: 700;
            background: transparent; border: 1px solid rgba(0,242,255,0.3);
            color: var(--stark-cyan); padding: 3px 8px; width: 60px;
            letter-spacing: 1px; outline: none; text-align: center;
            text-transform: uppercase;
        }
        .member-input:focus { border-color: var(--stark-cyan); box-shadow: 0 0 6px rgba(0,242,255,0.3); }
        .member-input::placeholder { color: rgba(0,242,255,0.25); }
        .action-area {
            padding: 0.5rem;
            padding-bottom: 1rem;
            display: flex;
            justify-content: center;
            gap: 6px;
            align-items: center;
        }
        .jarvis-lang-sel {
            background: transparent; border: 1px solid rgba(0,242,255,0.25);
            color: rgba(0,242,255,0.55); font-family: 'Orbitron', sans-serif;
            font-size: 0.42rem; padding: 3px 6px; cursor: pointer;
            outline: none; color-scheme: dark; transition: all 0.2s;
        }
        .jarvis-lang-sel:hover { border-color: var(--stark-cyan); color: var(--stark-cyan); }
        .btn-sync {
            background: transparent;
            border: 1px solid var(--stark-cyan);
            color: var(--stark-cyan);
            padding: 0.35rem 1.5rem;
            font-family: 'Orbitron';
            font-weight: 900;
            cursor: pointer;
            letter-spacing: 2px;
            font-size: 0.65rem;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
            transition: 0.2s var(--easing-cyber);
            position: relative;
            overflow: hidden;
        }
        .btn-sync::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0,242,255,0.3), transparent);
            transition: left 0.5s;
        }
        .btn-sync:hover::before { left: 200%; }
        .btn-sync:hover { background: var(--stark-glow-soft); box-shadow: 0 0 15px var(--stark-glow); }
        .btn-sync:active { transform: scale(0.95); }
        .btn-sync:disabled { opacity: 0.4; cursor: wait; }
        .btn-refresh-icon {
            background: transparent; border: 1px solid rgba(0,242,255,0.3);
            color: rgba(0,242,255,0.6); font-size: 1rem;
            width: 2rem; height: 2rem;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; flex-shrink: 0;
            transition: all 0.3s var(--easing-cyber); outline: none;
        }
        .btn-refresh-icon:hover { color: var(--stark-cyan); border-color: var(--stark-cyan); transform: rotate(180deg); box-shadow: 0 0 10px var(--stark-glow); }
        .hud-row {
            padding: 0;
            text-align: center;
            background: transparent;
            font-family: 'Orbitron';
            font-size: 0.9rem;
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
        }
        .portfolio-hud {
            position: relative;
            padding: 10px 16px 8px;
            background: linear-gradient(135deg, rgba(0,0,0,0.6) 0%, rgba(10,31,50,0.8) 100%);
            border-bottom: 1px solid rgba(0,242,255,0.1);
            overflow: hidden;
        }
        .portfolio-hud::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 50% 150%, rgba(255,204,0,0.06) 0%, transparent 70%);
            pointer-events: none;
        }
        .portfolio-hud::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 60%; height: 1px;
            background: linear-gradient(90deg, transparent, var(--stark-gold), transparent);
            animation: sweep-line 4s ease-in-out infinite;
        }
        @keyframes sweep-line {
            0%   { left: -60%; opacity: 0; }
            20%  { opacity: 1; }
            80%  { opacity: 1; }
            100% { left: 160%; opacity: 0; }
        }
        #portfolio-display {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            letter-spacing: 0.5px;
            position: relative;
            z-index: 1;
        }
        .coin-icon {
            display: inline-flex;
            align-items: center;
            filter: drop-shadow(0 0 6px rgba(180,200,220,0.8));
        }
        .pf-divider {
            width: 1px;
            height: 18px;
            background: linear-gradient(180deg, transparent, rgba(255,204,0,0.4), transparent);
            margin: 0 4px;
        }
        .pf-label {
            font-size: 0.5rem;
            letter-spacing: 2px;
            opacity: 0.45;
        }
        .pf-value {
            font-size: 0.95rem;
            font-weight: 900;
            transition: text-shadow 0.4s;
        }
        .pf-value.flash {
            animation: val-flash 0.5s ease-out;
        }
        @keyframes val-flash {
            0%   { opacity: 0.3; transform: scale(0.95); }
            50%  { opacity: 1;   transform: scale(1.04); }
            100% { opacity: 1;   transform: scale(1); }
        }
        .ticker-val { display: inline; }
        #portfolio-display {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            letter-spacing: 0.5px;
        }
        .coin-icon {
            display: inline-flex;
            align-items: center;
            filter: drop-shadow(0 0 4px rgba(180,200,220,0.6));
        }
        .ticker-val { display: inline; }

        /* 載入骨架屏 */
        .skeleton {
            background: linear-gradient(90deg, rgba(0,242,255,0.05), rgba(0,242,255,0.15), rgba(0,242,255,0.05));
            background-size: 200% 100%;
            animation: skeleton-shimmer 1.5s infinite;
            border-radius: 2px;
        }
        @keyframes skeleton-shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        /* === HEALTH TRACKER === */
        .health-row {
            padding: 6px 8px 5px;
            background: rgba(0,0,0,0.5);
            border-bottom: 1px solid rgba(0,242,255,0.08);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0;
        }
        /* 桌面：兩個 row div 都是 flex，攤平成單行 */
        .health-row-top,
        .health-row-bottom {
            display: contents; /* 讓子元素直接參與父層 flex，透明包裝 */
        }
        .health-section {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 0 10px;
            position: relative;
            flex-shrink: 0;
        }
        .health-section + .health-section::before {
            content: '';
            position: absolute;
            left: 0; top: 15%; height: 70%;
            width: 1px;
            background: linear-gradient(180deg, transparent, rgba(0,242,255,0.25), transparent);
        }
        .health-label {
            font-family: 'Orbitron';
            font-size: 0.46rem;
            letter-spacing: 1.2px;
            color: rgba(0,242,255,0.5);
            text-transform: uppercase;
            white-space: nowrap;
            line-height: 1;
            margin-bottom: 2px;
        }
        .health-meta {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .health-count {
            font-family: 'Orbitron';
            font-size: 0.52rem;
            font-weight: 900;
            color: var(--stark-gold);
            letter-spacing: 0.5px;
            white-space: nowrap;
        }
        /* 水杯圖示 */
        .cups-row {
            display: flex;
            gap: 2px;
            align-items: center;
            flex-wrap: nowrap;
        }
        .cup-icon {
            cursor: pointer;
            transition: transform 0.15s var(--easing-cyber), filter 0.2s;
            display: flex;
            touch-action: manipulation;
        }
        .cup-icon:hover { transform: scale(1.2); }
        .cup-icon:active { transform: scale(0.9); }
        /* 睡眠/運動分段條 */
        .seg-row {
            display: flex;
            gap: 2px;
            align-items: center;
            flex-wrap: nowrap;
        }
        .seg {
            width: 13px; height: 20px;
            border: 1px solid rgba(0,242,255,0.25);
            cursor: pointer;
            transition: 0.2s var(--easing-cyber);
            position: relative;
            overflow: hidden;
            touch-action: manipulation;
            flex-shrink: 0;
        }
        .seg.filled { border-color: transparent; }
        .seg:hover { transform: scaleY(1.1); }
        .seg.sleep-seg:not(.filled):hover { background: rgba(123,111,255,0.15); }
        .seg.exer-seg:not(.filled):hover  { background: rgba(0,255,136,0.1); }

        /* === 手機 RWD === */
        @media (max-width: 600px) {
            .health-row {
                flex-direction: column;
                gap: 4px;
                padding: 5px 8px 4px;
                align-items: stretch;
            }
            .health-row-top,
            .health-row-bottom {
                display: flex;
                justify-content: center;
                align-items: center;
            }
            .health-section {
                padding: 0 8px;
                gap: 4px;
            }
            .health-section + .health-section::before {
                top: 10%; height: 80%;
            }
            /* 杯子縮小 */
            .cup-icon svg { width: 11px; height: 14px; }
            /* 格子縮小 */
            .seg { width: 11px; height: 17px; }
            .health-label { font-size: 0.42rem; letter-spacing: 0.8px; }
            .health-count { font-size: 0.48rem; }
        }
        @media (max-width: 380px) {
            .health-section { padding: 0 5px; gap: 3px; }
            .cup-icon svg { width: 10px; height: 13px; }
            .seg { width: 10px; height: 15px; }
        }
        @media (max-width: 480px) {
            .brand-bold { font-size: 0.75rem; letter-spacing: 1px; }
            .goal-input, .plan-input { font-size: 1rem; }
            .time-sel { font-size: 0.5rem; }
        }

        
        /* Edit Modal */
        .edit-modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }
        .edit-modal-overlay.open { display: flex; }
        .edit-modal {
            background: var(--stark-panel);
            border: 1px solid var(--stark-cyan);
            padding: 1rem;
            width: 90%;
            max-width: 420px;
            clip-path: polygon(0 0, 97% 0, 100% 2%, 100% 100%, 3% 100%, 0 98%);
            box-shadow: 0 0 30px rgba(0,242,255,0.2);
            animation: fade-in 0.2s var(--easing-smooth);
        }
        .edit-modal-title {
            font-family: 'Orbitron';
            font-size: 0.65rem;
            letter-spacing: 2px;
            color: var(--stark-cyan);
            margin-bottom: 12px;
            border-left: 3px solid var(--stark-cyan);
            padding-left: 8px;
        }
        .edit-modal-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            margin-bottom: 10px;
        }
        .edit-field { display: flex; flex-direction: column; gap: 3px; }
        .edit-field.full { grid-column: 1 / -1; }
        .edit-field-label {
            font-family: 'Orbitron';
            font-size: 0.42rem;
            letter-spacing: 1px;
            color: rgba(0,242,255,0.5);
        }
        .edit-input {
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(0,242,255,0.25);
            color: white;
            font-family: 'Rajdhani';
            font-size: 0.95rem;
            padding: 4px 8px;
            outline: none;
            width: 100%;
            box-sizing: border-box;
        }
        .edit-input:focus { border-color: var(--stark-cyan); }
        .edit-dir-toggle { display: flex; gap: 3px; }
        .edit-modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 6px;
        }
        .btn-modal {
            font-family: 'Orbitron';
            font-size: 0.55rem;
            letter-spacing: 1px;
            padding: 5px 14px;
            border: 1px solid;
            cursor: pointer;
            transition: 0.2s;
            background: transparent;
        }
        .btn-modal.cancel { border-color: rgba(255,255,255,0.2); color: rgba(255,255,255,0.5); }
        .btn-modal.cancel:hover { background: rgba(255,255,255,0.08); }
        .btn-modal.confirm { border-color: var(--stark-cyan); color: var(--stark-cyan); }
        .btn-modal.confirm:hover { background: var(--stark-cyan); color: var(--stark-dark); }
        .btn-modal:disabled { opacity: 0.35; cursor: wait; }
        .finance-account-row {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }
        .btn-account {
            background: transparent;
            border: 1px solid rgba(0,255,136,0.2);
            color: rgba(0,255,136,0.5);
            font-family: 'Orbitron';
            font-size: 0.46rem;
            letter-spacing: 1px;
            padding: 3px 8px;
            cursor: pointer;
            transition: 0.2s var(--easing-cyber);
            white-space: nowrap;
        }
        .btn-account:hover { border-color: rgba(0,255,136,0.5); color: var(--stark-green); }
        .btn-account.active {
            background: rgba(0,255,136,0.15);
            border-color: var(--stark-green);
            color: var(--stark-green);
            box-shadow: 0 0 8px rgba(0,255,136,0.2);
        }

        /* 月份切換 */
        .finance-month-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
        }
        .btn-month {
            background: transparent;
            border: 1px solid rgba(0,255,136,0.35);
            color: var(--stark-green);
            font-family: 'Orbitron';
            font-size: 0.7rem;
            font-weight: 900;
            padding: 4px 10px;
            cursor: pointer;
            transition: 0.2s var(--easing-cyber);
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
            touch-action: manipulation;
        }
        .btn-month:hover { background: rgba(0,255,136,0.12); box-shadow: 0 0 8px rgba(0,255,136,0.3); }
        .btn-month:active { transform: scale(0.92); }
        .finance-month-label {
            font-family: 'Orbitron';
            font-size: 0.65rem;
            font-weight: 900;
            color: var(--stark-green);
            letter-spacing: 2px;
            flex: 1;
            text-align: center;
        }
        .btn-refresh-finance {
            background: transparent;
            border: 1px solid rgba(0,255,136,0.3);
            color: rgba(0,255,136,0.6);
            font-family: 'Orbitron';
            font-size: 0.5rem;
            padding: 2px 6px;
            cursor: pointer;
            transition: 0.2s;
            letter-spacing: 1px;
        }
        .btn-refresh-finance:hover { color: var(--stark-green); border-color: var(--stark-green); }

        /* 三欄數字 */
        .finance-stats {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 10px;
        }
        .finance-stat {
            background: rgba(0,0,0,0.3);
            border: 1px solid transparent;
            padding: 12px 8px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .finance-stat.income  { border-color: rgba(0,255,136,0.25); }
        .finance-stat.expense { border-color: rgba(255,62,62,0.25); }
        .finance-stat.net.positive { border-color: rgba(0,242,255,0.25); }
        .finance-stat.net.negative { border-color: rgba(255,62,62,0.35); }
        .finance-stat-label {
            font-family: 'Orbitron';
            font-size: 0.65rem;
            letter-spacing: 1.5px;
            margin-bottom: 8px;
        }
        .finance-stat.income  .finance-stat-label { color: rgba(0,255,136,0.7); }
        .finance-stat.expense .finance-stat-label { color: rgba(255,62,62,0.7); }
        .finance-stat.net     .finance-stat-label { color: rgba(0,242,255,0.7); }
        .finance-stat-value {
            font-family: 'Orbitron';
            font-weight: 900;
            font-size: 1.25rem;
            font-variant-numeric: tabular-nums;
            letter-spacing: 2px;
            line-height: 1;
        }
        .finance-stat.income  .finance-stat-value { color: var(--stark-green); }
        .finance-stat.expense .finance-stat-value { color: var(--stark-red); }
        .finance-stat.net.positive .finance-stat-value { color: var(--stark-cyan); }
        .finance-stat.net.negative .finance-stat-value { color: var(--stark-red); }
        .finance-stat-value.updated {
            animation: val-flash 0.5s var(--easing-cyber);
        }

        /* 類別支出條 */
        .finance-cat-title {
            font-family: 'Orbitron';
            font-size: 0.48rem;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.35);
            margin-bottom: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            user-select: none;
            transition: color 0.2s;

        .finance-cat-title:hover { color: rgba(255,255,255,0.6); }

            display: inline-block;
            transition: transform 0.25s var(--easing-cyber);
            font-style: normal;
        }
        .finance-cat-title.open .finance-cat-arrow { transform: rotate(90deg); }
        .finance-cats {
            display: flex;
            flex-direction: column;
            gap: 4px;
            overflow: hidden;
            max-height: 0;
            transition: max-height 0.35s var(--easing-smooth), opacity 0.3s;
            opacity: 0;

            max-height: 300px;
            opacity: 1;

        .finance-cat-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .finance-cat-name {
            font-family: 'Rajdhani';
            font-size: 0.85rem;
            color: rgba(255,255,255,0.7);
            
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .finance-cat-bar-wrap {
            flex: 1;
            height: 5px;
            background: rgba(255,255,255,0.06);
            position: relative;
            overflow: hidden;
        }
        .finance-cat-bar {
            height: 100%;
            background: linear-gradient(90deg, rgba(255,62,62,0.6), rgba(255,100,62,0.8));
            transition: width 0.8s var(--easing-smooth);
            width: 0%;
        }
        .finance-cat-amt {
            font-family: 'Orbitron';
