<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="version" content="v4.17">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GPAL FAMILY v4.17</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://script.google.com" crossorigin>
    <link rel="preconnect" href="https://wbsassmpynuxqlpxcbcd.supabase.co" crossorigin>
    <link rel="dns-prefetch" href="https://wbsassmpynuxqlpxcbcd.supabase.co">
    <link rel="preconnect" href="https://script.googleusercontent.com" crossorigin>
    <link rel="dns-prefetch" href="https://script.google.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --stark-cyan: #00f2ff;
            --stark-glow: rgba(0, 242, 255, 0.8);
            --stark-glow-soft: rgba(0, 242, 255, 0.3);
            --stark-dark: #061623;
            --stark-darker: #03101a;
            --stark-panel: rgba(10, 31, 50, 0.85);
            --stark-border: rgba(0, 242, 255, 0.3);
            --stark-gold: #ffcc00;
            --stark-red: #ff3e3e;
            --stark-green: #00ff88;
            --easing-cyber: cubic-bezier(0.175, 0.885, 0.32, 1.275);
            --easing-smooth: cubic-bezier(0.25, 0.46, 0.45, 0.94);
            --day-grid: rgba(0, 242, 255, 0.025);
        }

        /* 桌面版放大基礎字體，所有 rem 單位自動等比放大 */
        @media (min-width: 768px) {
            html { font-size: 20px; }
        }
        @media (min-width: 1200px) {
            html { font-size: 22px; }
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        html { overflow-x: hidden; max-width: 100%; }
        
        body {
            font-family: 'Rajdhani', sans-serif;
            margin: 0;
            max-width: 100%;
            background: var(--stark-dark);
            color: var(--stark-cyan);
            background-image:
                radial-gradient(circle at 20% 20%, rgba(255,255,255,0.05), transparent 45%),
                radial-gradient(circle at 80% 75%, rgba(255,255,255,0.03), transparent 50%),
                linear-gradient(135deg, #0b0b0d 0%, #1a1a1d 25%, #0d0d0f 50%, #17171a 75%, #08080a 100%);
            background-size: 100% 100%, 100% 100%, 100% 3px;
            background-attachment: fixed;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* 全域 HUD 網格 */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(var(--day-grid) 1px, transparent 1px),
                linear-gradient(90deg, var(--day-grid) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
            animation: grid-drift 30s linear infinite;
        }
        @keyframes grid-drift {
            from { background-position: 0 0, 0 0; }
            to   { background-position: 40px 40px, 40px 40px; }
        }
        nav, .header-section, main, footer { position: relative; z-index: 1; }

        /* ── Day theme overlay ── */
        #day-overlay {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            background-color: transparent;
            transition: background-color 1s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        @keyframes day-shift {
            0%   { opacity: 0; transform: scale(1.04); }
            100% { opacity: 1; transform: scale(1); }
        }
        #day-overlay.shift {
            animation: day-shift 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94) both;
        }

        /* === 全域動畫 === */
        @keyframes scan-line {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100vh); }
        }
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 5px var(--stark-glow-soft); }
            50% { box-shadow: 0 0 15px var(--stark-glow); }
        }
        @keyframes cyber-jump {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-4px); text-shadow: 0 0 12px var(--stark-cyan); }
            60% { transform: translateY(-2px); text-shadow: 0 0 6px var(--stark-cyan); }
        }
        @keyframes slide-in {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes boot-flash {
            0% { opacity: 0; }
            10% { opacity: 1; }
            100% { opacity: 1; }
        }

        /* 掃描線特效 */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--stark-glow), transparent);
            opacity: 0.4;
            animation: scan-line 8s linear infinite;
            pointer-events: none;
            z-index: 9999;
        }

        nav {
            padding: 0.6rem;
            border-bottom: 2px solid var(--stark-cyan);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(6, 22, 35, 0.95);
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            overflow: hidden;
        }
        @media (min-width: 768px) {
            nav { padding: 0.8rem 1.5rem; }
        }
        nav::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: -50%;
            width: 50%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--stark-cyan), transparent);
            box-shadow: 0 0 10px var(--stark-cyan);
            animation: nav-scan 5s linear infinite;
        }
        @keyframes nav-scan {
            to { left: 150%; }
        }
        .brand-bold {
            font-family: 'Orbitron';
            font-weight: 900;
            font-size: 0.9rem;
            letter-spacing: 2px;
            text-shadow: 0 0 10px var(--stark-glow);
            position: relative;
            z-index: 1;
        }


        /* member selector */
        .member-selector { display: flex; gap: 4px; align-items: center; }
        .mbr-btn {
            font-family: 'Orbitron', sans-serif; font-size: 0.38rem; font-weight: 700;
            padding: 3px 8px; border: 1px solid rgba(0,242,255,0.25);
            background: transparent; color: rgba(0,242,255,0.4);
            cursor: pointer; transition: all 0.2s; outline: none; letter-spacing: 1px;
            -webkit-tap-highlight-color: transparent;
        }
        .mbr-btn:hover { color: var(--stark-cyan); border-color: rgba(0,242,255,0.6); }
        .mbr-btn.active {
            color: var(--stark-dark); background: var(--stark-cyan);
            border-color: var(--stark-cyan); box-shadow: 0 0 8px rgba(0,242,255,0.4);
        }
        .btn-update-now {
            background: rgba(255,204,0,0.15);
            border: 1px solid var(--stark-gold);
            color: var(--stark-gold);
            font-family: 'Orbitron';
            font-size: 0.48rem;
            font-weight: 900;
            letter-spacing: 1px;
            padding: 3px 8px;
            cursor: pointer;
            transition: 0.2s;
            animation: pulse-glow 1.5s ease-in-out infinite;
            touch-action: manipulation;
        }
        .btn-update-now:hover { background: rgba(255,204,0,0.3); }

        .btn-nav-sync {
            background: transparent;
            border: 1px solid rgba(0,242,255,0.3);
            color: rgba(0,242,255,0.6);
            font-size: 0.8rem;
            width: 22px; height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s var(--easing-cyber);
            padding: 0;
            line-height: 1;
            border-radius: 2px;
        }
        .btn-nav-sync:hover {
            color: var(--stark-cyan);
            border-color: var(--stark-cyan);
            box-shadow: 0 0 8px var(--stark-glow-soft);
        }
        .btn-nav-sync:active { transform: rotate(180deg); }
        .btn-nav-sync.spinning {
            animation: spin 0.6s linear infinite;
            color: var(--stark-gold);
            border-color: var(--stark-gold);
        }
        .conn-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: 'Orbitron';
            font-size: 0.55rem;
            letter-spacing: 1px;
        }
        .conn-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--stark-green);
            box-shadow: 0 0 8px var(--stark-green);
            position: relative;
        }
        .conn-dot::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50%;
            border: 1px solid currentColor;
            color: var(--stark-green);
            animation: radar-ping 2s ease-out infinite;
        }
        @keyframes radar-ping {
            0%   { transform: scale(1); opacity: 1; }
            100% { transform: scale(3); opacity: 0; }
        }
        .conn-dot.offline { background: var(--stark-red); box-shadow: 0 0 8px var(--stark-red); }
        .conn-dot.offline::before { color: var(--stark-red); }
        .conn-dot.syncing { background: var(--stark-gold); box-shadow: 0 0 8px var(--stark-gold); }
        .conn-dot.syncing::before { color: var(--stark-gold); animation-duration: 1s; }

        .date-nav-row {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .nav-btn {
            background: transparent;
            border: 1px solid rgba(0, 242, 255, 0.4);
            color: var(--stark-cyan);
            width: 32px; height: 32px;
            cursor: pointer;
            transition: 0.2s var(--easing-cyber);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            font-weight: bold;
            position: relative;
            overflow: hidden;
        }
        .nav-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--stark-glow-soft);
            opacity: 0;
            transition: opacity 0.2s;
        }
        .nav-btn:hover::before { opacity: 1; }
        .nav-btn:hover { border-color: var(--stark-cyan); box-shadow: 0 0 14px var(--stark-glow); }
        .nav-btn:active { transform: scale(0.88); }

        .date-display {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            cursor: pointer;
            position: relative;
        }
        input[type="date"] {
            background: transparent;
            border: none;
            color: var(--stark-cyan);
            font-family: 'Orbitron';
            font-size: 1rem;
            outline: none;
            color-scheme: dark;
            letter-spacing: 2px;
            text-align: center;
            cursor: pointer;
        }
        .weather-display {
            font-family: 'Orbitron';
            font-size: 0.52rem;
            color: rgba(0,242,255,0.6);
            letter-spacing: 1px;
            white-space: nowrap;
            min-height: 0.75rem;
            text-align: right;
        }
        @media (max-width: 480px) {
            .weather-display { font-size: 0.6rem; }
        }
        .date-label {
            font-family: 'Orbitron';
            font-size: 0.6rem;
            letter-spacing: 3px;
            color: var(--stark-gold);
            height: 14px;
            transition: opacity 0.3s, transform 0.3s;
            text-transform: uppercase;
        }
        .date-label.hidden { opacity: 0; transform: translateY(-4px); }
        .date-underline {
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--stark-cyan), transparent);
            opacity: 0.5;
        }

        .main-container {
            flex: 1;
            max-width: 750px;
            margin: 0 auto;
            padding: 0.5rem;
            padding-top: calc(var(--nav-h, 50px) + 0.6rem);
            width: 100%;
            padding-bottom: calc(var(--footer-h, 180px) + 16px);
        }
        @media (min-width: 768px) {
            .main-container {
                max-width: 860px;
                padding: 0.8rem 1.2rem;
                padding-top: calc(var(--nav-h, 50px) + 0.8rem);
                padding-bottom: calc(var(--footer-h, 180px) + 24px);
            }
        }
        .gpal-card {
            background: var(--stark-panel);
            border: 1px solid var(--stark-border);
            padding: 0.8rem;
            margin-bottom: 0.6rem;
            position: relative;
            clip-path: polygon(0 0, 97% 0, 100% 3%, 100% 100%, 3% 100%, 0 97%);
            animation: fade-in 0.4s var(--easing-smooth) both;
            transition: border-color 0.3s, transform 0.3s var(--easing-smooth), box-shadow 0.3s;
        }
        .gpal-card:hover {
            border-color: rgba(0,242,255,0.5);
            transform: translateY(-1px);
            box-shadow: 0 4px 18px rgba(0,242,255,0.08);
        }
        .gpal-card:nth-child(1) { animation-delay: 0.05s; }
        .gpal-card:nth-child(2) { animation-delay: 0.1s; }
        .gpal-card:nth-child(3) { animation-delay: 0.15s; }
        .gpal-card:nth-child(4) { animation-delay: 0.2s; }

        /* 卡片角邊裝飾 */
        .gpal-card::before,
        .gpal-card::after,
        .intel-card::before,
        .intel-card::after {
            content: '';
            position: absolute;
            width: 12px;
            height: 12px;
            border: 1px solid var(--stark-cyan);
            opacity: 0.6;
            transition: opacity 0.3s, width 0.3s, height 0.3s;
            pointer-events: none;
        }
        .gpal-card::before {
            top: -1px; left: -1px;
            border-right: none;
            border-bottom: none;
        }
        .gpal-card::after {
            bottom: -1px; right: -1px;
            border-left: none;
            border-top: none;
        }
        .gpal-card:hover::before,
        .gpal-card:hover::after {
            width: 16px;
            height: 16px;
            opacity: 1;
        }
        .intel-card::before {
            top: -1px; left: -1px;
            border-right: none;
            border-bottom: none;
            border-color: var(--stark-gold);
        }
        .intel-card::after {
            bottom: -1px; right: -1px;
            border-left: none;
            border-top: none;
            border-color: var(--stark-gold);
        }

        .card-header {
            border-left: 3px solid var(--stark-cyan);
            padding-left: 8px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            flex-wrap: nowrap;
            gap: 8px;
            position: relative;
        }
        .card-header::before {
            content: '';
            position: absolute;
            left: -3px;
            top: 0;
            bottom: 0;
            width: 3px;
            background: var(--stark-cyan);
            box-shadow: 0 0 10px var(--stark-glow);
            animation: header-pulse 3s ease-in-out infinite;
        }
        @keyframes header-pulse {
            0%, 100% { opacity: 0.7; box-shadow: 0 0 6px var(--stark-glow-soft); }
            50%      { opacity: 1;   box-shadow: 0 0 14px var(--stark-glow); }
        }
        .card-header h2 {
            font-size: 0.7rem;
            letter-spacing: 2px;
            font-family: 'Orbitron';
            margin: 0;
            text-shadow: 0 0 12px rgba(0,242,255,0.3);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
            min-width: 0;
        }
        .btn-copy-plan {
            margin-left: auto;
            background: transparent;
            border: 1px solid rgba(0,242,255,0.55);
            color: rgba(0,242,255,0.8);
            font-family: 'Orbitron', sans-serif;
            font-size: 0.42rem;
            font-weight: 700;
            letter-spacing: 1px;
            padding: 2px 8px;
            cursor: pointer;
            transition: all 0.2s;
            outline: none;
            white-space: nowrap;
        }
        .btn-copy-plan:hover { border-color: var(--stark-cyan); color: var(--stark-cyan); }
        .btn-copy-plan.copied { border-color: var(--stark-green); color: var(--stark-green); }
        /* ── Row "more" toggle & extras ── */
        .row-more-btn {
            font-family: 'Orbitron', sans-serif; font-size: 0.6rem; font-weight: 700;
            color: rgba(0,242,255,0.8); background: transparent;
            border: 1px solid rgba(0,242,255,0.5);
            padding: 3px 8px; cursor: pointer; flex-shrink: 0;
            transition: all 0.2s; outline: none; user-select: none;
            -webkit-tap-highlight-color: transparent; letter-spacing: 1px;
            border-radius: 3px;
        }
        .row-more-btn:hover, .row-more-btn.open { color: var(--stark-cyan); border-color: var(--stark-cyan); }
        .row-actions-extra {
            display: none; align-items: center; gap: 4px; flex-shrink: 0;
        }
        .row-actions-extra.open { display: flex; }
        /* ── Goal delete button ── */
        .goal-del-btn {
            font-family: 'Orbitron', sans-serif; font-size: 0.6rem; font-weight: 700;
            color: var(--stark-red); border: 1px solid var(--stark-red);
            padding: 3px 8px; cursor: pointer; opacity: 0.8; transition: 0.2s;
            flex-shrink: 0; background: transparent; outline: none; border-radius: 3px;
            -webkit-tap-highlight-color: rgba(255,62,62,0.2);
        }
        .goal-del-btn:hover { opacity: 1; }
                .copy-item-btn {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.38rem;
            font-weight: 700;
            color: rgba(0,242,255,0.75);
            cursor: pointer;
            padding: 1px 5px;
            border: 1px solid rgba(0,242,255,0.15);
            background: transparent;
            transition: all 0.2s;
            white-space: nowrap;
            user-select: none;
        }
        .copy-item-btn:hover { color: var(--stark-cyan); border-color: var(--stark-cyan); }
        .copy-item-btn.copied { color: var(--stark-green); border-color: var(--stark-green); }
        .dup-btn {
            font-family: 'Orbitron', sans-serif; font-size: 0.38rem; font-weight: 700;
            color: rgba(255,204,0,0.45); cursor: pointer; padding: 1px 5px;
            border: 1px solid rgba(255,204,0,0.2); background: transparent;
            transition: all 0.2s; white-space: nowrap; user-select: none;
        }
        .dup-btn:hover { color: var(--stark-gold); border-color: var(--stark-gold); }
        .dup-btn.duped { color: var(--stark-green); border-color: var(--stark-green); }
        .goal-copy-btn {
            font-family: 'Orbitron', sans-serif; font-size: 0.34rem; font-weight: 700;
            color: rgba(0,242,255,0.30); cursor: pointer; padding: 1px 4px;
            border: 1px solid rgba(0,242,255,0.12); background: transparent;
            transition: all 0.2s; white-space: nowrap; user-select: none; flex-shrink: 0;
        }
        .goal-copy-btn:hover { color: var(--stark-cyan); border-color: var(--stark-cyan); }
        .goal-copy-btn.copied { color: var(--stark-green); border-color: var(--stark-green); }
        .progress-stats {
            font-family: 'Orbitron';
            font-size: 0.7rem;
            color: var(--stark-gold);
            font-weight: 900;
            transition: 0.3s;
            white-space: nowrap;
            flex-shrink: 0;
        }

        textarea.auto-height {
            width: 100%;
            min-height: 25px;
            border: none;
            background: transparent;
            font-family: 'Rajdhani';
            font-size: 1.1rem;
            color: #fff;
            resize: none;
            outline: none;
            line-height: 1.3;
            overflow: hidden;
            word-break: break-word;
        }
        @media (min-width: 768px) {
            textarea.auto-height { font-size: 1.25rem; line-height: 1.5; min-height: 35px; }
        }

        /* === MISSION GOAL === */
        .goal-list { display: flex; flex-direction: column; gap: 8px; }

        /* === MISSION CLOCK === */
        .mission-clock-bar {
            background: rgba(255,204,0,0.05); border: 1px solid rgba(255,204,0,0.3);
            border-left: 3px solid var(--stark-gold); padding: 8px 10px; margin-bottom: 8px;
            display: flex; align-items: center; gap: 8px; border-radius: 2px;
        }
        .mc-info { flex: 1; min-width: 0; }
        .mc-label { font-family: 'Orbitron', sans-serif; font-size: 0.38rem; color: var(--stark-gold); letter-spacing: 2px; opacity: 0.7; }
        .mc-task-name { font-size: 0.85rem; font-family: 'Rajdhani', sans-serif; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .mc-progress-wrap { width: 80px; height: 3px; background: rgba(255,204,0,0.15); border-radius: 2px; overflow: hidden; flex-shrink: 0; }
        .mc-progress-bar { height: 100%; background: var(--stark-gold); box-shadow: 0 0 6px rgba(255,204,0,0.5); transition: width 1s linear; }
        .mc-time { font-family: 'Orbitron', sans-serif; font-size: 0.85rem; font-weight: 900; color: var(--stark-gold); letter-spacing: 2px; flex-shrink: 0; min-width: 48px; text-align: right; font-variant-numeric: tabular-nums; }
        .mc-time.urgent { color: var(--stark-red); animation: lt-pulse 1s ease-in-out infinite; }
        .mc-btn { font-family: 'Orbitron', sans-serif; font-size: 0.38rem; font-weight: 700; background: transparent; border: 1px solid rgba(255,204,0,0.3); color: rgba(255,204,0,0.6); padding: 2px 6px; cursor: pointer; transition: all 0.2s; flex-shrink: 0; outline: none; }
        .mc-btn:hover { border-color: var(--stark-gold); color: var(--stark-gold); }
        .clock-start-btn {
            font-family: 'Orbitron', sans-serif; font-size: 0.38rem; font-weight: 900;
            color: rgba(255,204,0,0.85); border: 1px solid rgba(255,204,0,0.6);
            background: rgba(255,204,0,0.03); padding: 2px 7px;
            cursor: pointer; user-select: none; letter-spacing: 1px;
            clip-path: polygon(8% 0, 100% 0, 92% 100%, 0 100%);
            position: relative; overflow: hidden;
            transition: all 0.2s var(--easing-cyber);
        }
        .clock-start-btn::before {
            content: ''; position: absolute; top: 0; left: -100%;
            width: 60%; height: 100%;

            flex-wrap: wrap;

        /* 月份切換 */

            gap: 8px;
            margin-bottom: 10px;
        }

        /* 三欄數字 */

            font-family: 'Orbitron';
            font-size: 0.65rem;
            letter-spacing: 1.5px;
            margin-bottom: 8px;

        .finance-stat.expense .finance-stat-label { color: rgba(255,62,62,0.7); }
        .finance-stat.net     .finance-stat-label { color: rgba(0,242,255,0.7); }
        .finance-stat-value {
            font-family: 'Orbitron';
            font-weight: 900;

        /* 類別支出條 */

        .finance-cat-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .finance-cat-name {
            font-family: 'Rajdhani';
            font-size: 0.85rem;
            color: rgba(255,255,255,0.7);
            
            white-space: nowrap;
            overflow: hidden;

            width: 0%;

        .finance-cat-amt {
            font-family: 'Orbitron';
            font-size: 0.55rem;
            color: rgba(255,255,255,0.5);
            min-width: 55px;
            text-align: right;
            font-variant-numeric: tabular-nums;
        }
        .finance-loading {
            font-family: 'Orbitron';
            font-size: 0.55rem;
            color: rgba(0,255,136,0.4);
            letter-spacing: 1px;
            text-align: center;
            padding: 12px 0;
        }
        .finance-error {
            font-family: 'Orbitron';
            font-size: 0.55rem;
            color: var(--stark-red);
            padding: 6px 0;
        }

        @media (max-width: 480px) {
            .finance-stats { grid-template-columns: 1fr 1fr 1fr; gap: 4px; }
            .finance-stat { padding: 10px 4px; }
            .finance-stat-label { font-size: 0.58rem; }
            .finance-stat-value { font-size: 1rem; letter-spacing: 1px; }
            .finance-cat-name { min-width: 55px; font-size: 0.75rem; }
        }

        /* ── Footer date / time / weather row ── */
        .footer-dt-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0;
            padding: 6px 10px;
            border-top: 1px solid rgba(0,242,255,0.12);
            flex-wrap: nowrap;
            overflow: hidden;
            text-align: center;
        }
        .footer-dt-row .member-selector { gap: 4px; flex-shrink: 0; margin-right: 10px; }
        .footer-dt-row .mbr-btn { font-size: 0.5rem; padding: 4px 9px; }
        .footer-dt-row .nav-btn { width: 30px; height: 30px; font-size: 0.9rem; flex-shrink: 0; margin: 0 6px; }
        .footer-dt-row .date-display { gap: 0; align-items: center; flex-shrink: 0; }
        .footer-dt-row input[type="date"] { font-size: 0.88rem; letter-spacing: 0.5px; min-width: 0; }
        .footer-dt-row .date-label { font-size: 0.5rem; letter-spacing: 2px; height: 12px; }
        .footer-dt-row .date-underline { display: none; }
        /* ── Spotify toggle ── */
        .btn-spotify-toggle {
            font-family: 'Orbitron', sans-serif; font-size: 0.42rem; font-weight: 700;
            color: rgba(29,185,84,0.5); background: transparent;
            border: none; border-top: 1px solid rgba(29,185,84,0.12);
            cursor: pointer; padding: 4px 8px;
            letter-spacing: 1px; transition: color 0.2s; outline: none;
            width: 100%; text-align: center;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-spotify-toggle:hover { color: #1DB954; }


        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }
        /* 手機省電：關閉所有 infinite 動畫 */
        @media (max-width: 768px) {
            body::after { animation: none !important; }
            body::before { animation: none !important; }

            /* LONGTERM GOAL — 手機版日期變細，顯示更多內容 */
            .lt-date-icon {
                font-size: 0.5rem !important; font-weight: 300 !important;
                padding: 2px 4px !important; letter-spacing: 0.1px !important;

            .lt-days {

            .lt-goal-row { flex-wrap: nowrap !important; overflow-x: auto !important; -webkit-overflow-scrolling: touch; }

            /* 手機版 Plan 時間及時長加大 */

                font-size: 0.75rem !important;

                min-width: 44px !important;
            }

                opacity: 0.7;
            }

                gap: 3px !important;
            }
            .plan-dur {
                font-size: 0.7rem !important;
                min-width: 36px !important;
            }
        }
    </style>
</head>

// ============================================================
//  SUPABASE API LAYER — 取代 Google Apps Script
//  所有讀寫直接呼叫 Supabase REST API（速度快 5-10x）

const SB = {
    _cache: new Map(), // 記憶體快取（session 內有效）

    _h() {
        return {
            'Content-Type':  'application/json',
            'apikey':        CONFIG.SB_KEY,
            'Authorization': `Bearer ${CONFIG.SB_KEY}`,
            'Prefer':        'return=representation',
        };
    },

    // GET：讀取資料
    async get(table, params = '') {
        const res = await fetch(`${CONFIG.SB_URL}/rest/v1/${table}${params}`, {
            headers: { ...SB._h(), 'Prefer': 'return=representation' },
            keepalive: true,
        });
        if (!res.ok) throw new Error(`SB GET ${table} ${res.status}`);
        return res.json();
    },

    // UPSERT：插入或更新
    async upsert(table, data, onConflict = '') {
        // PostgREST 需要 on_conflict 作為 URL 參數才能正確 upsert
        const url = onConflict
            ? `${CONFIG.SB_URL}/rest/v1/${table}?on_conflict=${onConflict}`
            : `${CONFIG.SB_URL}/rest/v1/${table}`;
        const prefer = onConflict
            ? `resolution=merge-duplicates,return=representation`
            : `return=representation`;
        const res = await fetch(url, {
            method:  'POST',
            headers: { ...SB._h(), 'Prefer': prefer },
            body:    JSON.stringify(data),
        });
        if (!res.ok) throw new Error(`SB UPSERT ${table} ${res.status}: ${await res.text()}`);
        return res.json();
    },

    // DELETE：刪除
    async delete(table, params = '') {
        const res = await fetch(`${CONFIG.SB_URL}/rest/v1/${table}${params}`, {
            method:  'DELETE',
            headers: SB._h(),
        });
        if (!res.ok) throw new Error(`SB DELETE ${table} ${res.status}`);
        return true;
    },

    // PATCH：更新
    async patch(table, data, params = '') {
        const res = await fetch(`${CONFIG.SB_URL}/rest/v1/${table}${params}`, {
            method:  'PATCH',
            headers: { ...SB._h(), 'Prefer': 'return=representation' },
            body:    JSON.stringify(data),
        });
        if (!res.ok) throw new Error(`SB PATCH ${table} ${res.status}`);
        return res.json();
    },

    // ── Daily Data ───────────────────────────────────────────
    async getBundle(member, date) {
        const rows = await SB.get('daily_data',
            `?member=eq.${member}&date=eq.${date}&select=goal,plan,action,learn,health`);
        if (!rows.length) return { date, goal:'', plan:'', action:'', learn:'', health:null, found:false };
        const r = rows[0];
        return { date, goal:r.goal||'', plan:r.plan||'', action:r.action||'',
                 learn:r.learn||'', health:r.health||null, found:true };
    },

    async saveBundle(member, date, data) {
        return SB.upsert('daily_data', {
            member, date,
            ...(data.goal   !== undefined && { goal:   data.goal }),
            ...(data.plan   !== undefined && { plan:   data.plan }),
            ...(data.action !== undefined && { action: data.action }),
            ...(data.learn  !== undefined && { learn:  data.learn }),
        }, 'member,date');
    },

    async saveHealth(member, date, health) {
        return SB.upsert('daily_data', { member, date, health }, 'member,date');
    },

    // ── Init（一次取得所有資料）──────────────────────────────
    async getInit(member, date) {
        const [bundle, longterm, habit, templates, portfolio, expense] = await Promise.all([
            SB.getBundle(member, date),
            SB.getLongterm(member),
            SB.getHabit(member),
            SB.getTemplates(),
            SB.getPortfolio(),
            SB.getExpense(date.slice(0,7)),
        ]);
        return {
            ...bundle,
            longterm:  longterm.data,
            habits:    habit.data,
            templates: templates.templates,
            portfolio,
            expense,
            success: true,
        };
    },

    // ── Longterm Goals ───────────────────────────────────────
    async getLongterm(member) {
        const key = `lt_${member}`;
        const cached = SB._cache.get(key);
        if (cached && Date.now() - cached.ts < 30000) return cached.data;
        const rows = await SB.get('longterm_goals', `?member=eq.${member}&select=data`);
        const result = { data: rows.length ? rows[0].data : null, found: rows.length > 0 };
        SB._cache.set(key, { data: result, ts: Date.now() });
        return result;
    },

    async saveLongterm(member, data) {
        SB._cache.delete(`lt_${member}`); // 清除快取
        return SB.upsert('longterm_goals', { member, data }, 'member');
    },

    // ── Habit ────────────────────────────────────────────────
    async getHabit(member) {
        const key = `habit_${member}`;
        const cached = SB._cache.get(key);
        if (cached && Date.now() - cached.ts < 30000) return cached.data;
        const rows = await SB.get('habit_data', `?member=eq.${member}&select=data`);
        const result = { habits: rows.length ? rows[0].data : null, found: rows.length > 0 };
        SB._cache.set(key, { data: result, ts: Date.now() });
        return result;
    },

    async saveHabit(member, data) {
        SB._cache.delete(`habit_${member}`); // 清除快取
        return SB.upsert('habit_data', { member, data }, 'member');
    },

    // ── Templates ────────────────────────────────────────────
    async getTemplates(type) {
        const key = `tmpl_${type || 'all'}`;
        if (SB._cache.has(key)) return SB._cache.get(key);
        const q = type ? `?type=eq.${type}&select=type,name,data` : `?select=type,name,data`;
        const rows = await SB.get('templates', q);
        const result = { templates: rows };
        SB._cache.set(key, result);
        return result;
    },

    async saveTemplate(type, name, data) {
        SB._cache.delete(`tmpl_${type}`); SB._cache.delete('tmpl_all');
        return SB.upsert('templates', { type, name, data }, 'type,name');
    },

    async deleteTemplate(type, name) {
        SB._cache.delete(`tmpl_${type}`); SB._cache.delete('tmpl_all');
        return SB.delete('templates', `?type=eq.${type}&name=eq.${encodeURIComponent(name)}`);
    },

    // ── Expense ──────────────────────────────────────────────
    async getExpense(month, account) {
        let q = `?date=gte.${month}-01&date=lt.${SB._nextMonth(month)}-01&select=id,date,income,expense,category,note,account&order=date.asc`;
        if (account && account !== 'ALL') q += `&account=eq.${encodeURIComponent(account)}`;
        const rows = await SB.get('expense_records', q);
        let totalIncome = 0, totalExpense = 0;
        const records = [], catMap = {};
        rows.forEach(r => {
            const inc = Number(r.income) || 0;
            const exp = Number(r.expense) || 0;
            totalIncome  += inc;
            totalExpense += exp;
            const mmdd = String(r.date).slice(5);
            records.push({ date: mmdd, income: inc, expense: exp > 0 ? -exp : 0,
                           category: r.category, note: r.note, account: r.account,
                           _id: r.id }); // r.id comes from Supabase SELECT id
            if (exp > 0) catMap[r.category] = (catMap[r.category] || 0) + exp;
        });
        const categories = Object.keys(catMap)
            .map(k => ({ name: k, amount: catMap[k] }))
            .sort((a,b) => b.amount - a.amount);
        return { total_income: totalIncome, total_expense: totalExpense,
                 net_balance: totalIncome - totalExpense, records, categories };
    },

    async addExpense(data) {
        const amt = Math.abs(Number(data.amount) || 0);
        return SB.upsert('expense_records', {
            date:     data.date,
            income:   data.direction === 'income'  ? amt : 0,
            expense:  data.direction === 'expense' ? amt : 0,
            category: data.category || 'Others',
            note:     data.note     || '',
            account:  data.account  || '',
        });
    },

    async deleteExpense(id) {
        if (!id) return false;
        return SB.delete('expense_records', `?id=eq.${id}`);
    },

    async editExpense(id, data) {
        const amt = Math.abs(Number(data.amount) || 0);
        return SB.patch('expense_records', {
            date:     data.date,
            income:   data.direction === 'income'  ? amt : 0,
            expense:  data.direction === 'expense' ? amt : 0,
            category: data.category || 'Others',
            note:     data.note     || '',
            account:  data.account  || '',
        }, `?id=eq.${id}`);
    },

    // ── Portfolio ─────────────────────────────────────────────
    async getPortfolio(forceRefresh = false) {
        const key = 'portfolio';
        const cached = SB._cache.get(key);
        if (!forceRefresh && cached && Date.now() - cached.ts < 30000) return cached.data;
        const rows = await SB.get('portfolio', `?select=ticker,shares,avg_cost,current_price`);

        // 嘗試用 Finnhub 取得即時股價
        const apiKey = (typeof WatchlistModule !== 'undefined') ? WatchlistModule.getKey() : '';
        let livePrices = {};
        if (apiKey && rows.length) {
            try {
                const quotes = await Promise.all(rows.map(async r => {
                    try {
                        const res = await fetch(`https://finnhub.io/api/v1/quote?symbol=${r.ticker}&token=${apiKey}`);
                        if (!res.ok) return null;
                        const q = await res.json();
                        return (q && q.c > 0) ? { ticker: r.ticker, price: q.c } : null;
                    } catch { return null; }
                }));
                quotes.forEach(q => { if (q) livePrices[q.ticker] = q.price; });
                // 把即時價格寫回 Supabase（背景）
                Object.entries(livePrices).forEach(([ticker, price]) => {
                    SB.patch('portfolio', { current_price: price }, `?ticker=eq.${ticker}`).catch(()=>{});
                });
            } catch {}
        }

        let totalValue = 0, totalCost = 0;
        const holdings = rows.map(r => {
            const shares = Number(r.shares), avg = Number(r.avg_cost);
            const cur = livePrices[r.ticker] || Number(r.current_price) || avg;
            const mkt = shares * cur, cost = shares * avg, pl = mkt - cost;
            totalValue += mkt; totalCost += cost;
            return { ticker: r.ticker, symbol: r.ticker, shares, avg_cost: avg,
                     current_price: cur, value: mkt, market_value: mkt, pl,
                     pl_pct: cost ? ((pl/cost)*100).toFixed(2) : '0',
                     live: !!livePrices[r.ticker] };
        });
        const pfResult = {
            summary: { total_value: totalValue, total_cost: totalCost,
                       total_pl: totalValue - totalCost,
                       total_pl_pct: totalCost ? (totalValue-totalCost)/totalCost*100 : 0,
                       live: Object.keys(livePrices).length > 0 },
            holdings,
        };
        SB._cache.set('portfolio', { data: pfResult, ts: Date.now() });
        return pfResult;
    },

    async trade(ticker, action, shares, price) {
        const rows = await SB.get('portfolio', `?ticker=eq.${ticker}`);
        const exist = rows[0];
        if (action === 'BUY' || action === 'UNDO_SELL') {
            if (!exist) {
                return SB.upsert('portfolio', { ticker, shares, avg_cost: price, current_price: price });
            }
            const newShares = Number(exist.shares) + shares;
            const newAvg    = (Number(exist.shares) * Number(exist.avg_cost) + shares * price) / newShares;
            return SB.patch('portfolio', { shares: newShares, avg_cost: newAvg }, `?ticker=eq.${ticker}`);
        } else {
            if (!exist) throw new Error('ticker not found');
            const newShares = Number(exist.shares) - shares;
            if (newShares <= 0) return SB.delete('portfolio', `?ticker=eq.${ticker}`);
            return SB.patch('portfolio', { shares: newShares }, `?ticker=eq.${ticker}`);
        }
    },

    // ── Watchlist ─────────────────────────────────────────────
    async getWatchlist() {
        const rows = await SB.get('watchlist', `?select=ticker,note,added_at`);
        return { items: rows.map(r => ({ ticker: r.ticker, note: r.note, added: r.added_at })) };
    },

        // ── Sync tagged plan rows to other members ───────────
    async syncTaggedPlans(currentMember, date, planText) {
        const lines = planText.split('\n');
        const tagged = {};
        lines.forEach(line => {
            const parts = line.split('|');
            if (parts.length < 2) return;
            const membersRaw = parts[3] ? parts[3].match(/@(dad|mom|kid)/gi) || [] : [];
            membersRaw.forEach(m => {
                const member = m.slice(1).toLowerCase();
                if (member === currentMember) return;
                if (!tagged[member]) tagged[member] = [];
                const cleanLine = parts.slice(0,3).join('|');
                tagged[member].push({ timeKey: parts[0], line: cleanLine });
            });
        });
        for (const [member, rows] of Object.entries(tagged)) {
            if (!rows.length) continue;
            try {
                const existing = await SB.getBundle(member, date);
                const existLines = (existing.plan || '').split('\n').filter(l => l.trim());
                const existKeys = new Set(existLines.map(l => l.split('|')[0]));
                const toAdd = rows.filter(r => !existKeys.has(r.timeKey)).map(r => r.line);
                if (!toAdd.length) continue;
                const newPlan = [...existLines, ...toAdd].join('\n');
                await SB.saveBundle(member, date, { plan: newPlan });
                console.log('[syncTaggedPlans] synced', toAdd.length, 'rows to', member);
            } catch(e) { console.warn('syncTaggedPlans:', member, e); }
        }
        return Object.keys(tagged).length > 0;
    },

// ── Helpers ───────────────────────────────────────────────
    _nextMonth(month) {
        const [y, m] = month.split('-').map(Number);
        return m === 12 ? `${y+1}-01` : `${y}-${String(m+1).padStart(2,'0')}`;
    },
};

// ---------- UTILS ----------
const Utils = {
    debounce(fn, wait) {
        let t;
        return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), wait); };
    },

    pad2(n) { return String(n).padStart(2, '0'); },

    timeToMins(t) {
        const [h, m] = t.split(':').map(Number);
        return h * 60 + m;
    },

    minsToTime(mins) {
        const clamped = Math.max(0, Math.min(mins, 24 * 60));
        return `${Utils.pad2(Math.floor(clamped / 60))}:${Utils.pad2(clamped % 60)}`;
    },

    getOffsetTime(timeStr, offsetMins) {
        return Utils.minsToTime(Utils.timeToMins(timeStr) + offsetMins);
    },

    getDurationMins(start, end) {
        if (!start || !end) return 30;
        return Math.max(0, Utils.timeToMins(end) - Utils.timeToMins(start));
    },

    nowTimeStr() {
        const d = Utils.nowHK();
        return `${Utils.pad2(d.getHours())}:${Utils.pad2(d.getMinutes())}`;
    },

    getTZ() {
        // 一次性遷移:強制設為太平洋時間
        const MIGRATION_FLAG = 'gpal_tz_reset_pacific';
        if (!localStorage.getItem(MIGRATION_FLAG)) {
            localStorage.setItem(CONFIG.TZ_LS_KEY, 'America/Los_Angeles');
            localStorage.setItem(MIGRATION_FLAG, '1');
        }
        return localStorage.getItem(CONFIG.TZ_LS_KEY) || CONFIG.DEFAULT_TZ;
    },

    todayISO() {
        // Safari-safe: 用 Intl.DateTimeFormat 確保正確格式
        const d = new Date();
        const la = new Intl.DateTimeFormat('en-CA', {
            timeZone: Utils.getTZ(),
            year: 'numeric', month: '2-digit', day: '2-digit'
        }).format(d);
        return la; // 格式：2026-05-29
    },

    nowHK() {
        // Safari-safe: 用 Intl.DateTimeFormat 取加州時間
        const d = new Date();
        const parts = new Intl.DateTimeFormat('en-US', {
            timeZone: 'America/Los_Angeles',
            year: 'numeric', month: '2-digit', day: '2-digit',
            hour: '2-digit', minute: '2-digit', second: '2-digit',
            hour12: false
        }).formatToParts(d);
        const get = t => parts.find(p => p.type === t)?.value || '00';
        return new Date(`${get('year')}-${get('month')}-${get('day')}T${get('hour')}:${get('minute')}:${get('second')}`);
    },

    updateDateLabel(dateStr) {
        const days = ['SUNDAY','MONDAY','TUESDAY','WEDNESDAY','THURSDAY','FRIDAY','SATURDAY'];
        // 用 T12:00:00 避免時區偏移導致日期跑掉
        const d = new Date(dateStr + 'T12:00:00');
        const label = document.getElementById('date-label');
        if (label) {
            label.textContent = days[d.getDay()];
            label.classList.remove('hidden');
        }
        // Strategic Plan 標題旁的成員／日期／星期：G#01 [ 07/14/2026. TUE ]
        const planLabel = document.getElementById('plan-date-label');
        if (planLabel) {
            const mm = String(d.getMonth() + 1).padStart(2, '0');
            const dd = String(d.getDate()).padStart(2, '0');
            const yyyy = d.getFullYear();
            const abbrev = ['SUN','MON','TUE','WED','THU','FRI','SAT'][d.getDay()];
            const mbrCode = ({dad:'G#01',mom:'G#02',kid:'G#03'})[MemberModule.current()] || '';
            planLabel.innerHTML = `<span class="mbr-code">${mbrCode}</span> [ ${mm}/${dd}/${yyyy}. <span class="wd">${abbrev}</span> ]`;
        }
    },

    setStatus(msg, type = 'normal') {
        // status bar removed — log only
        if (type === 'error') console.warn('[GPAL]', msg);
    },

    setConnState(state) {
        // state: 'online' | 'offline' | 'syncing'
        DOM.connDot.className = `conn-dot ${state === 'online' ? '' : state}`;
        DOM.connText.textContent = state.toUpperCase();
    },

    // 安全 fetch：超時 + 重試 + AbortController + 自動加 member 參數
    async safeFetch(url, options = {}, retries = CONFIG.MAX_RETRIES) {
        // 自動在 WEB_APP_URL 請求裡加 member 參數
        if (url.includes(CONFIG.WEB_APP_URL.split('?')[0])) {
            const member = MemberModule.current();
            const sep = url.includes('?') ? '&' : '?';
            url = url + sep + 'member=' + encodeURIComponent(member);
            // POST 請求：在 body 裡也加 member
            if (options.method === 'POST' && options.body) {
                try {
                    const body = JSON.parse(options.body);
                    body.member = member;
                    options = { ...options, body: JSON.stringify(body) };
                } catch {}
            }
        }
        for (let attempt = 0; attempt <= retries; attempt++) {
            const ctrl = new AbortController();
            const timer = setTimeout(() => ctrl.abort(), CONFIG.FETCH_TIMEOUT);
            try {
                const res = await fetch(url, { ...options, signal: ctrl.signal });
                clearTimeout(timer);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                return res;
            } catch (e) {
                clearTimeout(timer);
                if (attempt === retries) throw e;
                // 指數退避
                await new Promise(r => setTimeout(r, 500 * Math.pow(2, attempt)));
            }
        }
    },

    // 本地備份（網路失敗保險）
    backupToLocal(date, payload) {
        try {
            localStorage.setItem(CONFIG.LS_PREFIX + date, JSON.stringify({
                ts: Date.now(), payload
            }));
        } catch (e) { /* 配額已滿等錯誤可忽略 */ }
    },

    loadLocalBackup(date) {
        try {
            const raw = localStorage.getItem(CONFIG.LS_PREFIX + date);
            return raw ? JSON.parse(raw) : null;
        } catch (e) { return null; }
    },

    clearLocalBackup(date) {
        try { localStorage.removeItem(CONFIG.LS_PREFIX + date); } catch (e) {}
    },

    // 安全 HTML 處理（防 XSS）
    escapeHTML(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    },

    adjustHeight(el) {
        el.style.height = 'auto';
        el.style.height = el.scrollHeight + 'px';
    },
};

// ---------- SAVE QUEUE（防抖 + 狀態提示） ----------
const SaveQueue = {
    trigger() {
        State.dirty = true;
        clearTimeout(State.autoSaveTimer);
        Utils.setStatus('>> RECORDING...', 'warn');
        State.autoSaveTimer = setTimeout(() => Sync.save('AUTO'), CONFIG.AUTO_SAVE_DELAY);
    },
    flushImmediate() {
        clearTimeout(State.autoSaveTimer);
        if (State.dirty) return Sync.save('AUTO');
    }
};

const GoalModule = {
    allData: ['', '', ''],

    saveCurrent() {
        GoalModule.allData[0] = GoalModule.serializeCurrent();
        GoalModule._lastRendered = null;
    },

    _lastRendered: null,
    renderCurrent() {
        const raw = GoalModule.allData[0] || '';
        if (raw === GoalModule._lastRendered) return;
        GoalModule._lastRendered = raw;
        GoalModule.parseSingle(raw);
    },

    serializeCurrent() {
        return Array.from(DOM.goalList.querySelectorAll('.goal-row'))
            .map(row => {
                const txt = row.querySelector('input[type=text]').value.trim();
                if (!txt) return null;
                const checked = row.querySelector('[data-role=check]').checked ? '[x]' : '[ ]';
                return `${checked} (${row.dataset.priority}) ${txt}`;
            }).filter(Boolean).join('\n');
    },

    parseSingle(raw) {
        DOM.goalList.replaceChildren();
        if (!raw) { GoalModule.create(); GoalModule.updateProgress(); return; }
        const frag = document.createDocumentFragment();
        raw.split('\n').forEach(line => {
            if (!line.trim()) return;
            const isDone = line.startsWith('[x]');
            const prioMatch = line.match(/\((P[1-3]|NONE)\)/);
            const text = line
                .replace(/^\[[ x]\]\s*\((P[1-3]|NONE)\)\s*/, '')
                .replace(/^\[[ x]\]\s*/, '');
            GoalModule.create(text, isDone, prioMatch ? prioMatch[1] : 'NONE', frag);
        });
        GoalModule.create('', false, 'NONE', frag);
        DOM.goalList.appendChild(frag);
        GoalModule.sort();
        GoalModule.updateProgress();
    },

    parseAll(raw) {
        let text = raw || '';
        try { const p = JSON.parse(text); if (p?.v === 2 && p?.p) text = p.p[MemberModule.current()] || ''; } catch {}
        GoalModule.allData = [text];
        GoalModule.renderCurrent();
    },

    serializeAll() {
        GoalModule.saveCurrent();
        return GoalModule.allData[0] || '';
    },

    serialize() { return GoalModule.serializeAll(); },
    parse(raw)  { GoalModule.parseAll(raw); },

    create(text = '', checked = false, priority = 'NONE', parent = DOM.goalList) {
        const row = document.createElement('div');
        row.className = 'goal-row';
        row.dataset.priority = priority;

        const prioBtn = document.createElement('div');
        prioBtn.className = `prio-tag prio-${priority.toLowerCase()}`;
        prioBtn.textContent = priority === 'NONE' ? '-' : priority;
        prioBtn.dataset.role = 'prio';

        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.className = 'stark-checkbox';
        cb.checked = checked;
        cb.dataset.role = 'check';

        const textContainer = document.createElement('div');
        textContainer.className = 'goal-text-container' + (checked ? ' completed' : '');

        const input = document.createElement('input');
        input.type = 'text';
        input.className = 'goal-input' + (checked ? ' completed' : '');
        input.value = text;
        input.placeholder = 'Mission...';
        input.dataset.role = 'text';

        textContainer.appendChild(input);
        const goalCopyBtn = document.createElement('div');
        goalCopyBtn.className = 'goal-copy-btn';
        goalCopyBtn.textContent = '⎘';
        goalCopyBtn.dataset.role = 'goal-copy';
        goalCopyBtn.title = 'Copy goal text';

        const goalMoreBtn = document.createElement('div');
        goalMoreBtn.className = 'row-more-btn';
        goalMoreBtn.textContent = '•••';
        goalMoreBtn.dataset.role = 'goal-more-toggle';
        goalMoreBtn.title = 'More options';
        const goalExtra = document.createElement('div');
        goalExtra.className = 'row-actions-extra';
        goalExtra.append(goalCopyBtn);
        const goalDelBtn = document.createElement('div');
        goalDelBtn.className = 'goal-del-btn';
        goalDelBtn.textContent = '✕';
        goalDelBtn.dataset.role = 'goal-del';
        goalDelBtn.title = 'Delete';
        row.append(prioBtn, cb, textContainer, goalMoreBtn, goalExtra, goalDelBtn);
        parent.appendChild(row);
        return row;
    },

    ensureTrailingEmpty() {
        const rows = DOM.goalList.querySelectorAll('.goal-row');
        const last = rows[rows.length - 1];
        if (!last || last.querySelector('input[type=text]').value.trim() !== '') {
            GoalModule.create();
        }
    },

    cyclePriority(row) {
        const cur = row.dataset.priority;
        const next = CONFIG.PRIO_LEVELS[(CONFIG.PRIO_LEVELS.indexOf(cur) + 1) % CONFIG.PRIO_LEVELS.length];
        row.dataset.priority = next;
        const btn = row.querySelector('[data-role=prio]');
        btn.textContent = next === 'NONE' ? '-' : next;
        btn.className = `prio-tag prio-${next.toLowerCase()}`;
    },

    sort() {
        const rows = Array.from(DOM.goalList.querySelectorAll('.goal-row'));
        // 保留最後一個空白行不動，避免使用者輸入時跳行
        const last = rows.length > 1 && rows[rows.length - 1].querySelector('input[type=text]').value === ''
            ? rows.pop() : null;

        rows.sort((a, b) => {
            const aDone = a.querySelector('[data-role=check]').checked;
            const bDone = b.querySelector('[data-role=check]').checked;
            if (aDone !== bDone) return aDone ? 1 : -1;
            return CONFIG.PRIO_ORDER[a.dataset.priority] - CONFIG.PRIO_ORDER[b.dataset.priority];
        });

        // DocumentFragment 一次性 reflow
        const frag = document.createDocumentFragment();
        rows.forEach(r => frag.appendChild(r));
        if (last) frag.appendChild(last);
        DOM.goalList.appendChild(frag);
    },

    updateProgress() {
        const rows = Array.from(DOM.goalList.querySelectorAll('.goal-row'))
            .filter(r => r.querySelector('input[type=text]').value.trim() !== '');
        const done = rows.filter(r => r.querySelector('[data-role=check]').checked).length;
        const pct = rows.length === 0 ? 0 : Math.round((done / rows.length) * 100);
        DOM.progressDisplay.textContent = `[ ${pct}% ]`;
        // 進度顏色聯動
        DOM.progressDisplay.style.color = pct === 100 ? 'var(--stark-green)'
            : pct >= 50 ? 'var(--stark-gold)' : 'var(--stark-cyan)';
    },
};

const PlanModule = {

    saveCurrent() {

        if (listEl && PlanModule._rawData) {
            PlanModule._rawData[0] = PlanModule.serializeSingle(listEl);
        }

    _renderOne(idx) {
        if (PlanModule._rendered && PlanModule._rendered[0]) return;
        const listEl = document.getElementById('plan-list-0');
        if (!listEl || !PlanModule._rawData) return;
        PlanModule.parseSingle(PlanModule._rawData[idx] || '', listEl);
        if (PlanModule._rendered) PlanModule._rendered[0] = true;
    },

    renderCurrent() {
        PlanModule._renderOne(0);
        PlanModule.checkTimeHighlight();

    parseSingle(raw, listEl) {
        listEl.replaceChildren();
        const frag = document.createDocumentFragment();
        if (raw) {
            raw.split('\n').forEach(line => {
                if (!line.trim()) return;
                // 清理行首尾的引號和空白（Google Sheet CSV 格式問題）
                const cleanLine = line.trim().replace(/^["']+|["']+$/g, '').trim();
                if (!cleanLine) return;
                const parts = cleanLine.split('|');
                if (parts.length < 2) return;
                const membersRaw = parts[3] ? parts[3].match(/@(dad|mom|kid)/gi) || [] : [];
                const parsedMembers = membersRaw.map(raw => raw.slice(1).toLowerCase());
                const times = parts[0].split('-');
                if (times.length !== 2) return;
                // 清理時間字串的引號和空白
                const start = times[0].trim().replace(/[^0-9:]/g, '');
                const end   = times[1].trim().replace(/[^0-9:]/g, '');
                if (!start || !end) return;
                PlanModule.create(start, end, parts[1], parts[2] || '', frag, parsedMembers);
            });
        }
        PlanModule.create('08:00', '08:30', '', '', frag);
        listEl.appendChild(frag);
        const rows = Array.from(listEl.querySelectorAll('.plan-row'));
        rows.sort((a, b) => a.dataset.start.localeCompare(b.dataset.start));
        const sf = document.createDocumentFragment();
        rows.forEach(r => sf.appendChild(r));
        listEl.appendChild(sf);
    },

    serializeSingle(listEl) {
        return Array.from(listEl.querySelectorAll('.plan-row'))
            .map(row => {
                const txtEl = row.querySelector('input[data-role=text]');
                if (!txtEl) return null;
                const txt = txtEl.value.trim();
                if (!txt) return null;
                const locEl = row.querySelector('[data-role=loc-edit]');
                const loc = locEl ? locEl.value.trim() : '';
                const memberTags = Array.from(row.querySelectorAll('.plan-member-tag.active'))
                    .map(t => '@' + t.dataset.member).join('');
                // 確保時間欄位乾淨（清除引號等非數字/冒號字符）
                const s = String(row.dataset.start || '').replace(/[^0-9:]/g, '');
                const e = String(row.dataset.end   || '').replace(/[^0-9:]/g, '');
                return memberTags
                    ? `${s}-${e}|${txt}|${loc}|${memberTags}`
                    : `${s}-${e}|${txt}|${loc}`;
            }).filter(Boolean).join('\n');
    },

    parseAll(raw) {
        let text = raw || '';
        try { const p = JSON.parse(text); if (p?.v === 2 && p?.p) text = p.p[MemberModule.current()] || ''; } catch {}
        PlanModule._rawData = [text];
        PlanModule._rendered = [false];
        PlanModule.renderCurrent();
    },

    serializeAll() {

    createTimeSelect(val) {

    createDurationSelect(mins) {

        listEl.replaceChildren();
        PlanModule.ensureTrailingEmpty();
        if (PlanModule._rendered) PlanModule._rendered[0] = true;
        SaveQueue.trigger();
        PlanModule.saveCurrent();
        Utils.setStatus('PLAN_CLEARED', 'success');
    },

    updateRowTime(row, newStart, newDurationMins) {
        row.dataset.start = String(newStart || '').replace(/[^0-9:]/g, '');
        row.dataset.end   = String(Utils.getOffsetTime(newStart, newDurationMins) || '').replace(/[^0-9:]/g, '');
    },

    sort() {
        const rows = Array.from(DOM.planList.querySelectorAll('.plan-row'));
        rows.sort((a, b) => a.dataset.start.localeCompare(b.dataset.start));
        const frag = document.createDocumentFragment();
        rows.forEach(r => frag.appendChild(r));
        DOM.planList.appendChild(frag);
    },

    checkTimeHighlight() {
        const cur = Utils.nowTimeStr();
        const today = Utils.todayISO();
        const isToday = DOM.datePicker.value === today;
        const listEl = document.getElementById('plan-list-0');
        if (listEl) {
            listEl.querySelectorAll('.plan-row').forEach(row => {
                row.classList.remove('active-now', 'past');
                if (!isToday) return;
                const start = (row.dataset.start || '').replace(/[^0-9:]/g, '');
                const end   = (row.dataset.end   || '').replace(/[^0-9:]/g, '');
                if (!start) return;
                if (end && cur >= start && cur < end) {
                    row.classList.add('active-now');
                } else if (end && cur >= end) {
                    row.classList.remove('past'); // dimming disabled
                } else if (!end && cur > start) {
                    const [sh,sm] = start.split(':').map(Number);
                    const [ch,cm] = cur.split(':').map(Number);
                    if ((ch*60+cm) - (sh*60+sm) > 30) row.classList.remove('past'); // dimming disabled
                }
            });
        }
    },

    parse(raw) { PlanModule.parseAll(raw); },
    serialize() { return PlanModule.serializeAll(); },
};

// ---------- TRADE LOG MODULE ----------
const TradeModule = {
    trades: [],
    currentType: 'BUY',

    // 解析 action 文字：取出交易記錄與一般筆記
    parse(text) {
        if (!text) return { trades: [], notes: '' };
        const re = /^\[(BUY|SELL)\]\s+(\d{1,2}:\d{2})\s+(\S+)\s+([\d.]+)\s+@\s+\$?([\d.]+)/i;
        const lines = text.split('\n');
        const trades = [];
        const notesLines = [];
        let inNotes = false;
        for (const line of lines) {
            if (line.trim() === '---') { inNotes = true; continue; }
            const m = line.match(re);
            if (m && !inNotes) {
                trades.push({
                    type: m[1].toUpperCase(),
                    time: m[2],
                    ticker: m[3].toUpperCase(),
                    shares: parseFloat(m[4]),
                    price: parseFloat(m[5]),
                });
            } else {
                notesLines.push(line);
            }
        }
        return { trades, notes: notesLines.join('\n').replace(/^\n+|\n+$/g, '') };
    },

    // 把目前 trades + textarea 內的筆記組合回 action 字串
    serialize() {
        const tradeText = TradeModule.trades.map(t =>
            `[${t.type}] ${t.time} ${t.ticker} ${t.shares} @ $${t.price.toFixed(2)}`
        ).join('\n');
        const notes = DOM.textAction.value.trim();
        if (tradeText && notes) return `${tradeText}\n---\n${notes}`;
        if (tradeText) return tradeText;
        return notes;
    },

    // 從 fetchData 回來時呼叫
    loadFromAction(text) {
        const { trades, notes } = TradeModule.parse(text);
        TradeModule.trades = trades;
        DOM.textAction.value = notes;
        Utils.adjustHeight(DOM.textAction);
        TradeModule.render();
    },

    add(type, ticker, shares, price) {
        const now = new Date();
        const trade = {
            type: type,
            time: `${Utils.pad2(now.getHours())}:${Utils.pad2(now.getMinutes())}`,
            ticker: ticker.toUpperCase(),
            shares: parseFloat(shares),
            price: parseFloat(price),
        };
        TradeModule.trades.push(trade);
        TradeModule.render();
        SaveQueue.trigger();
        TradeModule.syncToPortfolio(trade); // 同步到 Portfolio 分頁
    },

    // 推送交易到 Portfolio 分頁
    async syncToPortfolio(trade) {
        try {
            await SB.trade(trade.ticker, trade.type, trade.shares, trade.price);
            SB._cache.delete('portfolio');
            Sync.refreshPortfolio();
            TradeModule._flashLastRow('ok');
        } catch (e) {
            TradeModule._flashLastRow('err', 'NETWORK');
        }
    },

    _flashLastRow(state, msg) {
        const list = document.getElementById('trade-list'); if (!list) return;
        const last = list.lastElementChild;
        if (!last) return;
        if (state === 'ok') {
            last.style.boxShadow = '0 0 12px rgba(0,255,136,0.5)';
            setTimeout(() => { last.style.boxShadow = ''; }, 800);
        } else {
            last.style.boxShadow = '0 0 12px rgba(255,62,62,0.7)';
            last.title = `同步失敗: ${msg || ''}`;
        }
    },

    async remove(idx) {
        const trade = TradeModule.trades[idx];
        if (!trade) return;
        if (!confirm(`確定刪除 ${trade.type} ${trade.ticker} ${trade.shares} @ $${trade.price.toFixed(2)} ？\n（會反向更新到 Portfolio 雲端）`)) return;

        // 視覺：先把該行標為處理中
        const list = document.getElementById('trade-list'); if (!list) return;
        const row  = list.children[idx];
        if (row) row.style.opacity = '0.4';

        try {
            const undoAction = trade.type === 'BUY' ? 'UNDO_BUY' : 'UNDO_SELL';
            await SB.trade(trade.ticker, undoAction, trade.shares, trade.price);
            SB._cache.delete('portfolio');
            TradeModule.trades.splice(idx, 1);
            TradeModule.render();
            SaveQueue.trigger();
            Sync.refreshPortfolio();
        } catch(e) {
            if (row) row.style.opacity = '1';
            alert(`刪除失敗：${e.message || '未知錯誤'}`);
        }
    },

    render() {
        const list = document.getElementById('trade-list');
        if (!list) return;
        list.replaceChildren();
        TradeModule.trades.forEach((t, i) => {
            const total = (t.shares * t.price).toFixed(2);
            const row = document.createElement('div');
            row.className = `trade-row trade-${t.type.toLowerCase()}`;
            row.innerHTML = `
                <span class="trade-time">${t.time}</span>
                <span class="trade-type-badge">${t.type}</span>
                <span class="trade-ticker">${t.ticker}</span>
                <span class="trade-detail">${t.shares} × $${t.price.toFixed(2)} = <strong>$${Number(total).toLocaleString()}</strong></span>
                <button class="trade-del" data-idx="${i}" aria-label="刪除">×</button>
            `;
            list.appendChild(row);
        });
        TradeModule.renderSummary();
    },

    renderSummary() {
        const summary = document.getElementById('trade-summary');
        if (!summary) return;
        if (!summary) return;
        if (TradeModule.trades.length === 0) {
            summary.replaceChildren();
            return;
        }
        const buyTotal  = TradeModule.trades.filter(t => t.type === 'BUY').reduce((a, t) => a + t.shares * t.price, 0);
        const sellTotal = TradeModule.trades.filter(t => t.type === 'SELL').reduce((a, t) => a + t.shares * t.price, 0);
        const net = sellTotal - buyTotal; // 賣出 - 買入 = 當日現金流
        const fmt = n => n.toLocaleString(undefined, { maximumFractionDigits: 2 });
        summary.innerHTML = `
            <span class="sum-label">${TradeModule.trades.length} 筆交易</span>
            <span class="sum-buy">BUY: $${fmt(buyTotal)}</span>
            <span class="sum-sell">SELL: $${fmt(sellTotal)}</span>
            <span class="sum-net">NET: ${net >= 0 ? '+' : '-'}$${fmt(Math.abs(net))}</span>
        `;
    },

    init() {
        // Family version: no trade UI, skip DOM binding
    },
};

// ---------- ACTION MODULE（多人）----------
const ActionModule = {
    allData: ['', '', ''],
    _lastRendered: null,

    saveCurrent() {
        ActionModule.allData[0] = TradeModule.serialize();

    },
    renderCurrent() {

        ActionModule.allData = [planObj ? (planObj.p[MemberModule.current()] || '') : (raw || '')];
        ActionModule.renderCurrent();
    },
