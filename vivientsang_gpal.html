    </div>
</footer>

<script>
'use strict';

/* ============================================================
 * GPAL MK-VII — OPTIMIZED CORE
 * 模組化結構：CONFIG → STATE → API → UTILS → MODULES → INIT
 * ============================================================ */

// ---------- CONFIG ----------
const CONFIG = Object.freeze({
    WEB_APP_URL: "https://script.google.com/macros/s/AKfycbxvUGV-N41f4c7q9M8C6-LmSl_kAH1zgXiVt4QsIADXZvm1GLnwqyXpabjZFvhNVgMVYA/exec",
    AUTO_SAVE_DELAY: 1500,
    PORTFOLIO_REFRESH: 60_000,
    TIME_CHECK_INTERVAL: 60_000,
    FETCH_TIMEOUT: 15_000,
    MAX_RETRIES: 2,
    PRIO_LEVELS: ['NONE', 'P1', 'P2', 'P3'],
    PRIO_ORDER: { P1: 1, P2: 2, P3: 3, NONE: 4 },
    DURATION_OPTIONS: [
        { l: '15m', v: 15 }, { l: '30m', v: 30 }, { l: '45m', v: 45 },
        { l: '1h', v: 60 },  { l: '1.5h', v: 90 }, { l: '2h', v: 120 },
        { l: '3h', v: 180 }, { l: '4h', v: 240 }
    ],
    LS_PREFIX: 'gpal_backup_',
});

// ---------- STATE ----------
const State = {
    autoSaveTimer: null,
    fetchToken: 0,        // 防止 race condition
    isSyncing: false,
    isOnline: navigator.onLine,
    currentData: null,
    dirty: false,
};

// ---------- DOM CACHE ----------
const $ = (id) => document.getElementById(id);
const DOM = {
    datePicker: $('datePicker'),
    goalList: $('goal-list'),
    planList: $('plan-list'),
    textAction: $('textAction'),
    textLearn: $('textLearn'),
    progressDisplay: $('progress-display'),
    portfolioDisplay: $('portfolio-display'),
    connDot: $('conn-dot'),
    connText: $('conn-text'),
    get syncBtn() { return document.querySelector('[data-action="sync"]'); },
};

// ---------- UTILS ----------
const Utils = {
    debounce(fn, wait) {
        let t;
        return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), wait); };
    },

    pad2(n) { return String(n).padStart(2, '0'); },

    timeToMins(t) {
        const [h, m] = t.split(':').map(Number);
        return h * 60 + m;
    },

    minsToTime(mins) {
        const clamped = Math.max(0, Math.min(mins, 24 * 60));
        return `${Utils.pad2(Math.floor(clamped / 60))}:${Utils.pad2(clamped % 60)}`;
    },

    getOffsetTime(timeStr, offsetMins) {
        return Utils.minsToTime(Utils.timeToMins(timeStr) + offsetMins);
    },

    getDurationMins(start, end) {
        if (!start || !end) return 30;
        return Math.max(0, Utils.timeToMins(end) - Utils.timeToMins(start));
    },

    nowTimeStr() {
        const d = new Date();
        return `${Utils.pad2(d.getHours())}:${Utils.pad2(d.getMinutes())}`;
    },

    todayISO() {
        const d = new Date();
        return `${d.getFullYear()}-${Utils.pad2(d.getMonth() + 1)}-${Utils.pad2(d.getDate())}`;
    },

    updateDateLabel(dateStr) {
        const label = document.getElementById('date-label');
        if (!label) return;
        const days = ['SUNDAY','MONDAY','TUESDAY','WEDNESDAY','THURSDAY','FRIDAY','SATURDAY'];
        // 用 T12:00:00 避免時區偏移導致日期跑掉
        const d = new Date(dateStr + 'T12:00:00');
        label.textContent = days[d.getDay()];
        label.classList.remove('hidden');
    },

    setStatus(msg, type = 'normal') {
        // status bar removed — log only
        if (type === 'error') console.warn('[GPAL]', msg);
    },

    setConnState(state) {
        // state: 'online' | 'offline' | 'syncing'
        DOM.connDot.className = `conn-dot ${state === 'online' ? '' : state}`;
        DOM.connText.textContent = state.toUpperCase();
    },

    // 安全 fetch：超時 + 重試 + AbortController
    async safeFetch(url, options = {}, retries = CONFIG.MAX_RETRIES) {
        for (let attempt = 0; attempt <= retries; attempt++) {
            const ctrl = new AbortController();
            const timer = setTimeout(() => ctrl.abort(), CONFIG.FETCH_TIMEOUT);
            try {
                const res = await fetch(url, { ...options, signal: ctrl.signal });
                clearTimeout(timer);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                return res;
            } catch (e) {
                clearTimeout(timer);
                if (attempt === retries) throw e;
                // 指數退避
                await new Promise(r => setTimeout(r, 500 * Math.pow(2, attempt)));
            }
        }
    },

    // 本地備份（網路失敗保險）
    backupToLocal(date, payload) {
        try {
            localStorage.setItem(CONFIG.LS_PREFIX + date, JSON.stringify({
                ts: Date.now(), payload
            }));
        } catch (e) { /* 配額已滿等錯誤可忽略 */ }
    },

    loadLocalBackup(date) {
        try {
            const raw = localStorage.getItem(CONFIG.LS_PREFIX + date);
            return raw ? JSON.parse(raw) : null;
        } catch (e) { return null; }
    },

    clearLocalBackup(date) {
        try { localStorage.removeItem(CONFIG.LS_PREFIX + date); } catch (e) {}
    },

    // 安全 HTML 處理（防 XSS）
    escapeHTML(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    },

    adjustHeight(el) {
        el.style.height = 'auto';
        el.style.height = el.scrollHeight + 'px';
    },
};

// ---------- SAVE QUEUE（防抖 + 狀態提示） ----------
const SaveQueue = {
    trigger() {
        State.dirty = true;
        clearTimeout(State.autoSaveTimer);
        Utils.setStatus('>> RECORDING...', 'warn');
        State.autoSaveTimer = setTimeout(() => Sync.save('AUTO'), CONFIG.AUTO_SAVE_DELAY);
    },
    flushImmediate() {
        clearTimeout(State.autoSaveTimer);
        if (State.dirty) return Sync.save('AUTO');
    }
};

// ---------- GOAL MODULE ----------
const GoalModule = {
    create(text = '', checked = false, priority = 'NONE') {
        const row = document.createElement('div');
        row.className = 'goal-row';
        row.dataset.priority = priority;

        const prioBtn = document.createElement('div');
        prioBtn.className = `prio-tag prio-${priority.toLowerCase()}`;
        prioBtn.textContent = priority === 'NONE' ? '-' : priority;
        prioBtn.dataset.role = 'prio';

        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.className = 'stark-checkbox';
        cb.checked = checked;
        cb.dataset.role = 'check';

        const textContainer = document.createElement('div');
        textContainer.className = 'goal-text-container' + (checked ? ' completed' : '');

        const input = document.createElement('input');
        input.type = 'text';
        input.className = 'goal-input' + (checked ? ' completed' : '');
        input.value = text;
        input.placeholder = 'Mission...';
        input.dataset.role = 'text';

        textContainer.appendChild(input);
        row.append(prioBtn, cb, textContainer);
        DOM.goalList.appendChild(row);
        return row;
    },

    ensureTrailingEmpty() {
        const rows = DOM.goalList.querySelectorAll('.goal-row');
        const last = rows[rows.length - 1];
        if (!last || last.querySelector('input[type=text]').value.trim() !== '') {
            GoalModule.create();
        }
    },

    cyclePriority(row) {
        const cur = row.dataset.priority;
        const next = CONFIG.PRIO_LEVELS[(CONFIG.PRIO_LEVELS.indexOf(cur) + 1) % CONFIG.PRIO_LEVELS.length];
        row.dataset.priority = next;
        const btn = row.querySelector('[data-role=prio]');
        btn.textContent = next === 'NONE' ? '-' : next;
        btn.className = `prio-tag prio-${next.toLowerCase()}`;
    },

    sort() {
        const rows = Array.from(DOM.goalList.querySelectorAll('.goal-row'));
        // 保留最後一個空白行不動，避免使用者輸入時跳行
        const last = rows.length > 1 && rows[rows.length - 1].querySelector('input[type=text]').value === ''
            ? rows.pop() : null;

        rows.sort((a, b) => {
            const aDone = a.querySelector('[data-role=check]').checked;
            const bDone = b.querySelector('[data-role=check]').checked;
            if (aDone !== bDone) return aDone ? 1 : -1;
            return CONFIG.PRIO_ORDER[a.dataset.priority] - CONFIG.PRIO_ORDER[b.dataset.priority];
        });

        // DocumentFragment 一次性 reflow
        const frag = document.createDocumentFragment();
        rows.forEach(r => frag.appendChild(r));
        if (last) frag.appendChild(last);
        DOM.goalList.appendChild(frag);
    },

    updateProgress() {
        const rows = Array.from(DOM.goalList.querySelectorAll('.goal-row'))
            .filter(r => r.querySelector('input[type=text]').value.trim() !== '');
        const done = rows.filter(r => r.querySelector('[data-role=check]').checked).length;
        const pct = rows.length === 0 ? 0 : Math.round((done / rows.length) * 100);
        DOM.progressDisplay.textContent = `[ ${pct}% ]`;
        // 進度顏色聯動
        DOM.progressDisplay.style.color = pct === 100 ? 'var(--stark-green)'
            : pct >= 50 ? 'var(--stark-gold)' : 'var(--stark-cyan)';
    },

    parse(raw) {
        DOM.goalList.replaceChildren();
        if (!raw) {
            GoalModule.create();
            GoalModule.updateProgress();
            return;
        }
        raw.split('\n').forEach(line => {
            if (!line.trim()) return;
            const isDone = line.startsWith('[x]');
            const prioMatch = line.match(/\((P[1-3]|NONE)\)/);
            const text = line
                .replace(/^\[[ x]\]\s*\((P[1-3]|NONE)\)\s*/, '')
                .replace(/^\[[ x]\]\s*/, '');
            // GoalModule.create() 已經自行 appendChild 到 DOM.goalList，不需再處理
            GoalModule.create(text, isDone, prioMatch ? prioMatch[1] : 'NONE');
        });
        GoalModule.create(); // 結尾空白行
        GoalModule.sort();
        GoalModule.updateProgress();
    },

    serialize() {
        return Array.from(DOM.goalList.querySelectorAll('.goal-row'))
            .map(row => {
                const txt = row.querySelector('input[type=text]').value.trim();
                if (!txt) return null;
                const checked = row.querySelector('[data-role=check]').checked ? '[x]' : '[ ]';
                return `${checked} (${row.dataset.priority}) ${txt}`;
            })
            .filter(Boolean)
            .join('\n');
    },
};

// ---------- PLAN MODULE ----------
const PlanModule = {
    createTimeSelect(val) {
        const sel = document.createElement('select');
        sel.className = 'time-sel';
        sel.dataset.role = 'start';
        const frag = document.createDocumentFragment();
        for (let h = 5; h <= 24; h++) {
            for (const m of ['00', '30']) {
                const t = `${Utils.pad2(h)}:${m}`;
                const opt = new Option(t, t);
                if (t === val) opt.selected = true;
                frag.appendChild(opt);
            }
        }
        sel.appendChild(frag);
        return sel;
    },

    createDurationSelect(mins) {
        const sel = document.createElement('select');
        sel.className = 'time-sel';
        sel.dataset.role = 'duration';
        const frag = document.createDocumentFragment();
        CONFIG.DURATION_OPTIONS.forEach(o => {
            const opt = new Option(o.l, o.v);
            if (o.v === mins) opt.selected = true;
            frag.appendChild(opt);
        });
        sel.appendChild(frag);
        return sel;
    },

    create(start = '08:00', end = '08:30', text = '', location = '') {
        const row = document.createElement('div');
        row.className = 'plan-row';
        row.dataset.start = start;
        row.dataset.end = end;

        // 時間選擇器
        const timeRow = document.createElement('div');
        timeRow.className = 'time-select-row';
        const startSel = PlanModule.createTimeSelect(start);
        const durationSel = PlanModule.createDurationSelect(Utils.getDurationMins(start, end));
        const dash = document.createElement('span');
        dash.className = 'time-dash';
        dash.textContent = '+';
        timeRow.append(startSel, dash, durationSel);

        // 內容輸入
        const input = document.createElement('input');
        input.type = 'text';
        input.className = 'plan-input';
        input.value = text;
        input.placeholder = 'Task...';
        input.dataset.role = 'text';

        // 動作區
        const actions = document.createElement('div');
        actions.className = 'plan-actions';

        const addBtn = document.createElement('div');
        addBtn.className = 'loc-add-btn';
        addBtn.textContent = '[+]';
        addBtn.dataset.role = 'loc-add';

        const locEdit = document.createElement('input');
        locEdit.className = 'loc-edit';
        locEdit.value = location;
        locEdit.placeholder = 'Location';
        locEdit.dataset.role = 'loc-edit';

        const locTagGroup = document.createElement('div');
        locTagGroup.className = 'loc-tag-group';
        const locBadge = document.createElement('div');
        locBadge.className = 'loc-badge';
        locBadge.dataset.role = 'loc-badge';

        const navBtn = document.createElement('div');
        navBtn.className = 'loc-copy-btn';
        navBtn.textContent = 'COPY';
        navBtn.dataset.role = 'loc-copy';

        locTagGroup.append(locBadge, navBtn);

        const delBtn = document.createElement('div');
        delBtn.className = 'del-btn';
        delBtn.textContent = 'X';
        delBtn.dataset.role = 'del';

        if (location) {
            locBadge.textContent = `📍 ${location}`;
            locTagGroup.style.display = 'flex';
            addBtn.style.display = 'none';
        }

        actions.append(addBtn, locEdit, locTagGroup, delBtn);
        row.append(timeRow, input, actions);
        DOM.planList.appendChild(row);
        return row;
    },

    ensureTrailingEmpty() {
        const rows = DOM.planList.querySelectorAll('.plan-row');
        const last = rows[rows.length - 1];
        if (!last || last.querySelector('input[data-role=text]').value.trim() !== '') {
            const endTime = last ? last.dataset.end : '08:00';
            PlanModule.create(endTime, Utils.getOffsetTime(endTime, 30));
        }
    },

    updateRowTime(row, newStart, newDurationMins) {
        row.dataset.start = newStart;
        row.dataset.end = Utils.getOffsetTime(newStart, newDurationMins);
    },

    sort() {
        const rows = Array.from(DOM.planList.querySelectorAll('.plan-row'));
        rows.sort((a, b) => a.dataset.start.localeCompare(b.dataset.start));
        const frag = document.createDocumentFragment();
        rows.forEach(r => frag.appendChild(r));
        DOM.planList.appendChild(frag);
    },

    checkTimeHighlight() {
        const cur = Utils.nowTimeStr();
        const today = Utils.todayISO();
        const isToday = DOM.datePicker.value === today;

        DOM.planList.querySelectorAll('.plan-row').forEach(row => {
            row.classList.remove('active-now', 'past');
            if (!isToday) return;

            if (cur >= row.dataset.start && cur < row.dataset.end) {
                row.classList.add('active-now');
            } else if (cur >= row.dataset.end) {
                row.classList.add('past');
            }
        });
    },

    parse(raw) {
        DOM.planList.replaceChildren();
        if (!raw) {
            PlanModule.create();
            PlanModule.checkTimeHighlight();
            return;
        }
        raw.split('\n').forEach(line => {
            if (!line.trim()) return;
            const parts = line.split('|');
            if (parts.length < 2) return;
            const times = parts[0].split('-');
            if (times.length !== 2) return;
            PlanModule.create(times[0], times[1], parts[1], parts[2] || '');
        });
        PlanModule.create();
        PlanModule.sort();
        PlanModule.checkTimeHighlight();
    },

    serialize() {
        return Array.from(DOM.planList.querySelectorAll('.plan-row'))
            .map(row => {
                const txt = row.querySelector('input[data-role=text]').value.trim();
                if (!txt) return null;
                const loc = row.querySelector('[data-role=loc-edit]').value.trim();
                return `${row.dataset.start}-${row.dataset.end}|${txt}|${loc}`;
            })
            .filter(Boolean)
            .join('\n');
    },
};

// ---------- TRADE LOG MODULE ----------
const TradeModule = {
    trades: [],
    currentType: 'BUY',

    // 解析 action 文字：取出交易記錄與一般筆記
    parse(text) {
        if (!text) return { trades: [], notes: '' };
        const re = /^\[(BUY|SELL)\]\s+(\d{1,2}:\d{2})\s+(\S+)\s+([\d.]+)\s+@\s+\$?([\d.]+)/i;
        const lines = text.split('\n');
        const trades = [];
        const notesLines = [];
        let inNotes = false;
        for (const line of lines) {
            if (line.trim() === '---') { inNotes = true; continue; }
            const m = line.match(re);
            if (m && !inNotes) {
                trades.push({
                    type: m[1].toUpperCase(),
                    time: m[2],
                    ticker: m[3].toUpperCase(),
                    shares: parseFloat(m[4]),
                    price: parseFloat(m[5]),
                });
            } else {
                notesLines.push(line);
            }
        }
        return { trades, notes: notesLines.join('\n').replace(/^\n+|\n+$/g, '') };
    },

    // 把目前 trades + textarea 內的筆記組合回 action 字串
    serialize() {
        const tradeText = TradeModule.trades.map(t =>
            `[${t.type}] ${t.time} ${t.ticker} ${t.shares} @ $${t.price.toFixed(2)}`
        ).join('\n');
        const notes = DOM.textAction.value.trim();
        if (tradeText && notes) return `${tradeText}\n---\n${notes}`;
        if (tradeText) return tradeText;
        return notes;
    },

    // 從 fetchData 回來時呼叫
    loadFromAction(text) {
        const { trades, notes } = TradeModule.parse(text);
        TradeModule.trades = trades;
        DOM.textAction.value = notes;
        Utils.adjustHeight(DOM.textAction);
        TradeModule.render();
    },

    add(type, ticker, shares, price) {
        const now = new Date();
        const trade = {
            type: type,
            time: `${Utils.pad2(now.getHours())}:${Utils.pad2(now.getMinutes())}`,
            ticker: ticker.toUpperCase(),
            shares: parseFloat(shares),
            price: parseFloat(price),
        };
        TradeModule.trades.push(trade);
        TradeModule.render();
        SaveQueue.trigger();
        TradeModule.syncToPortfolio(trade); // 同步到 Portfolio 分頁
    },

    // 推送交易到 Portfolio 分頁
    async syncToPortfolio(trade) {
        try {
            const res = await fetch(CONFIG.WEB_APP_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify({
                    type: 'trade',
                    action: trade.type,
                    ticker: trade.ticker,
                    shares: trade.shares,
                    price: trade.price,
                }),
            });
            const data = await res.json();
            if (data.success) {
                // 同步成功後刷新 Portfolio HUD
                Sync.refreshPortfolio();
                TradeModule._flashLastRow('ok');
            } else {
                TradeModule._flashLastRow('err', data.error);
            }
        } catch (e) {
            TradeModule._flashLastRow('err', 'NETWORK');
        }
    },

    _flashLastRow(state, msg) {
        const list = document.getElementById('trade-list');
        const last = list.lastElementChild;
        if (!last) return;
        if (state === 'ok') {
            last.style.boxShadow = '0 0 12px rgba(0,255,136,0.5)';
            setTimeout(() => { last.style.boxShadow = ''; }, 800);
        } else {
            last.style.boxShadow = '0 0 12px rgba(255,62,62,0.7)';
            last.title = `同步失敗: ${msg || ''}`;
        }
    },

    async remove(idx) {
        const trade = TradeModule.trades[idx];
        if (!trade) return;
        if (!confirm(`確定刪除 ${trade.type} ${trade.ticker} ${trade.shares} @ $${trade.price.toFixed(2)} ？\n（會反向更新到 Portfolio 雲端）`)) return;

        // 視覺：先把該行標為處理中
        const list = document.getElementById('trade-list');
        const row  = list.children[idx];
        if (row) row.style.opacity = '0.4';

        try {
            const res = await fetch(CONFIG.WEB_APP_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify({
                    type: 'trade',
                    action: trade.type === 'BUY' ? 'UNDO_BUY' : 'UNDO_SELL',
                    ticker: trade.ticker,
                    shares: trade.shares,
                    price: trade.price,
                }),
            });
            const data = await res.json();
            if (data.success) {
                TradeModule.trades.splice(idx, 1);
                TradeModule.render();
                SaveQueue.trigger();
                Sync.refreshPortfolio();
            } else {
                if (row) row.style.opacity = '1';
                alert(`刪除失敗：${data.error || '未知錯誤'}`);
            }
        } catch (e) {
            if (row) row.style.opacity = '1';
            alert(`網路錯誤，未能同步刪除：${e.message}`);
        }
    },

    render() {
        const list = document.getElementById('trade-list');
        list.replaceChildren();
        TradeModule.trades.forEach((t, i) => {
            const total = (t.shares * t.price).toFixed(2);
            const row = document.createElement('div');
            row.className = `trade-row trade-${t.type.toLowerCase()}`;
            row.innerHTML = `
                <span class="trade-time">${t.time}</span>
                <span class="trade-type-badge">${t.type}</span>
                <span class="trade-ticker">${t.ticker}</span>
                <span class="trade-detail">${t.shares} × $${t.price.toFixed(2)} = <strong>$${Number(total).toLocaleString()}</strong></span>
                <button class="trade-del" data-idx="${i}" aria-label="刪除">×</button>
            `;
            list.appendChild(row);
        });
        TradeModule.renderSummary();
    },

    renderSummary() {
        const summary = document.getElementById('trade-summary');
        if (TradeModule.trades.length === 0) {
            summary.replaceChildren();
            return;
        }
        const buyTotal  = TradeModule.trades.filter(t => t.type === 'BUY').reduce((a, t) => a + t.shares * t.price, 0);
        const sellTotal = TradeModule.trades.filter(t => t.type === 'SELL').reduce((a, t) => a + t.shares * t.price, 0);
        const net = sellTotal - buyTotal; // 賣出 - 買入 = 當日現金流
        const fmt = n => n.toLocaleString(undefined, { maximumFractionDigits: 2 });
        summary.innerHTML = `
            <span class="sum-label">${TradeModule.trades.length} 筆交易</span>
            <span class="sum-buy">BUY: $${fmt(buyTotal)}</span>
            <span class="sum-sell">SELL: $${fmt(sellTotal)}</span>
            <span class="sum-net">NET: ${net >= 0 ? '+' : '-'}$${fmt(Math.abs(net))}</span>
        `;
    },

    init() {
        const tickerInput = document.getElementById('trade-ticker');
        const sharesInput = document.getElementById('trade-shares');
        const priceInput  = document.getElementById('trade-price');

        // BUY/SELL 切換
        document.querySelectorAll('.trade-type-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                TradeModule.currentType = btn.dataset.type;
                document.querySelectorAll('.trade-type-btn').forEach(b =>
                    b.classList.toggle('active', b === btn));
            });
        });

        // 新增交易
        const addTrade = () => {
            const t = tickerInput.value.trim();
            const s = sharesInput.value.trim();
            const p = priceInput.value.trim();
            if (!t || !s || !p) {
                if (!t) tickerInput.focus();
                else if (!s) sharesInput.focus();
                else priceInput.focus();
                return;
            }
            if (parseFloat(s) <= 0 || parseFloat(p) <= 0) return;
            TradeModule.add(TradeModule.currentType, t, s, p);
            tickerInput.value = '';
            sharesInput.value = '';
            priceInput.value = '';
            tickerInput.focus();
        };
        document.getElementById('trade-add-btn').addEventListener('click', addTrade);
        [tickerInput, sharesInput, priceInput].forEach(inp => {
            inp.addEventListener('keydown', e => {
                if (e.key === 'Enter') { e.preventDefault(); addTrade(); }
            });
        });

        // 刪除按鈕（事件委派）
        document.getElementById('trade-list').addEventListener('click', e => {
            if (e.target.classList.contains('trade-del')) {
                TradeModule.remove(parseInt(e.target.dataset.idx));
            }
        });
    },
};

// ---------- HEALTH MODULE ----------
const HealthModule = {
    // 每日資料結構: { water: number(0-8), sleep: number(0-6), exercise: number(0-6) }
    LS_KEY: (date) => `gpal_health_${date}`,
    _syncTimer: null,

    load(date) {
        try {
            const raw = localStorage.getItem(HealthModule.LS_KEY(date));
            return raw ? JSON.parse(raw) : { water: 0, sleep: 0, exercise: 0 };
        } catch { return { water: 0, sleep: 0, exercise: 0 }; }
    },

    save(date, data) {
        try { localStorage.setItem(HealthModule.LS_KEY(date), JSON.stringify(data)); } catch {}
        // 30 秒後同步到雲端（debounce）
        if (HealthModule._syncTimer) clearTimeout(HealthModule._syncTimer);
        HealthModule._syncTimer = setTimeout(() => HealthModule.syncToCloud(date, data), 30000);
    },

    async syncToCloud(date, data) {
        try {
            await fetch(CONFIG.WEB_APP_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify({ type: 'health', date, data }),
            });
        } catch(e) { /* 靜默失敗 */ }
    },

    async loadFromCloud(date) {
        try {
            const res  = await Utils.safeFetch(`${CONFIG.WEB_APP_URL}?type=health&date=${date}`, {}, 1);
            const json = await res.json();
            if (json.health) {
                // 雲端有資料：更新 localStorage 並渲染
                localStorage.setItem(HealthModule.LS_KEY(date), JSON.stringify(json.health));
                HealthModule.render(date);
            }
        } catch(e) { /* 靜默失敗，用本地資料 */ }
    },

    cupSVG(filled, color = '#00f2ff') {
        const bodyStroke = filled ? color : 'rgba(0,242,255,0.35)';
        const topColor   = filled ? `${color}dd` : 'rgba(0,242,255,0.2)';
        return `<svg width="14" height="18" viewBox="0 0 14 18" xmlns="http://www.w3.org/2000/svg">
            <rect x="2" y="1" width="10" height="1.5" rx="0.5" fill="${topColor}"/>
            <path d="M2.5 3 L3.5 16 Q3.5 17 7 17 Q10.5 17 10.5 16 L11.5 3 Z"
                  fill="${filled ? color + '99' : 'none'}"
                  stroke="${bodyStroke}" stroke-width="1"
                  opacity="${filled ? 1 : 0.5}"/>
            ${filled ? `<ellipse cx="7" cy="5.5" rx="2.5" ry="0.8" fill="white" opacity="0.2"/>` : ''}
        </svg>`;
    },

    // 根據比例 (0~1) 從紅→橙→黃→綠做 HSL 插值
    _healthColor(ratio, alpha = 1) {
        const hue = Math.round(ratio * 120);
        const sat = 90;
        const lig = ratio < 0.3 ? 52 : 48;
        return alpha < 1
            ? `hsla(${hue}, ${sat}%, ${lig}%, ${alpha})`
            : `hsl(${hue}, ${sat}%, ${lig}%)`;
    },

    // 計算杯子 / 分段的填充顏色（逐格漸變）
    _segColor(idx, total, filledCount, unhealthyThreshold) {
        if (idx >= filledCount) return null; // 未填充
        // 整體進度決定顏色帶
        const ratio = filledCount / total;
        // 讓已填格的顏色根據整體健康度決定，而非逐格不同
        return HealthModule._healthColor(ratio);
    },

    render(date) {
        const data = HealthModule.load(date);

        // --- Water (8 cups) ---
        const cupsRow = document.getElementById('cups-row');
        cupsRow.innerHTML = '';
        const waterRatio  = data.water / 8;
        const waterColor  = HealthModule._healthColor(waterRatio);
        for (let i = 0; i < 8; i++) {
            const cup = document.createElement('div');
            cup.className = 'cup-icon';
            cup.innerHTML = HealthModule.cupSVG(i < data.water, i < data.water ? waterColor : null);
            cup.dataset.idx = i;
            cupsRow.appendChild(cup);
        }
        document.getElementById('water-count').textContent = `${data.water} / 8`;
        HealthModule._styleCount('water-count', waterRatio, data.water < 4);

        // --- Sleep (8 segments = 8 hrs) ---
        const sleepRow = document.getElementById('sleep-row');
        sleepRow.innerHTML = '';
        const sleepRatio = data.sleep / 8;
        const sleepColor = HealthModule._healthColor(sleepRatio);
        const sleepColorFade = HealthModule._healthColor(sleepRatio, 0.7);
        const sleepGlow  = HealthModule._healthColor(sleepRatio, 0.5);
        for (let i = 0; i < 8; i++) {
            const seg = document.createElement('div');
            seg.className = 'seg sleep-seg' + (i < data.sleep ? ' filled' : '');
            seg.dataset.idx = i;
            if (i < data.sleep) {
                seg.style.background = `linear-gradient(180deg, ${sleepColorFade}, ${sleepColor})`;
                seg.style.boxShadow  = `0 0 5px ${sleepGlow}`;
            }
            sleepRow.appendChild(seg);
        }
        document.getElementById('sleep-count').textContent = `${data.sleep} / 8 hr`;
        HealthModule._styleCount('sleep-count', sleepRatio, data.sleep < 4);

        // --- Exercise (6 segments × 5 min = 30 min) ---
        const exerRow = document.getElementById('exer-row');
        exerRow.innerHTML = '';
        const exerRatio = data.exercise / 6;
        const exerColor = HealthModule._healthColor(exerRatio);
        const exerColorFade = HealthModule._healthColor(exerRatio, 0.7);
        const exerGlow  = HealthModule._healthColor(exerRatio, 0.5);
        for (let i = 0; i < 6; i++) {
            const seg = document.createElement('div');
            seg.className = 'seg exer-seg' + (i < data.exercise ? ' filled' : '');
            seg.dataset.idx = i;
            if (i < data.exercise) {
                seg.style.background = `linear-gradient(180deg, ${exerColorFade}, ${exerColor})`;
                seg.style.boxShadow  = `0 0 5px ${exerGlow}`;
            }
            exerRow.appendChild(seg);
        }
        document.getElementById('exer-count').textContent = `${data.exercise * 5} / 30 min`;
        HealthModule._styleCount('exer-count', exerRatio, data.exercise < 3);
    },

    // 統一 count 文字顏色：未達標閃紅，其他按健康比例漸變
    _styleCount(id, ratio, isUnhealthy) {
        const el = document.getElementById(id);
        if (isUnhealthy && ratio > 0) {
            // 未達閾值且有記錄 → 紅色警示
            el.style.color = 'var(--stark-red)';
            el.style.textShadow = '0 0 8px rgba(255,62,62,0.6)';
        } else if (ratio === 0) {
            el.style.color = 'rgba(0,242,255,0.4)';
            el.style.textShadow = 'none';
        } else {
            el.style.color = HealthModule._healthColor(ratio);
            el.style.textShadow = ratio >= 1 ? `0 0 8px ${HealthModule._healthColor(1, 0.5)}` : 'none';
        }
    },

    bindEvents() {
        const getDate = () => DOM.datePicker.value;

        // Water cups — 點第 N 杯：若已滿 N+1，退回 N；否則填到 N+1
        document.getElementById('cups-row').addEventListener('click', (e) => {
            const cup = e.target.closest('.cup-icon');
            if (!cup) return;
            const idx = parseInt(cup.dataset.idx);
            const data = HealthModule.load(getDate());
            data.water = (data.water === idx + 1) ? idx : idx + 1;
            HealthModule.save(getDate(), data);
            HealthModule.render(getDate());
        });

        // Sleep segments
        document.getElementById('sleep-row').addEventListener('click', (e) => {
            const seg = e.target.closest('.seg');
            if (!seg) return;
            const idx = parseInt(seg.dataset.idx);
            const data = HealthModule.load(getDate());
            data.sleep = (data.sleep === idx + 1) ? idx : idx + 1;
            HealthModule.save(getDate(), data);
            HealthModule.render(getDate());
        });

        // Exercise segments
        document.getElementById('exer-row').addEventListener('click', (e) => {
            const seg = e.target.closest('.seg');
            if (!seg) return;
            const idx = parseInt(seg.dataset.idx);
            const data = HealthModule.load(getDate());
            data.exercise = (data.exercise === idx + 1) ? idx : idx + 1;
            HealthModule.save(getDate(), data);
            HealthModule.render(getDate());
        });
    },
};

// ---------- SYNC MODULE ----------
const Sync = {
    async fetchData() {
        const token = ++State.fetchToken;
        Utils.setStatus('>> SYNCING...', 'warn');
        Utils.setConnState('syncing');
        const syncBtn = document.getElementById('btn-nav-sync');
        if (syncBtn) syncBtn.classList.add('spinning');

        const date = DOM.datePicker.value;
        Utils.updateDateLabel(date);

        try {
            const res = await Utils.safeFetch(`${CONFIG.WEB_APP_URL}?date=${date}`);
            const data = await res.json();

            if (token !== State.fetchToken) return; // 已被新請求取代

            State.currentData = data;

            // Rollover：若是今天，且今天 goal 為空，把昨天未完成的 goal 帶過來
            let goalRaw = data.goal || '';
            const isToday = date === Utils.todayISO();
            if (isToday) {
                const yesterday = new Date(date + 'T12:00:00');
                yesterday.setDate(yesterday.getDate() - 1);
                const yDate = `${yesterday.getFullYear()}-${Utils.pad2(yesterday.getMonth()+1)}-${Utils.pad2(yesterday.getDate())}`;
                try {
                    const yRes  = await Utils.safeFetch(`${CONFIG.WEB_APP_URL}?date=${yDate}`, {}, 1);
                    const yData = await yRes.json();
                    if (yData.goal) {
                        const incomplete = yData.goal.split('\n').filter(l => l.trim() && l.startsWith('[ ]'));
                        if (incomplete.length > 0) {
                            // 合併：今天已有的項目不重複加入
                            const todayTexts = new Set(
                                goalRaw.split('\n').map(l => l.replace(/^\[[ x]\]\s*\((P[1-3]|NONE)\)\s*/, '').replace(/^\[[ x]\]\s*/, '').trim())
                            );
                            const toAdd = incomplete.filter(l => {
                                const txt = l.replace(/^\[ \]\s*\((P[1-3]|NONE)\)\s*/, '').replace(/^\[ \]\s*/, '').trim();
                                return txt && !todayTexts.has(txt);
                            });
                            if (toAdd.length > 0) {
                                goalRaw = goalRaw ? goalRaw + '\n' + toAdd.join('\n') : toAdd.join('\n');
                            }
                        }
                    }
                } catch (e) { /* 昨天資料抓不到就算了 */ }
            }

            GoalModule.parse(goalRaw);
            PlanModule.parse(data.plan);
            TradeModule.loadFromAction(data.action || '');
            DOM.textLearn.value = data.learn || '';
            Utils.adjustHeight(DOM.textLearn);

            Utils.setStatus('STARK_OS_ONLINE', 'success');
            Utils.setConnState('online');
            State.isOnline = true;

            // 若本地有暫存且時間比雲端新，提示使用者
            const backup = Utils.loadLocalBackup(date);
            if (backup && backup.payload) {
                Utils.setStatus('LOCAL_BACKUP_FOUND', 'warn');
            }
        } catch (e) {
            if (token !== State.fetchToken) return;
            Utils.setStatus('LINK_FAILURE — using local', 'error');
            Utils.setConnState('offline');
            State.isOnline = false;

            // 嘗試載入本地備份
            const backup = Utils.loadLocalBackup(date);
            if (backup && backup.payload) {
                const p = backup.payload;
                GoalModule.parse(p.goal);
                PlanModule.parse(p.plan);
                TradeModule.loadFromAction(p.action || '');
                DOM.textLearn.value = p.learn || '';
                Utils.adjustHeight(DOM.textLearn);
            } else {
                GoalModule.parse('');
                PlanModule.parse('');
                TradeModule.loadFromAction('');
            }
        } finally {
            const syncBtn = document.getElementById('btn-nav-sync');
            if (syncBtn) syncBtn.classList.remove('spinning');
        }
    },

    async save(mode = 'MANUAL') {
        if (State.isSyncing) return;
        State.isSyncing = true;

        const payload = {
            date: DOM.datePicker.value,
            goal: GoalModule.serialize(),
            plan: PlanModule.serialize(),
            action: TradeModule.serialize(),
            learn: DOM.textLearn.value,
        };

        // 先寫本地備份，再嘗試雲端
        Utils.backupToLocal(payload.date, payload);

        try {
            Utils.setStatus('>> UPLOADING...', 'warn');
            Utils.setConnState('syncing');

            await Utils.safeFetch(CONFIG.WEB_APP_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify(payload),
            });

            Utils.setStatus(`ARCHIVE_SYNCED · ${mode}`, 'success');
            Utils.setConnState('online');
            State.isOnline = true;
            State.dirty = false;
            Utils.clearLocalBackup(payload.date);
        } catch (e) {
            Utils.setStatus('UPLOAD_ERROR · LOCAL_SAVED', 'error');
            Utils.setConnState('offline');
            State.isOnline = false;
        } finally {
            State.isSyncing = false;
        }
    },

    async refreshPortfolio() {
        try {
            const res = await Utils.safeFetch(`${CONFIG.WEB_APP_URL}?type=portfolio`, {}, 1);
            const data = await res.json();
            if (!data.summary) return;
            const s = data.summary;
            const plColor  = s.total_pl >= 0 ? 'var(--stark-cyan)' : 'var(--stark-red)';
            const plSign   = s.total_pl >= 0 ? '+' : '';
            const newValue = Number(s.total_value);
            const newPl    = Number(s.total_pl);
            const prevValue = DOM.portfolioDisplay._lastValue ?? null;
            const prevPl    = DOM.portfolioDisplay._lastPl    ?? null;
            DOM.portfolioDisplay._lastValue = newValue;
            DOM.portfolioDisplay._lastPl    = newPl;

            // 首次建立 DOM 結構
            if (!DOM.portfolioDisplay.querySelector('.coin-icon')) {
                DOM.portfolioDisplay.replaceChildren();

                const coin = document.createElement('span');
                coin.className = 'coin-icon';
                coin.innerHTML = `<svg width="20" height="20" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
                  <!-- 銀行柱子屋頂 -->
                  <polygon points="10,1 19,6 1,6" fill="#a0c8e0" opacity="0.9"/>
                  <rect x="2.5" y="6" width="15" height="1.2" fill="#c8e0f0" opacity="0.85"/>
                  <!-- 三根柱子 -->
                  <rect x="3.5" y="7.2" width="2" height="7" fill="#7ab0cc" opacity="0.9"/>
                  <rect x="9" y="7.2" width="2" height="7" fill="#7ab0cc" opacity="0.9"/>
                  <rect x="14.5" y="7.2" width="2" height="7" fill="#7ab0cc" opacity="0.9"/>
                  <!-- 底座 -->
                  <rect x="1.5" y="14.2" width="17" height="1.5" fill="#c8e0f0" opacity="0.85"/>
                  <rect x="0.5" y="15.7" width="19" height="1.8" fill="#a0c8e0" opacity="0.9"/>
                </svg>`;

                // NET 區塊
                const netGroup = document.createElement('span');
                netGroup.style.cssText = 'display:inline-flex;flex-direction:column;align-items:flex-start;line-height:1.1;';
                const netLabel = document.createElement('span');
                netLabel.className = 'pf-label';
                netLabel.textContent = 'NET WORTH';
                const netVal = document.createElement('span');
                netVal.id = '_pf-val';
                netVal.className = 'pf-value';
                netVal.style.color = 'white';
                netGroup.append(netLabel, netVal);

                // 分隔線
                const div1 = document.createElement('span');
                div1.className = 'pf-divider';

                // P/L 區塊
                const plGroup = document.createElement('span');
                plGroup.style.cssText = 'display:inline-flex;flex-direction:column;align-items:flex-start;line-height:1.1;';
                const plLabel = document.createElement('span');
                plLabel.className = 'pf-label';
                plLabel.textContent = 'P / L';
                const plVal = document.createElement('span');
                plVal.id = '_pf-pl';
                plVal.className = 'pf-value';
                plGroup.append(plLabel, plVal);

                DOM.portfolioDisplay.append(coin, netGroup, div1, plGroup);
            }

            const valEl = document.getElementById('_pf-val');
            const plEl  = document.getElementById('_pf-pl');

            // 數值有變化時加 flash
            function flashUpdate(el, newText, color) {
                el.textContent = newText;
                el.style.color = color;
                el.style.textShadow = `0 0 12px ${color}`;
                el.classList.remove('flash');
                void el.offsetWidth; // reflow 觸發重新動畫
                el.classList.add('flash');
            }

            const valChanged = prevValue !== null && newValue !== prevValue;
            const plChanged  = prevPl    !== null && newPl    !== prevPl;

            flashUpdate(valEl, `$${newValue.toLocaleString()}`,          'white');
            flashUpdate(plEl,  `${plSign}$${newPl.toLocaleString()}`,    plColor);

        } catch (e) {
            // 靜默失敗
        }
    },
};

// ---------- EVENT DELEGATION ----------
const Events = {
    init() {
        // 全域事件委派 — Goal List
        DOM.goalList.addEventListener('click', (e) => {
            const t = e.target;
            const row = t.closest('.goal-row');
            if (!row) return;
            if (t.dataset.role === 'prio') {
                GoalModule.cyclePriority(row);
                GoalModule.sort();
                SaveQueue.trigger();
            } else if (t.dataset.role === 'check') {
                const input = row.querySelector('input[data-role=text]');
                const container = row.querySelector('.goal-text-container');
                input.classList.toggle('completed', t.checked);
                container.classList.toggle('completed', t.checked);
                GoalModule.sort();
                GoalModule.updateProgress();
                SaveQueue.trigger();
            }
        });

        DOM.goalList.addEventListener('input', (e) => {
            if (e.target.dataset.role !== 'text') return;
            GoalModule.updateProgress();
            GoalModule.ensureTrailingEmpty();
            SaveQueue.trigger();
        });

        DOM.goalList.addEventListener('keydown', (e) => {
            if (e.target.dataset.role !== 'text') return;
            if (e.key === 'Enter') {
                e.preventDefault();
                const row = e.target.closest('.goal-row');
                const next = row.nextElementSibling;
                if (next) next.querySelector('input[data-role=text]').focus();
                else { GoalModule.create(); GoalModule.ensureTrailingEmpty(); 
                       row.nextElementSibling?.querySelector('input[data-role=text]').focus(); }
            }
        });

        // Plan List 事件委派
        DOM.planList.addEventListener('click', (e) => {
            const t = e.target;
            const row = t.closest('.plan-row');
            if (!row) return;
            const role = t.dataset.role;

            if (role === 'loc-add') {
                t.style.display = 'none';
                const editor = row.querySelector('[data-role=loc-edit]');
                editor.style.display = 'block';
                editor.focus();
            } else if (role === 'loc-badge') {
                row.querySelector('.loc-tag-group').style.display = 'none';
                const editor = row.querySelector('[data-role=loc-edit]');
                editor.style.display = 'block';
                editor.focus();
            } else if (role === 'loc-copy') {
                const loc = row.querySelector('[data-role=loc-edit]').value.trim();
                if (loc) {
                    navigator.clipboard.writeText(loc).then(() => {
                        t.textContent = 'OK!';
                        t.classList.add('copied');
                        setTimeout(() => { t.textContent = 'COPY'; t.classList.remove('copied'); }, 1500);
                    }).catch(() => {
                        t.textContent = 'ERR';
                        setTimeout(() => { t.textContent = 'COPY'; }, 1500);
                    });
                }
            } else if (role === 'del') {
                if (confirm('DELETE THIS TASK?')) {
                    row.style.transition = 'opacity 0.2s, transform 0.2s';
                    row.style.opacity = '0';
                    row.style.transform = 'translateX(-20px)';
                    setTimeout(() => {
                        row.remove();
                        PlanModule.ensureTrailingEmpty();
                        SaveQueue.trigger();
                    }, 200);
                }
            }
        });

        DOM.planList.addEventListener('blur', (e) => {
            if (e.target.dataset.role !== 'loc-edit') return;
            const row = e.target.closest('.plan-row');
            const val = e.target.value.trim();
            const badge = row.querySelector('[data-role=loc-badge]');
            const group = row.querySelector('.loc-tag-group');
            const addBtn = row.querySelector('[data-role=loc-add]');
            if (val) {
                badge.textContent = `📍 ${val}`;
                group.style.display = 'flex';
                e.target.style.display = 'none';
                addBtn.style.display = 'none';
            } else {
                addBtn.style.display = 'block';
                e.target.style.display = 'none';
                group.style.display = 'none';
            }
            SaveQueue.trigger();
        }, true);

        DOM.planList.addEventListener('change', (e) => {
            const t = e.target;
            const row = t.closest('.plan-row');
            if (!row) return;
            if (t.dataset.role === 'start' || t.dataset.role === 'duration') {
                const startSel = row.querySelector('[data-role=start]');
                const durSel = row.querySelector('[data-role=duration]');
                PlanModule.updateRowTime(row, startSel.value, parseInt(durSel.value));
                if (t.dataset.role === 'start') PlanModule.sort();
                PlanModule.checkTimeHighlight();
                SaveQueue.trigger();
            }
        });

        DOM.planList.addEventListener('input', (e) => {
            const role = e.target.dataset.role;
            if (role === 'text') {
                PlanModule.ensureTrailingEmpty();
                SaveQueue.trigger();
            }
        });

        // 文字區
        [DOM.textAction, DOM.textLearn].forEach(el => {
            el.addEventListener('input', () => {
                Utils.adjustHeight(el);
                SaveQueue.trigger();
            });
        });

        // 導覽
        document.querySelector('[data-action="prev-day"]').addEventListener('click', () => Events.changeDate(-1));
        document.querySelector('[data-action="next-day"]').addEventListener('click', () => Events.changeDate(1));

        // 手機滑動換日：左滑→下一天，右滑→上一天
        let touchStartX = 0;
        let touchStartY = 0;
        document.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, { passive: true });
        document.addEventListener('touchend', (e) => {
            const dx = e.changedTouches[0].clientX - touchStartX;
            const dy = e.changedTouches[0].clientY - touchStartY;
            // 水平位移 > 60px 且水平幅度大於垂直（避免誤觸滾動）
            if (Math.abs(dx) < 60 || Math.abs(dx) < Math.abs(dy) * 1.5) return;
            Events.changeDate(dx < 0 ? -1 : 1);
        }, { passive: true });
        DOM.datePicker.addEventListener('change', async () => {
            Utils.updateDateLabel(DOM.datePicker.value);
                            await SaveQueue.flushImmediate();
            Sync.fetchData();
        });

        // 網路狀態
        window.addEventListener('online', () => {
            State.isOnline = true;
            Utils.setConnState('online');
            Utils.setStatus('NETWORK_RESTORED', 'success');
            // 自動推上本地暫存
            if (State.dirty) Sync.save('AUTO');
        });
        window.addEventListener('offline', () => {
            State.isOnline = false;
            Utils.setConnState('offline');
            Utils.setStatus('OFFLINE — saving locally', 'warn');
        });

        // 離頁前確保儲存
        window.addEventListener('beforeunload', (e) => {
            if (State.dirty) {
                SaveQueue.flushImmediate();
                e.preventDefault();
                e.returnValue = '';
            }
        });

        // 頁面回到前景時刷新時間 highlight
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden) PlanModule.checkTimeHighlight();
        });
    },

    async changeDate(days) {
        await SaveQueue.flushImmediate();
        const d = new Date(DOM.datePicker.value + 'T12:00:00');
        d.setDate(d.getDate() + days);
        DOM.datePicker.value = `${d.getFullYear()}-${Utils.pad2(d.getMonth() + 1)}-${Utils.pad2(d.getDate())}`;
        Utils.updateDateLabel(DOM.datePicker.value);
            Sync.fetchData();
    },
};

// ---------- FINANCIAL INTEL MODULE ----------
const IntelModule = {
    LS_KEY_API: 'gpal_api_key',

    getApiKey() {
        return localStorage.getItem(IntelModule.LS_KEY_API) || '';
    },

    saveApiKey(key) {
        localStorage.setItem(IntelModule.LS_KEY_API, key);
    },

    // 從 cache 讀取
    loadCache(date) {
        try {
            const raw = localStorage.getItem(IntelModule.LS_KEY(date));
            return raw ? JSON.parse(raw) : null;
        } catch { return null; }
    },

    saveCache(date, data) {
        try { localStorage.setItem(IntelModule.LS_KEY(date), JSON.stringify(data)); } catch {}
    },

    // 顯示結果
    render(result) {
        document.getElementById('intel-risk').textContent   = result.risk;
        document.getElementById('intel-action').textContent = result.action;
        document.getElementById('intel-body').classList.add('visible');
        if (result.ts) {
            const d = new Date(result.ts);
            document.getElementById('intel-timestamp').textContent =
                `LAST: ${Utils.pad2(d.getHours())}:${Utils.pad2(d.getMinutes())}`;
        }
    },

    showError(msg) {
        const el = document.getElementById('intel-error');
        el.textContent = `⚠ ${msg}`;
        el.classList.add('visible');
    },

    clearError() {
        const el = document.getElementById('intel-error');
        el.textContent = '';
        el.classList.remove('visible');
    },

    async analyse() {
        const btn = document.getElementById('btn-intel');
        const loading = document.getElementById('intel-loading');
        btn.disabled = true;
        loading.classList.add('active');
        document.getElementById('intel-body').classList.remove('visible');
        IntelModule.clearError();

        try {
            // 1. 抓取雲端持倉數據
            const res  = await Utils.safeFetch(`${CONFIG.WEB_APP_URL}?type=portfolio`, {}, 1);
            const data = await res.json();
            if (!data.holdings || data.holdings.length === 0) {
                throw new Error('NO_HOLDINGS_DATA');
            }

            const s = data.summary || {};
            const totalValue = Number(s.total_value || 0);
            const totalPL    = Number(s.total_pl || 0);
            const plPct      = totalValue > 0 ? ((totalPL / (totalValue - totalPL)) * 100).toFixed(2) : '0';

            // 2. 合併同名持倉（如 NVDA 兩筆）
            const merged = {};
            data.holdings.forEach(h => {
                const sym = h.symbol;
                if (!merged[sym]) {
                    merged[sym] = { ...h, shares: Number(h.shares), pl: Number(h.pl), market_value: Number(h.market_value) };
                } else {
                    merged[sym].shares       += Number(h.shares);
                    merged[sym].pl           += Number(h.pl);
                    merged[sym].market_value += Number(h.market_value);
                    // 加權平均成本
                    const totalShares = merged[sym].shares;
                    merged[sym].avg_cost = (
                        (merged[sym].avg_cost * (totalShares - Number(h.shares)) +
                         Number(h.avg_cost) * Number(h.shares)) / totalShares
                    ).toFixed(2);
                    // 重算 P/L %
                    merged[sym].pl_pct = merged[sym].avg_cost > 0
                        ? (((Number(h.current_price) - merged[sym].avg_cost) / merged[sym].avg_cost) * 100).toFixed(2)
                        : '0';
                }
            });

            // 3. 整理成分析用文字（按市值排序）
            const positions = Object.values(merged)
                .sort((a, b) => b.market_value - a.market_value);

            const positionText = positions.map(h => {
                const weight = ((h.market_value / totalValue) * 100).toFixed(1);
                const plNum  = Number(h.pl);
                const flag   = plNum < 0 ? '🔴' : plNum > h.market_value * 0.1 ? '🟢' : '🟡';
                return `${flag} ${h.symbol}: ${h.shares} shares | avg $${Number(h.avg_cost).toFixed(2)} → $${Number(h.current_price).toFixed(2)} | MV $${Number(h.market_value).toLocaleString()} (${weight}% of portfolio) | P/L $${plNum.toFixed(0)} (${h.pl_pct}%)`;
            }).join('\n');

            const today = DOM.datePicker.value;

            // 4. 精準 prompt
            const prompt = `你是投資組合分析師。以繁體中文、極簡風格分析以下持倉。

持倉（${today}，總值 $${totalValue.toLocaleString()}，盈虧 $${totalPL.toLocaleString()} / ${plPct}%）：
${positionText}

嚴格按格式回答，每項不超過20字，不加說明：

風險評估：
• [點1]
• [點2]
• [點3]

操作建議：
• [點1]
• [點2]
• [點3]`;

            // 5. 呼叫 Claude API
            const apiKey = IntelModule.getApiKey();
            if (!apiKey) throw new Error('NO_API_KEY — 請先輸入並儲存 API Key');

            const apiRes = await fetch('https://api.anthropic.com/v1/messages', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'x-api-key': apiKey,
                    'anthropic-version': '2023-06-01',
                    'anthropic-dangerous-direct-browser-access': 'true',
                },
                body: JSON.stringify({
                    model: 'claude-sonnet-4-6',
                    max_tokens: 1000,
                    messages: [{ role: 'user', content: prompt }],
                }),
            });

            if (!apiRes.ok) throw new Error(`API_ERROR ${apiRes.status}`);
            const apiData = await apiRes.json();
            const text = apiData.content?.find(b => b.type === 'text')?.text || '';

            // 6. 解析兩段
            const riskMatch   = text.match(/風險評估：\s*([\s\S]*?)(?=操作建議：|$)/);
            const actionMatch = text.match(/操作建議：\s*([\s\S]*?)$/);

            const result = {
                risk:   riskMatch   ? riskMatch[1].trim()   : text,
                action: actionMatch ? actionMatch[1].trim() : '—',
                ts: Date.now(),
            };

            IntelModule.saveCache(today, result);
            IntelModule.render(result);

        } catch (e) {
            IntelModule.showError(e.message || 'ANALYSIS_FAILED');
        } finally {
            btn.disabled = false;
            loading.classList.remove('active');
        }
    },

    init() {
        // API Key UI
        const keyInput  = document.getElementById('intel-key-input');
        const keyStatus = document.getElementById('key-status');
        const savedKey  = IntelModule.getApiKey();
        if (savedKey) {
            keyInput.value = savedKey;
            keyStatus.textContent = '● KEY LOADED';
            keyStatus.className = 'key-status ok';
        }
        document.getElementById('btn-key-save').addEventListener('click', () => {
            const key = keyInput.value.trim();
            if (!key.startsWith('sk-ant-')) {
                keyStatus.textContent = '✗ INVALID FORMAT';
                keyStatus.className = 'key-status err';
                return;
            }
            IntelModule.saveApiKey(key);
            keyStatus.textContent = '✓ SAVED';
            keyStatus.className = 'key-status ok';
        });

        // 分析按鈕
        document.getElementById('btn-intel').addEventListener('click', () => IntelModule.analyse());

        // 載入今天 cache
        const cached = IntelModule.loadCache(DOM.datePicker.value);
        if (cached) IntelModule.render(cached);

        // 切日期時載入 cache
        DOM.datePicker.addEventListener('change', () => {
            document.getElementById('intel-body').classList.remove('visible');
            IntelModule.clearError();
            document.getElementById('intel-timestamp').textContent = '';
            const c = IntelModule.loadCache(DOM.datePicker.value);
            if (c) IntelModule.render(c);
        });
    },
};

// ---------- INIT ----------
window.addEventListener('DOMContentLoaded', () => {
    DOM.datePicker.value = Utils.todayISO();
    Utils.updateDateLabel(DOM.datePicker.value);

    // 即時時鐘
    const clockEl = document.getElementById('liveClock');
    function d(ch) { return `<span class="clock-digit">${ch}</span>`; }
    function colon(cls = '') { return `<span class="clock-colon${cls}">:</span>`; }
    function tickClock() {
        const n = new Date();
        const H = Utils.pad2(n.getHours());
        const M = Utils.pad2(n.getMinutes());
        const S = Utils.pad2(n.getSeconds());
        clockEl.innerHTML =
            `${d(H[0])}${d(H[1])}${colon()}${d(M[0])}${d(M[1])}<span class="clock-sec-group">${colon()}${d(S[0])}${d(S[1])}</span>`;
    }
    tickClock();
    setInterval(tickClock, 1000);

    // 天氣（先嘗試 Apps Script 代理，失敗則直接呼叫 Open-Meteo）
    async function fetchWeather() {
        const el = document.getElementById('weather-display');
        if (!el) return;
        try {
            // 方法1：Apps Script 代理
            const res  = await fetch(`${CONFIG.WEB_APP_URL}?type=weather`);
            const data = await res.json();
            if (data.temp != null) {
                el.innerHTML = `<span class="w-icon">${weatherIcon(data.code)}</span><span class="w-temp">${data.temp}°C</span>`;
                return;
            }
        } catch(e) { /* fallback */ }

        try {
            // 方法2：直接 Open-Meteo（Oakland 座標作預設）
            const wRes  = await fetch('https://api.open-meteo.com/v1/forecast?latitude=37.8&longitude=-122.3&current=temperature_2m,weather_code&temperature_unit=celsius&timezone=auto');
            const wData = await wRes.json();
            const cur   = wData.current;
            el.innerHTML = `<span class="w-icon">${weatherIcon(cur.weather_code)}</span><span class="w-temp">${Math.round(cur.temperature_2m)}°C</span>`;
        } catch(e) {
            el.textContent = '';
        }
    }

    function weatherIcon(code) {
        if (code === 0)  return '☀️';
        if (code <= 2)   return '🌤️';
        if (code <= 3)   return '☁️';
        if (code <= 49)  return '🌫️';
        if (code <= 67)  return '🌧️';
        if (code <= 77)  return '❄️';
        if (code <= 82)  return '🌦️';
        if (code <= 99)  return '⛈️';
        return '🌡️';
    }

    fetchWeather();
    setInterval(fetchWeather, 15 * 60 * 1000);
    Utils.setConnState(navigator.onLine ? 'online' : 'offline');

    Events.init();
    TradeModule.init();
    Sync.fetchData();
    Sync.refreshPortfolio();

    setInterval(() => PlanModule.checkTimeHighlight(), CONFIG.TIME_CHECK_INTERVAL);
    setInterval(() => Sync.refreshPortfolio(), CONFIG.PORTFOLIO_REFRESH);
});
